const formatRemainingTime = (totalDays, remainingAyahs, isAr) => {
    if (remainingAyahs <= 0) return isAr ? "تم الختم بفضل الله!" : "Khatm Completed!";
    const daysLeft = Math.ceil(totalDays * (remainingAyahs / TOTAL_QURAN_AYAHS));
    if (daysLeft < 30) return isAr ? `${daysLeft} يوم` : `${daysLeft} days`;
    const months = Math.floor(daysLeft / 30);
    const rDays = Math.ceil(daysLeft % 30);
    if (months < 12) return isAr ? `${months} شهر و ${rDays} يوم` : `${months} months, ${rDays} days`;
    const years = Math.floor(months / 12);
    const rMonths = months % 12;
    return isAr ? `${years} سنة${rMonths > 0 ? ` و ${rMonths} شهر` : ''}` : `${years} year(s)${rMonths > 0 ? ` and ${rMonths} month(s)` : ''}`;
};

// Format weeks remaining for juz plans
const formatJuzETA = (remainingAyahs, ayahsPerWeek, isAr) => {
    if (remainingAyahs <= 0) return isAr ? '🎉 تم الإنهاء!' : '🎉 Completed!';
    if (ayahsPerWeek <= 0) return '—';
    const weeks = Math.ceil(remainingAyahs / ayahsPerWeek);
    if (weeks < 4) return isAr ? `${weeks} أسبوع` : `${weeks} week${weeks !== 1 ? 's' : ''}`;
    
    const totalMonths = Math.floor(weeks / 4);
    const remWeeks = weeks % 4;

    if (totalMonths < 12) {
        if (isAr) return `${totalMonths} شهر${remWeeks > 0 ? ` و ${remWeeks} أسبوع` : ''}`;
        return `${totalMonths} month${totalMonths !== 1 ? 's' : ''}${remWeeks > 0 ? ` and ${remWeeks} week${remWeeks !== 1 ? 's' : ''}` : ''}`;
    }

    const years = Math.floor(totalMonths / 12);
    const remMonths = totalMonths % 12;
    
    if (isAr) return `${years} سنة${remMonths > 0 ? ` و ${remMonths} شهر` : ''}`;
    return `${years} year${years !== 1 ? 's' : ''}${remMonths > 0 ? ` and ${remMonths} month${remMonths !== 1 ? 's' : ''}` : ''}`;
};

// ── Teacher HW Alert Component ───────────────────────────────────────────────
function TeacherHWAlert({ task, onClear, isAr, t }) {
    if (!task) return null;
    const surah = SURAHS_DATA.find(s => s.id === task.surahId);
    const isCompleted = task.completed;
    
    const bgClass = isCompleted ? 'bg-red-50 border-red-200' : 'bg-purple-50 border-purple-200';
    const textClass = isCompleted ? 'text-red-800' : 'text-purple-800';
    const iconClass = isCompleted ? 'text-red-600 bg-red-200' : 'text-purple-600 bg-purple-200';
    const icon = isCompleted ? 'fa-check-double' : 'fa-headphones-alt';

    return (
        <div className={`p-4 rounded-2xl border-2 flex flex-col sm:flex-row items-center justify-between gap-4 shadow-sm animate-fade-in-up ${bgClass}`}>
           <div className="flex items-center gap-3 w-full sm:w-auto">
               <div className={`w-10 h-10 shrink-0 rounded-full flex items-center justify-center text-xl ${iconClass}`}>
                   <i className={`fas ${icon} ${isCompleted ? 'anim-tada' : 'anim-bounce-soft'}`}></i>
               </div>
               <div>
                   <h4 className={`font-bold text-sm sm:text-base leading-tight ${textClass}`}>
                       {isCompleted ? t('hwCompleted') : t('hwPending')}
                   </h4>
                   <p className={`text-xs mt-1 font-medium ${isCompleted ? 'text-red-600' : 'text-purple-600'}`}>
                       {t('surah')} {surah?.[isAr ? 'name' : 'enName']} <span className="mx-1">•</span> {t('ayahs')} {task.fromAyah}-{task.toAyah} <span className="mx-1">•</span> {task.requiredRepeats} {t('times')}
                   </p>
               </div>
           </div>
           <div className="shrink-0 w-full sm:w-auto text-center">
               <button onClick={onClear} className={`w-full sm:w-auto px-4 py-2 rounded-xl text-xs sm:text-sm font-bold border transition-colors shadow-sm ${isCompleted ? 'bg-white text-red-600 hover:bg-red-100 border-red-200' : 'bg-white text-purple-600 hover:bg-purple-100 border-purple-200'}`}>
                   <i className="fas fa-trash-alt mr-1"></i> {t('clearHW')}
               </button>
           </div>
        </div>
    );
}

// ── HW Assignment Modal ──────────────────────────────────────────────────────
function AssignHWModal({ onClose, onSave, isAr, t }) {
    const [surahId, setSurahId] = useState(1);
    const [fromAyah, setFromAyah] = useState(1);
    const [toAyah, setToAyah] = useState(7);
    const [repeats, setRepeats] = useState(3);

    const selectedSurah = SURAHS_DATA.find(s => s.id === Number(surahId));

    useEffect(() => {
        if (selectedSurah) {
            setFromAyah(1);
            setToAyah(Math.min(5, selectedSurah.totalAyahs));
        }
    }, [surahId]);

    const handleSave = () => {
        onSave({
            surahId: Number(surahId),
            fromAyah: Number(fromAyah),
            toAyah: Number(toAyah),
            requiredRepeats: Number(repeats),
            completed: false,
            id: Date.now().toString()
        });
    };

    return (
        <div className="fixed inset-0 z-[250] flex items-center justify-center bg-slate-900/80 p-4 backdrop-blur-sm" dir={isAr?'rtl':'ltr'}>
            <div className="bg-white rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl animate-fade-in-up">
                <div className="bg-purple-600 p-4 text-white flex justify-between items-center">
                    <h3 className="font-bold flex items-center gap-2"><i className="fas fa-headphones-alt"></i> {t('assignHWTitle')}</h3>
                    <button onClick={onClose} className="hover:bg-purple-500 w-8 h-8 rounded-full flex items-center justify-center"><i className="fas fa-times"></i></button>
                </div>
                <div className="p-6 space-y-4">
                    <div>
                        <label className="block text-xs font-bold text-slate-500 mb-1">{t('surah')}</label>
                        <select value={surahId} onChange={(e) => setSurahId(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 outline-none focus:border-purple-500 font-bold">
                            {SURAHS_DATA.map(s => <option key={s.id} value={s.id}>{s.id}. {isAr?s.name:s.enName}</option>)}
                        </select>
                    </div>
                    <div className="flex gap-3">
                        <div className="flex-1">
                            <label className="block text-xs font-bold text-slate-500 mb-1">{t('fromAyah')}</label>
                            <input type="number" min="1" max={selectedSurah?.totalAyahs||1} value={fromAyah} onChange={(e) => setFromAyah(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 outline-none focus:border-purple-500 text-center font-bold" />
                        </div>
                        <div className="flex-1">
                            <label className="block text-xs font-bold text-slate-500 mb-1">{t('toAyah')}</label>
                            <input type="number" min="1" max={selectedSurah?.totalAyahs||1} value={toAyah} onChange={(e) => setToAyah(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 outline-none focus:border-purple-500 text-center font-bold" />
                        </div>
                    </div>
                    <div>
                        <label className="block text-xs font-bold text-slate-500 mb-1">{t('hwRepetitions')}</label>
                        <select value={repeats} onChange={(e) => setRepeats(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 outline-none focus:border-purple-500 font-bold text-center">
                            {[1, 2, 3, 5, 7, 10, 15, 20].map(n => <option key={n} value={n}>{n} {t('times')}</option>)}
                        </select>
                    </div>
                </div>
                <div className="p-4 bg-slate-50 border-t border-slate-100 flex gap-3">
                    <button onClick={onClose} className="flex-1 py-2.5 rounded-xl font-bold text-slate-500 bg-white border border-slate-200 hover:bg-slate-100">{t('cancel')}</button>
                    <button onClick={handleSave} className="flex-1 py-2.5 rounded-xl font-bold text-white bg-purple-600 hover:bg-purple-500 shadow-md">{t('saveHW')}</button>
                </div>
            </div>
        </div>
    );
}

function AudioPlayerModal({ surah, onClose, t, isAr, hwTask, onHWComplete }) {
    const initialFrom = hwTask ? hwTask.fromAyah : 1;
    const initialTo = hwTask ? hwTask.toAyah : surah.totalAyahs;

    const [fromAyah, setFromAyah] = useState(initialFrom);
    const [toAyah, setToAyah] = useState(initialTo);
    const [currentAyah, setCurrentAyah] = useState(initialFrom);
    const [isPlaying, setIsPlaying] = useState(false);
    const [ayahText, setAyahText] = useState('');
    const [isLoadingText, setIsLoadingText] = useState(false);
    
    const [loopsCompleted, setLoopsCompleted] = useState(0);
    const [hwFinished, setHwFinished] = useState(false);
    const audioRef = useRef(null);

    const pad = (num) => String(num).padStart(3, '0');
    // Using Mahmoud Khalil Al-Husary 128kbps from everyayah.com
    const audioSrc = `https://everyayah.com/data/Husary_128kbps/${pad(surah.id)}${pad(currentAyah)}.mp3`;

    useEffect(() => {
        let isMounted = true;
        const fetchAyahText = async () => {
            setIsLoadingText(true);
            try {
                const res = await fetch(`https://api.alquran.cloud/v1/ayah/${surah.id}:${currentAyah}/quran-uthmani`);
                const data = await res.json();
                if (isMounted && data.code === 200) {
                    setAyahText(data.data.text);
                }
            } catch (err) {
                console.error('Failed to fetch ayah text', err);
            } finally {
                if (isMounted) setIsLoadingText(false);
            }
        };
        fetchAyahText();
        return () => { isMounted = false; };
    }, [surah.id, currentAyah]);

    useEffect(() => {
        if (isPlaying && audioRef.current && !hwFinished) {
            audioRef.current.play().catch(e => {
                console.error('Audio play blocked or failed:', e);
                setIsPlaying(false);
            });
        }
    }, [currentAyah, isPlaying, hwFinished]);

    const handlePlayPause = () => {
        if (hwFinished) return;
        if (isPlaying) {
            audioRef.current.pause();
            setIsPlaying(false);
        } else {
            let f = Math.max(1, Math.min(parseInt(fromAyah)||1, surah.totalAyahs));
            let t_val = Math.max(f, Math.min(parseInt(toAyah)||surah.totalAyahs, surah.totalAyahs));
            setFromAyah(f);
            setToAyah(t_val);
            if (!isPlaying && (currentAyah < f || currentAyah > t_val)) {
                setCurrentAyah(f);
            }
            setIsPlaying(true);
        }
    };

    const handleStop = () => {
        setIsPlaying(false);
        if (audioRef.current) {
            audioRef.current.pause();
            audioRef.current.currentTime = 0;
        }
        setCurrentAyah(fromAyah);
    };

    const handleEnded = () => {
        if (currentAyah < toAyah) {
            setCurrentAyah(prev => prev + 1);
        } else {
            if (hwTask) {
                const newLoops = loopsCompleted + 1;
                setLoopsCompleted(newLoops);
                if (newLoops >= hwTask.requiredRepeats) {
                    setIsPlaying(false);
                    setHwFinished(true);
                    onHWComplete();
                } else {
                    setCurrentAyah(fromAyah); // loop back to start
                }
            } else {
                setIsPlaying(false);
                setCurrentAyah(fromAyah);
            }
        }
    };

    return (
        <div className="fixed inset-0 z-[200] flex items-center justify-center bg-slate-900/80 backdrop-blur-sm p-4 animate-fade-in-up" dir={isAr ? 'rtl' : 'ltr'}>
            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden border-2 border-green-500 relative">
                
                {hwFinished && (
                    <div className="absolute inset-0 z-50 bg-white/95 backdrop-blur flex flex-col items-center justify-center p-6 text-center animate-fade-in-up">
                        <div className="text-6xl mb-4 anim-tada">🎉</div>
                        <h2 className="text-2xl font-bold text-green-700 mb-2">{isAr ? 'أحسنت!' : 'Great Job!'}</h2>
                        <p className="text-slate-600 font-medium mb-6">{isAr ? 'لقد أتممت واجب الاستماع بنجاح.' : 'You have successfully completed the listening assignment.'}</p>
                        <button onClick={onClose} className="bg-green-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg hover:bg-green-500 w-full transition-transform hover:scale-105">{t('close')}</button>
                    </div>
                )}

                <div className={`p-4 flex justify-between items-center text-white ${hwTask ? 'bg-gradient-to-r from-purple-800 to-purple-600' : 'bg-gradient-to-r from-green-800 to-green-600'}`}>
                    <div className="flex items-center gap-2">
                        <i className="fas fa-headphones-alt text-xl text-white/80"></i>
                        <span className="font-bold">{hwTask ? t('assignHW') : t('audioPlayer')}</span>
                    </div>
                    <button onClick={onClose} className="w-8 h-8 rounded-full flex items-center justify-center hover:bg-white/20 transition-colors">
                        <i className="fas fa-times"></i>
                    </button>
                </div>
                
                <div className="p-6">
                    <div className="text-center mb-6">
                        <h2 className="text-2xl font-bold text-slate-800 mb-1">{isAr ? surah.name : surah.enName}</h2>
                        <p className="text-sm text-slate-500">{t('ayahs')} {surah.totalAyahs}</p>
                    </div>

                    {hwTask && (
                        <div className="bg-purple-50 text-purple-800 p-2.5 rounded-xl text-center font-bold text-sm mb-5 border border-purple-200 shadow-sm flex items-center justify-center gap-2">
                            <i className="fas fa-sync-alt text-purple-500"></i>
                            {t('hwProgress')}: <span className="text-lg mx-1">{loopsCompleted}</span> / {hwTask.requiredRepeats} {t('times')}
                        </div>
                    )}

                    <div className="flex gap-4 mb-6">
                        <div className="flex-1 bg-slate-50 p-3 rounded-xl border border-slate-200">
                            <label className="block text-xs font-bold text-slate-500 mb-1">{t('fromAyah')}</label>
                            <input type="number" min="1" max={surah.totalAyahs} value={fromAyah} disabled={isPlaying || !!hwTask}
                                onChange={(e) => setFromAyah(e.target.value)}
                                className="w-full bg-white border border-slate-300 rounded-lg px-3 py-2 text-center font-bold focus:outline-none focus:border-green-500 disabled:opacity-50" />
                        </div>
                        <div className="flex-1 bg-slate-50 p-3 rounded-xl border border-slate-200">
                            <label className="block text-xs font-bold text-slate-500 mb-1">{t('toAyah')}</label>
                            <input type="number" min="1" max={surah.totalAyahs} value={toAyah} disabled={isPlaying || !!hwTask}
                                onChange={(e) => setToAyah(e.target.value)}
                                className="w-full bg-white border border-slate-300 rounded-lg px-3 py-2 text-center font-bold focus:outline-none focus:border-green-500 disabled:opacity-50" />
                        </div>
                    </div>

                    <div className={`${hwTask ? 'bg-purple-50 border-purple-100' : 'bg-green-50 border-green-100'} rounded-2xl p-4 flex flex-col items-center justify-center mb-6 border min-h-[140px] relative`}>
                        <div className="absolute top-3 right-3 flex items-end justify-center gap-1 h-4">
                            {isPlaying ? (
                                <>
                                    <div className="audio-bar w-1"></div><div className="audio-bar w-1"></div><div className="audio-bar w-1"></div>
                                </>
                            ) : (
                                <i className={`fas fa-music ${hwTask ? 'text-purple-300/50' : 'text-green-300/50'}`}></i>
                            )}
                        </div>
                        
                        <div className="text-center w-full mt-2 mb-3">
                            <span className={`text-xs font-bold ${hwTask ? 'text-purple-600' : 'text-green-600'} mb-2 block`}>{t('nowPlaying')}: {currentAyah}</span>
                            {isLoadingText ? (
                                <div className="flex justify-center py-4"><i className={`fas fa-spinner fa-spin ${hwTask ? 'text-purple-400' : 'text-green-400'} text-2xl`}></i></div>
                            ) : (
                                <p className="text-[28px] sm:text-[36px] text-slate-800 text-center leading-normal" dir="rtl" style={{ fontFamily: "'Traditional Arabic', 'me_quran', serif", padding: '0 10px' }}>
                                    {ayahText} <span className={`${hwTask ? 'text-purple-700' : 'text-green-700'} text-[24px] mx-1 font-sans`}>﴿{Number(currentAyah).toLocaleString('ar-EG')}﴾</span>
                                </p>
                            )}
                        </div>
                    </div>

                    <div className="flex justify-center gap-4">
                        <button onClick={handlePlayPause} className={`w-16 h-16 rounded-full ${hwTask ? 'bg-purple-600 hover:bg-purple-500 shadow-purple-500/40' : 'bg-green-600 hover:bg-green-500 shadow-green-500/40'} text-white shadow-lg flex items-center justify-center text-2xl transition-transform hover:scale-105`}>
                            <i className={`fas ${isPlaying ? 'fa-pause' : 'fa-play pl-1'}`}></i>
                        </button>
                        <button onClick={handleStop} disabled={!isPlaying && currentAyah === fromAyah} className="w-16 h-16 rounded-full bg-slate-100 hover:bg-slate-200 text-slate-600 border border-slate-200 flex items-center justify-center text-xl transition-transform hover:scale-105 disabled:opacity-50 disabled:hover:scale-100">
                            <i className="fas fa-stop"></i>
                        </button>
                    </div>
                </div>
                
                <audio ref={audioRef} src={audioSrc} onEnded={handleEnded} preload="auto" />
            </div>
        </div>
    );
}

// ── Sticker Picker ───────────────────────────────────────────────────────────

        { key:'nature',  label: isAr?'طبيعة':'Nature',   items: STICKER_SETS.nature },
        { key:'trophies',label: isAr?'جوائز':'Trophies', items: STICKER_SETS.trophies },

                <span className="text-xs font-bold text-slate-600">{isAr ? 'اختر ملصقاً 🎁' : 'Choose a sticker 🎁'}</span>
                <button onClick={onClose} className="text-slate-400 hover:text-slate-600 text-lg leading-none px-1">✕</button>
            </div>
            <div className="flex gap-1 flex-wrap mb-2">
                {sets.map(s => (
                    <button key={s.key} onClick={() => setActiveSet(s.key)}
                        className={`px-2 py-0.5 rounded-full text-xs border transition-colors ${activeSet===s.key ? 'bg-yellow-400 border-yellow-500 text-yellow-900 font-bold' : 'bg-slate-50 border-slate-200 text-slate-500 hover:bg-yellow-50'}`}>

                        {sticker}
                    </button>
                ))}
            </div>
        </div>
    );
}

// ── Juz Visual Report ────────────────────────────────────────────────────────
function JuzVisualReport({ juzNum, surahs, juzData, juzPlanId, isAr, t, totalJuzAyahs, onScrollToSurah }) {
    const plan = JUZ_WEEKLY_PLANS.find(p => p.id === (juzPlanId || 'none')) || JUZ_WEEKLY_PLANS[0];
    const isJuz30 = juzNum === 30;

    const stats = useMemo(() => {
        let done=[], inProg=[], notStarted=[], needsRev=[], recentRev=[], oldRev=[];
        const now = Date.now();
        const FOURTEEN_DAYS = 14*24*60*60*1000;
        let totalMemorized = 0;

        surahs.forEach(s => {
            const d = juzData[s.id] || {};
            const m = d.memorized || 0;
            totalMemorized += m;
            if (m === s.totalAyahs) done.push(s);
            else if (m > 0) inProg.push(s);
            else notStarted.push(s);

            // Revision analysis
            const revs = d.revisions || {};
            const vals = Object.values(revs);
            if (vals.length > 0) {
                let hasWeak = false, latestDate = 0;
                vals.forEach(v => {
                    const rating = typeof v==='object' ? v.rating : v;
                    const date = typeof v==='object' ? v.date : 0;
                    if (rating === 'weak') hasWeak = true;
                    if (date > latestDate) latestDate = date;
                });
                if (hasWeak) needsRev.push(s);
                else if (now - latestDate > FOURTEEN_DAYS) oldRev.push(s);
                else recentRev.push(s);
            }
        });

        return { done, inProg, notStarted, needsRev, recentRev, oldRev, totalMemorized };
    }, [juzData, surahs]);

    const remaining = totalJuzAyahs - stats.totalMemorized;
    const pct = Math.round((stats.totalMemorized / totalJuzAyahs) * 100);
    const eta = plan.ayahsPerWeek > 0 ? formatJuzETA(remaining, plan.ayahsPerWeek, isAr) : null;

    const accentColor = isJuz30 ? '#15803d' : '#d97706';
    const lightBg = isJuz30 ? 'bg-green-50' : 'bg-amber-50';
    const borderColor = isJuz30 ? 'border-green-200' : 'border-amber-200';
    const textColor = isJuz30 ? 'text-green-800' : 'text-amber-800';
    const headerGrad = isJuz30 ? 'from-green-800 to-green-600' : 'from-amber-600 to-yellow-500';

    return (
        <div className="space-y-6">
            {/* Plan info bar */}
            <section className="bg-gradient-to-r from-teal-50 to-emerald-50 rounded-2xl shadow-sm border border-teal-200 p-4 sm:p-5 flex flex-col sm:flex-row items-center justify-between gap-4">
                <div className="flex items-center gap-3">
                    <div className="bg-teal-100 text-teal-600 p-3 rounded-full shrink-0"><i className="fas fa-route text-2xl"></i></div>
                    <div>
                        {plan.ayahsPerWeek > 0 ? (
                            <>
                                <h3 className="font-bold text-teal-900 text-sm sm:text-base">{t('juzWeeklyPlan')}: {isAr ? plan.arLabel : plan.enLabel}</h3>
                                <p className="text-xs sm:text-sm text-teal-700 mt-1"><strong>{t('remainingAyahs')}:</strong> {remaining} {t('ayahs')}</p>
                            </>
                        ) : (
                            <>
                                <h3 className="font-bold text-teal-900 text-sm sm:text-base">{isAr ? 'لم يتم تحديد خطة للجزء' : 'No Juz Plan Set'}</h3>
                                <p className="text-xs sm:text-sm text-teal-700 mt-1 opacity-80">{isAr ? 'اختر خطتك الأسبوعية من الأعلى.' : 'Select your weekly plan from above.'}</p>
                            </>
                        )}
                    </div>
                </div>
                {plan.ayahsPerWeek > 0 && (
                    <div className="bg-white border border-teal-100 rounded-xl p-3 px-6 text-center shadow-sm shrink-0 w-full sm:w-auto">
                        <p className="text-[10px] sm:text-xs text-gray-500 mb-1">{t('etaToFinish')}</p>
                        <p className="font-black text-teal-600 text-sm sm:text-lg" dir={isAr?"rtl":"ltr"}>
                            {eta}
                        </p>
                    </div>
                )}
            </section>

            {/* Visual Report Box */}
            <section className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6">
                <h3 className="font-bold text-lg mb-6 flex items-center gap-2 text-slate-800">
                    <i className="fas fa-chart-pie text-green-600 text-xl"></i> {t('juzReport')}
                </h3>
                
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    {/* Col 1: In Progress */}
                    <div className="bg-blue-50/50 border border-blue-100 p-5 rounded-2xl h-full flex flex-col">
                        <h4 className="font-bold text-blue-800 text-sm mb-4 flex items-center gap-2">
                            <i className="fas fa-spinner fa-spin-pulse"></i> {t('juzMemorizingNow')}
                        </h4>
                        <div className="space-y-2.5 max-h-[180px] overflow-y-auto pr-1 custom-scrollbar">
                            {stats.inProg.length > 0 ? stats.inProg.map(s => {
                                const d = juzData[s.id] || {};
                                const m = d.memorized || 0;
                                const p = Math.round((m/s.totalAyahs)*100);
                                return (
                                    <button key={s.id} onClick={() => onScrollToSurah && onScrollToSurah(s.id)} className="w-full text-start bg-white p-3 rounded-xl shadow-sm border border-blue-50 hover:border-blue-300 transition-all group">
                                        <div className="flex justify-between items-center mb-2 text-xs">
                                            <span className="font-bold text-slate-700 group-hover:text-blue-700">{isAr ? s.name : s.enName}</span>
                                            <span className="text-blue-600 font-bold" dir="ltr">{m} / {s.totalAyahs}</span>
                                        </div>
                                        <div className="w-full bg-blue-100 rounded-full h-1.5">
                                            <div className="bg-blue-500 h-1.5 rounded-full transition-all duration-500" style={{width:`${p}%`}}></div>
                                        </div>
                                    </button>
                                );
                            }) : <p className="text-xs text-slate-500 my-auto text-center">{t('noData')}</p>}
                        </div>
                    </div>

                    {/* Col 2: Completed */}
                    <div className="bg-green-50/50 border border-green-100 p-5 rounded-2xl h-full flex flex-col">
                        <h4 className="font-bold text-green-800 text-sm mb-4 flex items-center gap-2">
                            <i className="fas fa-check-double"></i> {t('juzCompleted')}
                        </h4>
                        <div className="flex flex-wrap gap-2 max-h-[180px] overflow-y-auto pr-1 custom-scrollbar content-start">
                            {stats.done.length > 0 ? stats.done.map(s => (
                                <button key={s.id} onClick={() => onScrollToSurah && onScrollToSurah(s.id)} className="bg-white text-green-700 px-3 py-1.5 rounded-lg text-[11px] sm:text-xs font-bold border border-green-200 shadow-sm hover:bg-green-600 hover:text-white transition-colors">
                                    {isAr ? s.name : s.enName}
                                </button>
                            )) : <p className="text-xs text-slate-500 my-auto w-full text-center">{t('noData')}</p>}
                        </div>
                    </div>

                    {/* Col 3: Revision status */}
                    <div className="flex flex-col gap-4 h-full">
                        <div className="bg-red-50/70 border border-red-100 p-4 rounded-2xl flex-1 flex flex-col">
                            <h4 className="font-bold text-red-700 mb-3 flex items-center gap-2 text-sm">
                                <i className="fas fa-exclamation-triangle"></i> {t('juzNeedsRevision')}
                            </h4>
                            <div className="flex flex-wrap gap-2 overflow-y-auto custom-scrollbar max-h-[80px] content-start">
                                {stats.needsRev.length > 0 ? stats.needsRev.map(s => (
                                    <button key={s.id} onClick={() => onScrollToSurah && onScrollToSurah(s.id)} className="bg-white text-red-600 px-3 py-1.5 rounded-lg text-[10px] font-bold border border-red-200 shadow-sm hover:bg-red-50">
                                        {isAr ? s.name : s.enName}
                                    </button>
                                )) : <span className="text-xs text-slate-400 my-auto">—</span>}
                            </div>
                        </div>

                        <div className="bg-orange-50/70 border border-orange-100 p-4 rounded-2xl flex-1 flex flex-col">
                            <h4 className="font-bold text-orange-700 mb-3 flex items-center gap-2 text-sm">
                                <i className="fas fa-history"></i> {t('juzOldRevision')}
                            </h4>
                            <div className="flex flex-wrap gap-2 overflow-y-auto custom-scrollbar max-h-[80px] content-start">
                                {stats.oldRev.length > 0 ? stats.oldRev.map(s => (
                                    <button key={s.id} onClick={() => onScrollToSurah && onScrollToSurah(s.id)} className="bg-white text-orange-600 px-3 py-1.5 rounded-lg text-[10px] font-bold border border-orange-200 shadow-sm hover:bg-orange-50">
                                        {isAr ? s.name : s.enName}
                                    </button>
                                )) : <span className="text-xs text-slate-400 my-auto">—</span>}
                            </div>
                        </div>

                        <div className="bg-green-50/70 border border-green-100 p-4 rounded-2xl flex-1 flex flex-col">
                            <h4 className="font-bold text-green-700 mb-3 flex items-center gap-2 text-sm">
                                <i className="fas fa-check-circle"></i> {t('juzRecentRevision')}
                            </h4>
                            <div className="flex flex-wrap gap-2 overflow-y-auto custom-scrollbar max-h-[80px] content-start">
                                {stats.recentRev.length > 0 ? stats.recentRev.map(s => (
                                    <button key={s.id} onClick={() => onScrollToSurah && onScrollToSurah(s.id)} className="bg-white text-green-600 px-3 py-1.5 rounded-lg text-[10px] font-bold border border-green-200 shadow-sm hover:bg-green-50">
                                        {isAr ? s.name : s.enName}
                                    </button>
                                )) : <span className="text-xs text-slate-400 my-auto">—</span>}
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    );
}

// ── Juz Plan Selector ────────────────────────────────────────────────────────
function JuzPlanSelector({ juzNum, planId, onSetPlan, isReadOnly, isAr, t }) {
    const [open, setOpen] = useState(false);
    const plan = JUZ_WEEKLY_PLANS.find(p => p.id === (planId || 'none')) || JUZ_WEEKLY_PLANS[0];
    const isJuz30 = juzNum === 30;
    const accentBg = 'bg-white/20 hover:bg-white/30';
    const accentBorder = 'border-white/30';

    if (isReadOnly) {
        if (plan.ayahsPerWeek === 0) return null;
        return (
            <div className="flex items-center justify-center gap-1 sm:gap-1.5 px-2 py-1.5 sm:px-4 sm:py-2 rounded-xl text-white text-[9px] sm:text-xs font-bold bg-white/20 border border-white/30 transition-colors shadow-sm w-full max-w-[130px] sm:max-w-max">
                <i className="fas fa-calendar-week"></i>
                <span className="truncate">{isAr ? plan.arLabel : plan.enLabel}</span>
            </div>
        );
    }

    return (
        <div className="relative">
            <button onClick={() => setOpen(!open)}
                className={`flex items-center justify-center gap-1 sm:gap-1.5 px-2 py-1.5 sm:px-4 sm:py-2 rounded-xl text-white text-[9px] sm:text-xs font-bold ${accentBg} border ${accentBorder} transition-colors shadow-sm w-full max-w-[130px] sm:max-w-max`}>
                <i className="fas fa-calendar-week"></i>
                <span className="truncate">{plan.ayahsPerWeek > 0 ? (isAr ? plan.arLabel : plan.enLabel) : t('setJuzPlan')}</span>
                <i className={`fas fa-chevron-${open ? 'up' : 'down'} text-[8px] sm:text-[10px] pr-1`}></i>
            </button>
            {open && (
                <>
                    <div className="fixed inset-0 z-40" onClick={() => setOpen(false)} />
                    <div className="absolute top-full mt-2 bg-white rounded-2xl shadow-xl border border-slate-200 p-3 z-50 min-w-[200px]" style={{[isAr?'right':'left']:0}}>
                        <p className="text-xs text-slate-500 font-medium mb-2 px-1">{t('juzPlanDesc')}</p>
                        <div className="space-y-1">
                            {JUZ_WEEKLY_PLANS.map(p => (
                                <button key={p.id} onClick={() => { onSetPlan(p.id); setOpen(false); }}
                                    className={`w-full text-start px-3 py-2 rounded-xl text-sm font-medium transition-colors flex items-center justify-between
                                        ${planId === p.id ? (isJuz30 ? 'bg-green-100 text-green-800 font-bold' : 'bg-amber-100 text-amber-800 font-bold') : 'hover:bg-slate-50 text-slate-700'}`}>
                                    <span>{isAr ? p.arLabel : p.enLabel}</span>
                                    {planId === p.id && <i className="fas fa-check text-xs"></i>}
                                </button>
                            ))}
                        </div>
                    </div>
                </>
            )}
        </div>
    );
}

// ── Full Quran Plan Selector ────────────────────────────────────────────────
function FullQuranPlanSelector({ planId, onSetPlan, isReadOnly, isAr, t }) {

                <i className="fas fa-calendar-alt"></i>
                <span className="truncate">{isAr ? plan.arTitle : plan.enTitle}</span>
            </div>

    }

    return (
        <div className="relative">
            <button onClick={() => setOpen(!open)}
                className="flex items-center justify-center gap-1 sm:gap-1.5 px-2 py-1.5 sm:px-4 sm:py-2 rounded-xl text-white text-[9px] sm:text-xs font-bold bg-green-600 hover:bg-green-500 border border-green-500 transition-colors shadow-sm w-full max-w-[130px] sm:max-w-max">
                <i className="fas fa-calendar-alt"></i>
                <span className="truncate max-w-[90px] sm:max-w-[160px]">{plan.id !== 'none' ? (isAr ? plan.arTitle : plan.enTitle) : t('setPlan')}</span>
                <i className={`fas fa-chevron-${open ? 'up' : 'down'} text-[8px] sm:text-[10px] pr-1`}></i>
            </button>
            {open && (
                <>
                    <div className="fixed inset-0 z-40" onClick={() => setOpen(false)} />
                    <div className="absolute top-full mt-2 bg-white rounded-2xl shadow-xl border border-slate-200 p-3 z-50 min-w-[250px]" style={{[isAr?'right':'left']:0}}>
                        <p className="text-xs text-slate-500 font-medium mb-2 px-1">{t('selectPlanMsg')}</p>
                        <div className="space-y-1 max-h-[60vh] overflow-y-auto custom-scrollbar">
                            {MEMORIZATION_PLANS.map(p => (
                                <button key={p.id} onClick={() => { onSetPlan(p.id); setOpen(false); }}
                                    className={`w-full text-start px-3 py-2 rounded-xl text-sm font-medium transition-colors flex items-center justify-between
                                        ${planId === p.id ? 'bg-green-100 text-green-800 font-bold' : 'hover:bg-slate-50 text-slate-700'}`}>
                                    <span className="truncate">{isAr ? p.arTitle : p.enTitle}</span>

                    </div>
                </>
            )}

    );
}

// ── Child-Friendly Surah Card for Juz 29/30 ─────────────────────────────────
function JuzSurahCard({ surah, juzData, onUpdate, isReadOnly, isAr, t, juzNum, onPlayAudio }) {
    const data = juzData[surah.id] || { memorized: 0, revisions: {}, stickers: [] };
    const { memorized, revisions, stickers } = data;
    const isComplete = memorized === surah.totalAyahs;
    const pct = Math.round((memorized / surah.totalAyahs) * 100);

    const [showStickerPicker, setShowStickerPicker] = useState(false);
    const [openRevNum, setOpenRevNum] = useState(null);
    const emoji = SURAH_EMOJI[surah.id] || '📖';

    const isJuz30 = juzNum === 30;
    const accentColor = isJuz30 ? '#15803d' : '#d97706';
    const lightBg = isJuz30 ? '#f0fdf4' : '#fffbeb';
    const borderColor = isComplete ? '#fbbf24' : (isJuz30 ? '#bbf7d0' : '#fde68a');

    const toggleComplete = () => { if (isReadOnly) return; onUpdate(surah.id, { memorized: isComplete ? 0 : surah.totalAyahs }); };
    const handleMemorized = (val) => { if (isReadOnly) return; onUpdate(surah.id, { memorized: Math.max(0, Math.min(surah.totalAyahs, parseInt(val)||0)) }); };
    const addSticker = (stk) => { if (isReadOnly) return; onUpdate(surah.id, { stickers: [...(stickers||[]), stk] }); setShowStickerPicker(false); };
    const removeSticker = (idx) => { if (isReadOnly) return; const n=[...(stickers||[])]; n.splice(idx,1); onUpdate(surah.id, { stickers:n }); };
    const setRevision = (num, rating) => {
        if (isReadOnly) return;
        const newR = {...(revisions||{})};
        if (rating===null) delete newR[num]; else newR[num] = { rating, date:Date.now() };
        onUpdate(surah.id, { revisions:newR }); setOpenRevNum(null);
    };
    const clearRevisions = () => { if (isReadOnly) return; onUpdate(surah.id, { revisions:{} }); };
    const resetSurah = () => { if (isReadOnly) return; onUpdate(surah.id, { memorized:0, revisions:{}, stickers:[] }); };

    return (
        <div id={`juz${juzNum}-surah-${surah.id}`}
            className={`child-card rounded-2xl p-4 transition-all ${isComplete ? 'child-card-complete' : 'child-card-incomplete'}`}
            style={{ borderColor, background: isComplete ? undefined : 'white' }}>
            <div className="flex items-start gap-3 mb-3">
                <div className="surah-emoji-badge text-2xl" style={{ background: lightBg, color: accentColor, fontSize:'1.6rem' }}>{emoji}</div>
                <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2">
                        <span className="text-xs font-bold px-2 py-0.5 rounded-full text-white" style={{ background:accentColor }}>{surah.id}</span>
                        <h3 className="text-base font-bold text-slate-800 truncate">{isAr ? surah.name : surah.enName}</h3>
                        <button onClick={() => onPlayAudio({ surah, hwTask: null })} className="text-green-500 hover:text-green-700 bg-green-50 hover:bg-green-100 w-6 h-6 rounded-full flex items-center justify-center transition-colors" title={t('listenSurah')}>
                            <i className="fas fa-headphones-alt text-xs"></i>
                        </button>
                        {isComplete && <span className="text-yellow-500 text-lg anim-tada">🌟</span>}
                    </div>
                    <p className="text-xs text-slate-400 mt-0.5">{isAr ? surah.enName : surah.enMeaning} • {surah.totalAyahs} {t('ayahs')}</p>
                </div>
                <button onClick={toggleComplete} className={`w-9 h-9 rounded-full flex items-center justify-center text-lg transition-all shrink-0 ${isComplete ? 'text-yellow-500 bg-yellow-100 shadow-md scale-110' : 'text-slate-300 hover:text-yellow-400 bg-slate-50 hover:bg-yellow-50'}`}>
                    {isComplete ? '✅' : '☐'}
                </button>
            </div>
            <div className="mb-3">
                <div className="flex justify-between items-center mb-1">
                    <span className="text-xs text-slate-500">{pct}% {t('memorizedOf') || 'memorized'}</span>
                    <span className="text-xs font-bold" style={{ color:accentColor }}>{memorized} / {surah.totalAyahs}</span>
                </div>
                <div className="w-full bg-slate-100 rounded-full h-3 overflow-hidden">
                    <div className="h-full rounded-full transition-all duration-500" style={{ width:`${pct}%`, background: isComplete ? 'linear-gradient(90deg,#f59e0b,#10b981)' : accentColor }} />
                </div>
                {!isReadOnly && (
                    <div className="flex items-center gap-2 mt-2">
                        <input type="range" min="0" max={surah.totalAyahs} value={memorized} className="flex-1 h-2 cursor-pointer rounded-lg" style={{ accentColor }} onChange={(e) => handleMemorized(e.target.value)} />
                        <input type="number" min="0" max={surah.totalAyahs} value={memorized || ''} placeholder="0"
                            className="w-14 text-center text-sm font-bold rounded-lg border border-slate-200 py-1 focus:outline-none"
                            style={{ borderColor: accentColor+'80' }} onChange={(e) => handleMemorized(e.target.value)} />
                    </div>
                )}
            </div>
            <div className="flex items-center gap-2 mb-3">
                <span className="text-xs text-slate-500 font-medium shrink-0">{t('revision')}</span>
                <div className="flex gap-1.5" dir="ltr">
                    {[1,2,3,4,5].map(num => {
                        const rev = (revisions||{})[num];
                        const rating = rev?.rating || null;
                        const isOpen = openRevNum === num;
                        const cls = rating==='excellent' ? 'bg-green-100 border-green-500 text-green-700' :
                                    rating==='good' ? 'bg-blue-100 border-blue-500 text-blue-700' :
                                    rating==='weak' ? 'bg-orange-100 border-orange-500 text-orange-700' :
                                    'bg-slate-50 border-slate-200 text-slate-400 hover:border-green-400';
                        return (
                            <div key={num} className="relative">
                                <button onClick={() => !isReadOnly && setOpenRevNum(isOpen ? null : num)}
                                    className={`w-7 h-7 rounded-full border text-xs flex items-center justify-center font-bold transition-all ${cls} ${isReadOnly?'cursor-default':'cursor-pointer'}`}>
                                    {rating==='excellent'?'★':rating==='good'?'✓':rating==='weak'?'!':num}
                                </button>
                                {isOpen && !isReadOnly && (
                                    <>
                                        <div className="fixed inset-0 z-40" onClick={() => setOpenRevNum(null)} />
                                        <div className="absolute bottom-9 left-1/2 -translate-x-1/2 bg-white rounded-xl shadow-xl border border-slate-200 p-1.5 flex gap-1 z-50 whitespace-nowrap">
                                            <button onClick={() => setRevision(num,'excellent')} className="px-2 py-1 text-xs bg-green-50 hover:bg-green-100 text-green-700 rounded-lg border border-green-200">★ {t('excellent')}</button>
                                            <button onClick={() => setRevision(num,'good')} className="px-2 py-1 text-xs bg-blue-50 hover:bg-blue-100 text-blue-700 rounded-lg border border-blue-200">✓ {t('good')}</button>
                                            <button onClick={() => setRevision(num,'weak')} className="px-2 py-1 text-xs bg-orange-50 hover:bg-orange-100 text-orange-700 rounded-lg border border-orange-200">! {t('weak')}</button>
                                            {rating && <button onClick={() => setRevision(num,null)} className="px-2 py-1 text-xs bg-slate-50 hover:bg-slate-100 text-slate-400 rounded-lg border border-slate-200">✕</button>}
                                        </div>
                                    </>
                                )}
                            </div>
                        );
                    })}
                </div>
                {!isReadOnly && Object.keys(revisions||{}).length > 0 && (
                    <button onClick={clearRevisions} className="ml-auto text-slate-300 hover:text-red-400 text-xs px-1.5 py-0.5 rounded hover:bg-red-50 transition-colors" title={t('resetRevisions')}>↺</button>
                )}
            </div>
            <div className="border-t border-slate-100 pt-3">
                <div className="flex items-center gap-1 flex-wrap">
                    <span className="text-xs text-slate-400 font-medium shrink-0">{t('stickerLabel')}</span>
                    {(stickers||[]).map((stk, idx) => (
                        <span key={idx} className="sticker-award text-2xl sticker-pop" title={isReadOnly ? stk : t('removeSticker')} onClick={() => !isReadOnly && removeSticker(idx)}>{stk}</span>
                    ))}
                    {!isReadOnly && (
                        <button onClick={() => setShowStickerPicker(!showStickerPicker)}
                            className="flex items-center gap-1 px-2 py-1 rounded-full text-xs font-bold border-2 border-dashed border-yellow-400 text-yellow-600 hover:bg-yellow-50 hover:border-yellow-500 transition-colors">
                            + {t('addStickerBtn')}
                        </button>
                    )}
                </div>
                {showStickerPicker && !isReadOnly && (
                    <StickerPicker onSelect={addSticker} onClose={() => setShowStickerPicker(false)} isAr={isAr} />
                )}
            </div>
            {!isReadOnly && (
                <div className="flex justify-end mt-2">
                    <button onClick={resetSurah} className="text-xs text-slate-300 hover:text-red-400 hover:bg-red-50 px-2 py-0.5 rounded transition-colors">↺ {t('resetSurahData')}</button>
                </div>
            )}
        </div>
    );
}

                                        <input type="text" value={teacherSig} onChange={e=>setTeacherSig(e.target.value)} dir={certLang==='ar'?'rtl':'ltr'}
                                            className="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500 font-medium text-sm bg-slate-50" />
                                    </div>
