                                <li key={c} className="flex justify-between items-center bg-white p-4 rounded-xl border border-gray-200 shadow-sm hover:shadow-md transition-shadow">
                                    <span className="font-bold text-xl text-green-800" dir="ltr">{c}</span>
                                    <button onClick={()=>handleRemoveCode(c)} className="text-red-500 hover:text-white hover:bg-red-500 p-2.5 rounded-lg transition-colors flex items-center gap-2">
                                        <i className="fas fa-trash-alt"></i> <span className="hidden sm:inline">{t('delete')}</span>
                                    </button>
                                </li>
                            ))}
                        </ul>
                    )}
                    <div className="mt-12 text-center border-t pt-6 flex flex-col items-center gap-4">
                        <div className="flex flex-col items-center gap-2">
                            <label className="text-sm font-bold text-gray-600" htmlFor="admin-lang">{t('adminSwitchLang')}</label>
                            <select id="admin-lang" value={lang} onChange={(e)=>setLang(e.target.value)} className="bg-gray-200 hover:bg-gray-300 text-gray-800 px-4 py-2 rounded-lg font-bold border border-gray-400 cursor-pointer max-w-xs">
                                {UI_LANGS.map(code => <option key={code} value={code}>{LANG_LABELS[code]}</option>)}
                            </select>
                        </div>
                        <button onClick={handleLogout} className="text-gray-500 hover:text-red-600 font-medium py-2 px-4 transition-colors flex items-center gap-2">
                            <i className="fas fa-sign-out-alt"></i> {t('logoutAdmin')}
                        </button>
                    </div>
                    <div className="mt-8 text-center text-slate-500 font-bold text-sm">
                        {t('copyright')}
                    </div>
                </div>
                {dialog.isOpen && (
                    <div className="fixed inset-0 z-[150] flex items-center justify-center bg-black/50 p-4" dir={isRtl?'rtl':'ltr'}>
                        <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6">
                            <h3 className="text-lg font-bold text-gray-800 mb-4">{dialog.message}</h3>
                            <div className={`flex gap-3 mt-2 ${isRtl?'justify-end':'justify-start'}`}>
                                {dialog.type!=='alert' && <button onClick={()=>setDialog({...dialog,isOpen:false})} className="px-4 py-2 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-xl font-medium">{t('cancel')}</button>}
                                <button onClick={()=>dialog.onConfirm()} className="px-4 py-2 text-white bg-green-900 hover:bg-green-800 rounded-xl font-medium">{t('confirm')}</button>
                            </div>
                        </div>
                    </div>
                )}
            </div>
        );
    }

    // ── Main App ─────────────────────────────────────────────────────────────
    return (
        <div className="min-h-screen bg-slate-50 pb-20 pt-24 sm:pt-2" dir={isRtl?'rtl':'ltr'}>

            {/* ── Assign HW Modal ── */}
            {showAssignHWModal && (
                <AssignHWModal onClose={() => setShowAssignHWModal(false)} onSave={handleAssignHW} t={t} lang={lang} />
            )}

            {/* ── Audio Player Modal ── */}
            {audioPlayerSurah && (
                <AudioPlayerModal 
                    surah={audioPlayerSurah.surah} 
                    hwTask={audioPlayerSurah.hwTask}
                    onHWComplete={audioPlayerSurah.hwTask ? () => handleHWComplete(audioPlayerSurah.hwTask.id) : () => {}}
                    onClose={() => setAudioPlayerSurah(null)} 
                    t={t} lang={lang} 
                />
            )}

            {/* ── Mushaf Viewer Modal ── */}
            {mushafSurah && (
                <MushafViewerModal surah={mushafSurah} onClose={() => setMushafSurah(null)} t={t} lang={lang} />
            )}

            {/* ── Unified Certificate Viewer ── */}
            {(selectedCert || selectedJuzCert) && (() => {
                const isJuz = !!selectedJuzCert;
                const cert = isJuz ? selectedJuzCert.cert : selectedCert;
                const juzNum = isJuz ? selectedJuzCert.juzNum : null;
                const onClose = isJuz ? () => setSelectedJuzCert(null) : () => setSelectedCert(null);
                return (
                    <div className="fixed inset-0 z-[120] flex items-center justify-center bg-black/80 p-2 sm:p-4 backdrop-blur-sm" dir="ltr">
                        <div className="bg-white rounded-3xl shadow-2xl w-full max-w-4xl h-[95vh] sm:h-[85vh] flex flex-col overflow-hidden">
                            <div className="bg-slate-50 border-b border-slate-200 p-3 sm:p-4 flex justify-between items-center shrink-0">
                                <span className="font-bold text-sm text-slate-800 flex items-center gap-2"><i className="fas fa-certificate text-yellow-500 text-lg"></i> {uiLocalePack(cert.certLang).certViewerAward || t('certViewerAward')}</span>
                                <button onClick={onClose} className="w-8 h-8 rounded-full flex items-center justify-center text-slate-500 hover:bg-slate-200 transition-colors"><i className="fas fa-times"></i></button>
                            </div>
                            <div className="flex-1 bg-slate-200/80 flex items-center justify-center relative shadow-inner overflow-hidden custom-scrollbar">
                                <div className="w-0 h-0 flex items-center justify-center">
                                    <div className="w-[740px] h-[560px] flex items-center justify-center origin-center transition-transform duration-300 scale-[0.45] sm:scale-[0.6] md:scale-[0.75] lg:scale-[0.85] xl:scale-100">
                                        <div className="shadow-2xl ring-1 ring-black/10 rounded-sm overflow-hidden">
                                            <CertDisplay cert={cert} studentName={currentStudent?.name} juzNum={juzNum} />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            })()}

            {/* ── Certificate Wizard ── */}
            {showCertWizard && (
                <CertWizard
                    t={t} lang={lang}
                    pct={showCertWizard.pct}
                    juzNum={showCertWizard.juzNum}
                    studentName={currentStudent?.name}
                    onClose={() => setShowCertWizard(null)}
                    onSave={(certData) => {
                        const nC = { id:Date.now(), timestamp:Date.now(), percentage:showCertWizard.pct, ...certData };
                        const key = showCertWizard.certKey;
                        saveToCloud(students.map(s => s.id===currentId ? {...s, [key]:[...(s[key]||[]),nC]} : s), currentId);
                        setShowCertWizard(null);
                        setTimeout(() => setDialog({ isOpen:true, type:'alert', message: t('certSavedToast'), onConfirm:()=>setDialog({isOpen:false})}), 300);
                    }}
                />
            )}

            {/* Login modal */}
            {showSyncModal && (
                <div className="fixed inset-0 z-[100] flex items-center justify-center bg-green-900/90 p-4" dir={isRtl?'rtl':'ltr'}>
                    <form onSubmit={handleSetSyncKey} className="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8 text-center border-4 border-yellow-400 relative">
                        <div className={`absolute top-4 ${isRtl?'left-4':'right-4'} flex items-center gap-2`}>
                            <label className="sr-only" htmlFor="login-lang">{t('chooseLanguage')}</label>
                            <select id="login-lang" value={lang} onChange={(e)=>setLang(e.target.value)} className="bg-green-100 hover:bg-green-200 text-green-800 px-2 py-1.5 rounded-lg text-xs sm:text-sm font-bold max-w-[148px] border border-green-300 cursor-pointer">
                                {UI_LANGS.map(code => <option key={code} value={code}>{LANG_LABELS[code]}</option>)}
                            </select>
                        </div>
                        <div className="w-24 h-24 mx-auto rounded-full border-4 border-yellow-400 bg-white shadow-md mb-4 mt-4 flex items-center justify-center" aria-hidden="true">
                            <i className="fas fa-book text-5xl text-green-900"></i>
                        </div>
                        <h2 className="text-2xl font-bold text-green-900 mb-2">{t('welcomeCloud')}</h2>
                        <p className="text-gray-600 mb-6 text-sm">{t('enterCode')}</p>
                        <input type="text" autoFocus required placeholder={t('yourCode')} value={tempSyncKey} onChange={(e)=>setTempSyncKey(e.target.value)} className="w-full px-4 py-3 mb-6 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-green-700 text-center text-lg font-bold text-green-900 bg-green-50" dir="ltr" disabled={isSaving} />
                        <button type="submit" disabled={isSaving} className="w-full px-4 py-3 text-white bg-green-900 hover:bg-green-800 rounded-xl font-bold text-lg disabled:opacity-50">
                            {isSaving ? t('verifying') : t('loginSync')}
                        </button>
                    </form>
                </div>
            )}

            {!isAdminMode && !showSyncModal && (
                <div className="sticky top-0 z-50 shadow-md">
                    <header className="bg-green-900 text-white border-b-4 border-yellow-500">
                        <div className="max-w-5xl mx-auto px-3 py-3 sm:px-6 flex flex-col sm:flex-row items-center justify-between gap-3">
                            <div className="flex items-center gap-3 w-full sm:w-auto justify-between sm:justify-start">
                                <div className="flex items-center gap-2 sm:gap-3">
                                    <div className="w-10 h-10 sm:w-12 sm:h-12 rounded-full border-2 border-yellow-400 bg-white shadow-sm flex items-center justify-center shrink-0" aria-hidden="true">
                                        <i className="fas fa-book text-green-900 text-lg sm:text-2xl"></i>
                                    </div>
                                    <div>
                                        <h1 className="text-lg sm:text-2xl font-bold text-white leading-tight">{isReadOnly ? t('parentPortal') : t('title')}</h1>
                                        <div className="flex items-center gap-2 mt-1 flex-wrap">
                                            <select value={lang} onChange={(e)=>setLang(e.target.value)} className="bg-white/20 hover:bg-white/30 text-white px-1 py-0.5 rounded text-[10px] sm:text-xs font-bold max-w-[120px] sm:max-w-[160px] border border-white/30 cursor-pointer" title={t('chooseLanguage')} aria-label={t('chooseLanguage')}>
                                                {UI_LANGS.map(code => <option key={code} value={code} className="bg-green-900 text-white">{LANG_LABELS[code]}</option>)}
                                            </select>
                                            {!isReadOnly && (
                                                <>
                                                    <span className={`w-2 h-2 rounded-full ${isSaving?'bg-orange-400 animate-pulse':'bg-green-400 shadow-[0_0_8px_#4ade80]'}`}></span>
                                                    <span className="text-[10px] sm:text-xs text-green-200">{isSaving ? t('saving') : t('connected')}</span>
                                                    {syncKey && (
                                                        <button onClick={handleLogout} className={`text-[10px] bg-red-500/20 hover:bg-red-500/40 text-red-100 px-2 py-0.5 rounded border border-red-500/30 flex items-center gap-1 ${isRtl?'mr-1':'ml-1'}`}>
                                                            <i className="fas fa-sign-out-alt"></i> {t('logout')}
                                                        </button>
                                                    )}
                                                </>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div className="flex-1 w-full sm:max-w-md flex items-center gap-1.5 sm:gap-2">
                                {isReadOnly ? (
                                    <div className="w-full flex items-center justify-between sm:justify-end gap-4">
                                        <span className="text-xl sm:text-2xl font-bold text-yellow-400 px-4">{currentStudent?.name}</span>
                                        <button onClick={handleLogout} className="p-2 sm:p-2.5 bg-red-600/80 hover:bg-red-50 rounded-xl text-white text-xs sm:text-sm font-bold flex items-center gap-2">
                                            <i className="fas fa-sign-out-alt"></i> {t('logout')}
                                        </button>
                                    </div>
                                ) : (
                                    <>
                                        <div className="relative flex-1">
                                            <select value={currentStudent?.id||''} onChange={(e)=>saveToCloud(students,e.target.value)} className={`w-full py-2 sm:py-2.5 rounded-xl bg-green-800/50 border border-green-700 text-white focus:outline-none focus:ring-2 focus:ring-yellow-500 text-sm sm:text-lg font-medium appearance-none cursor-pointer ${isRtl?'pl-4 pr-8 sm:pr-10':'pr-4 pl-8 sm:pl-10'}`}>
                                                {students.map(s=><option key={s.id} value={s.id} className="bg-green-800">{s.name}</option>)}
                                            </select>
                                            <i className={`fas fa-users absolute top-1/2 -translate-y-1/2 text-sm sm:text-lg text-yellow-400 pointer-events-none ${isRtl?'right-2 sm:right-3':'left-2 sm:left-3'}`}></i>
                                            <i className={`fas fa-chevron-down absolute top-1/2 -translate-y-1/2 text-sm sm:text-lg text-yellow-400 pointer-events-none ${isRtl?'left-2 sm:left-3':'right-2 sm:right-3'}`}></i>
                                        </div>
                                        <button onClick={handleShare} className="p-2 sm:p-2.5 bg-blue-600 hover:bg-blue-500 border border-blue-500 rounded-xl" title={t('shareLink')}><i className="fas fa-share-alt text-base sm:text-lg text-white"></i></button>
                                        <button onClick={renameStudent} className="p-2 sm:p-2.5 bg-green-800 hover:bg-green-700 border border-green-700 rounded-xl" title={t('editStudent')}><i className="fas fa-edit text-base sm:text-lg text-yellow-400"></i></button>
                                        <button onClick={addStudent} className="p-2 sm:p-2.5 bg-yellow-500 hover:bg-yellow-400 rounded-xl" title={t('addStudent')}><i className="fas fa-user-plus text-base sm:text-lg text-green-900"></i></button>
                                        <button onClick={deleteStudent} className="p-2 sm:p-2.5 bg-red-500/20 hover:bg-red-500/40 border border-red-500/30 rounded-xl" title={t('deleteStudent')}><i className="fas fa-trash-alt text-base sm:text-lg text-red-200"></i></button>
                                    </>
                                )}
                            </div>
                        </div>
                    </header>

                    {/* Student HW Notification Banner (Only for ReadOnly/Student Portal) */}
                    {isReadOnly && currentStudent.listeningTasks && currentStudent.listeningTasks.filter(t => !t.completed).length > 0 && (
                        <div className="max-w-5xl mx-auto px-4 mt-4 space-y-3">
                            {currentStudent.listeningTasks.filter(t => !t.completed).map(task => (
                                <div key={task.id} className="w-full p-4 sm:px-6 rounded-2xl flex flex-col sm:flex-row items-center justify-between gap-4 border-2 shadow-sm animate-fade-in-up bg-purple-50 border-purple-200">
                                    <div className="flex items-center gap-4 w-full sm:w-auto">
                                        <div className="w-12 h-12 shrink-0 rounded-full flex items-center justify-center text-2xl bg-purple-200 text-purple-700 anim-bounce-soft">
                                            <i className="fas fa-headphones-alt"></i>
                                        </div>
                                        <div>
                                            <h3 className="font-bold text-lg leading-tight text-purple-800">
                                                {t('newHWAlert')}
                                            </h3>
                                            <p className="text-sm mt-1 font-medium text-purple-600">
                                                {t('surah')} {(sh => sh ? getSurahPrimary(sh, lang) : '')(SURAHS_DATA.find(s=>s.id===task.surahId))} 
                                                <span className="mx-1">•</span> 
                                                {t('ayahs')} {task.fromAyah} - {task.toAyah} 
                                                <span className="mx-1">•</span> 
                                                {task.requiredRepeats} {t('times')}
                                                {task.reciter && <><span className="mx-1">•</span><i className="fas fa-microphone-alt mx-1"></i>{(RECITERS.find(r=>r.value===task.reciter)||{label:task.reciter}).label}</>}
                                            </p>
                                        </div>
                                    </div>
                                    <div className="shrink-0 w-full sm:w-auto text-center">
                                        <button onClick={() => startAudioHW(task)} className="w-full sm:w-auto bg-purple-600 hover:bg-purple-500 text-white px-6 py-2.5 rounded-xl font-bold shadow-md transition-colors">
                                            {t('startHW')}
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* Stats bar — dynamic per active tab */}
                    {(() => {
                        const juz30Data = currentStudent.juz30Data || {};
                        const juz29Data = currentStudent.juz29Data || {};
                        const juz30Memorized = JUZ30_SURAHS.reduce((a,s) => a + (juz30Data[s.id]?.memorized||0), 0);
                        const juz29Memorized = JUZ29_SURAHS.reduce((a,s) => a + (juz29Data[s.id]?.memorized||0), 0);
                        const juz30Done = JUZ30_SURAHS.filter(s => (juz30Data[s.id]?.memorized||0) === s.totalAyahs).length;
                        const juz29Done = JUZ29_SURAHS.filter(s => (juz29Data[s.id]?.memorized||0) === s.totalAyahs).length;
                        const juz30Pct = parseFloat(((juz30Memorized / JUZ30_TOTAL_AYAHS)*100).toFixed(1));
                        const juz29Pct = parseFloat(((juz29Memorized / JUZ29_TOTAL_AYAHS)*100).toFixed(1));

                        if (activeTab === 'juz30') {
                            const currentBadgeJuz30 = getBadge(juz30Pct, lang, true);
                            
                            return (
                                <div className="bg-gradient-to-r from-emerald-900 to-emerald-800 border-b-2 border-emerald-600 transition-all duration-300 relative z-20 shadow-md mt-4">
                                    <div className="max-w-5xl mx-auto flex flex-row items-center justify-between p-2 gap-4">
                                        <div className="flex items-center gap-3 sm:gap-6 shrink-0">
                                            <div className="relative w-14 h-14 sm:w-20 sm:h-20 flex items-center justify-center shrink-0">
                                                <svg className="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                                                    <path className="text-white/20" strokeWidth="4" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                                    <path className="text-yellow-400 transition-all duration-1000" strokeWidth="4" strokeDasharray={`${juz30Pct}, 100`} strokeLinecap="round" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                                </svg>
                                                <span className="absolute text-sm sm:text-base font-bold text-white">{juz30Pct}%</span>
                                            </div>
                                            <div>
                                                <h2 className="text-[10px] sm:text-sm text-emerald-200 font-medium flex items-center gap-1">
                                                    <span className="text-base">📖</span> {t('juz30BannerTitle')}
                                                </h2>
                                                <div className="text-base sm:text-2xl font-bold text-white">
                                                    {juz30Memorized} <span className="text-[10px] sm:text-sm text-emerald-200/70 font-normal">/ {JUZ30_TOTAL_AYAHS}</span>
                                                </div>
                                                <p className="text-[9px] sm:text-xs text-yellow-400 font-medium">{t('completedSurahs')} {juz30Done} / {JUZ30_SURAHS.length}</p>
                                            </div>
                                        </div>
                                        
                                        <div className="flex flex-col items-end gap-1.5">
                                            <div className="flex items-center gap-2 flex-wrap justify-end">
                                                {!isReadOnly && <JuzPlanSelector juzNum={30} planId={currentStudent.juz30PlanId||'none'} onSetPlan={(id)=>handleJuzUpdate('juz30PlanId',id)} isReadOnly={isReadOnly} lang={lang} t={t} />}
                                                {!isReadOnly && (
                                                    <button onClick={() => setShowAssignHWModal(true)} className="flex items-center gap-1.5 px-3 py-1.5 rounded-xl bg-purple-600 hover:bg-purple-500 text-white text-[10px] sm:text-xs font-bold shadow-sm transition-colors">
                                                        <i className="fas fa-headphones-alt"></i> <span className="hidden sm:inline">{t('assignHW')}</span>
                                                    </button>
                                                )}
                                                {!isReadOnly && (
                                                    <button onClick={() => issueJuzCertificate(30, 'juz30Certificates', juz30Pct)}
                                                        className="flex items-center gap-1.5 px-3 py-1.5 rounded-xl bg-yellow-400 hover:bg-yellow-300 text-emerald-900 text-[10px] sm:text-xs font-bold shadow-sm transition-colors">
                                                        <i className="fas fa-certificate"></i> <span className="hidden sm:inline">{t('juzIssueCert')}</span>
                                                    </button>
                                                )}
                                            </div>
                                            <div className="w-32 sm:w-48">
                                                <div className="w-full bg-black/20 rounded-full h-2 overflow-hidden">
                                                    <div className="h-full rounded-full bg-yellow-400 transition-all duration-700" style={{width:`${juz30Pct}%`}} />
                                                </div>
                                            </div>
                                        </div>

                                        <div className="shrink-0 flex items-center justify-end w-16 sm:w-32">
                                            <div className={`flex flex-col items-center justify-center w-14 h-14 sm:w-20 sm:h-20 text-center transition-transform hover:scale-105 ${currentBadgeJuz30.color} rounded-xl shadow-sm border-2 border-white/20 shrink-0`}>
                                                <div className="mb-0.5">{currentBadgeJuz30.icon}</div>
                                                <h3 className="font-bold text-[8px] sm:text-[10px] leading-tight truncate px-1 w-full">{currentBadgeJuz30.text}</h3>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            );
                        }

                        if (activeTab === 'juz29') {
                            const currentBadgeJuz29 = getBadge(juz29Pct, lang, true);

                            return (
                                <div className="bg-gradient-to-r from-amber-800 to-amber-700 border-b-2 border-amber-600 transition-all duration-300 relative z-20 shadow-md mt-4">
                                    <div className="max-w-5xl mx-auto flex flex-row items-center justify-between p-2 gap-4">
                                        <div className="flex items-center gap-3 sm:gap-6 shrink-0">
                                            <div className="relative w-14 h-14 sm:w-20 sm:h-20 flex items-center justify-center shrink-0">
                                                <svg className="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                                                    <path className="text-white/20" strokeWidth="4" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                                    <path className="text-yellow-300 transition-all duration-1000" strokeWidth="4" strokeDasharray={`${juz29Pct}, 100`} strokeLinecap="round" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                                </svg>
                                                <span className="absolute text-sm sm:text-base font-bold text-white">{juz29Pct}%</span>
                                            </div>
                                            <div>
                                                <h2 className="text-[10px] sm:text-sm text-amber-200 font-medium flex items-center gap-1">
                                                    <span className="text-base">📖</span> {t('juz29BannerTitle')}
                                                </h2>
                                                <div className="text-base sm:text-2xl font-bold text-white">
                                                    {juz29Memorized} <span className="text-[10px] sm:text-sm text-amber-200/70 font-normal">/ {JUZ29_TOTAL_AYAHS}</span>
                                                </div>
                                                <p className="text-[9px] sm:text-xs text-yellow-300 font-medium">{t('completedSurahs')} {juz29Done} / {JUZ29_SURAHS.length}</p>
                                            </div>
                                        </div>
                                        
                                        <div className="flex flex-col items-end gap-1.5">
                                            <div className="flex items-center gap-2 flex-wrap justify-end">
                                                {!isReadOnly && <JuzPlanSelector juzNum={29} planId={currentStudent.juz29PlanId||'none'} onSetPlan={(id)=>handleJuzUpdate('juz29PlanId',id)} isReadOnly={isReadOnly} lang={lang} t={t} />}
                                                {!isReadOnly && (
                                                    <button onClick={() => setShowAssignHWModal(true)} className="flex items-center gap-1.5 px-3 py-1.5 rounded-xl bg-purple-600 hover:bg-purple-500 text-white text-[10px] sm:text-xs font-bold shadow-sm transition-colors">
                                                        <i className="fas fa-headphones-alt"></i> <span className="hidden sm:inline">{t('assignHW')}</span>
                                                    </button>
                                                )}
                                                {!isReadOnly && (
                                                    <button onClick={() => issueJuzCertificate(29, 'juz29Certificates', juz29Pct)}
                                                        className="flex items-center gap-1.5 px-3 py-1.5 rounded-xl bg-yellow-400 hover:bg-yellow-300 text-amber-900 text-[10px] sm:text-xs font-bold shadow-sm transition-colors">
                                                        <i className="fas fa-certificate"></i> <span className="hidden sm:inline">{t('juzIssueCert')}</span>
                                                    </button>
                                                )}
                                            </div>
                                            <div className="w-32 sm:w-48">
                                                <div className="w-full bg-black/20 rounded-full h-2 overflow-hidden">
                                                    <div className="h-full rounded-full bg-yellow-300 transition-all duration-700" style={{width:`${juz29Pct}%`}} />
                                                </div>
                                            </div>
                                        </div>

                                        <div className="shrink-0 flex items-center justify-end w-16 sm:w-32">
                                            <div className={`flex flex-col items-center justify-center w-14 h-14 sm:w-20 sm:h-20 text-center transition-transform hover:scale-105 ${currentBadgeJuz29.color} rounded-xl shadow-sm border-2 border-white/20 shrink-0`}>
                                                <div className="mb-0.5">{currentBadgeJuz29.icon}</div>
                                                <h3 className="font-bold text-[8px] sm:text-[10px] leading-tight truncate px-1 w-full">{currentBadgeJuz29.text}</h3>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            );
                        }

                        const currentBadgeFull = getBadge(stats.percentage, lang, true);
                        
                        return (
                            <div className="bg-white/95 backdrop-blur-md border-b-2 border-green-200 transition-all duration-300 relative z-20 mt-4">
                                <div className="max-w-5xl mx-auto flex flex-row items-center justify-between p-2 gap-4">
                                    <div className="flex items-center gap-3 sm:gap-6 shrink-0">
                                        <div className="relative w-14 h-14 sm:w-20 sm:h-20 flex items-center justify-center shrink-0">
                                            <svg className="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                                                <path className="text-slate-100" strokeWidth="4" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                                <path className="text-green-500 transition-all duration-1000" strokeWidth="4" strokeDasharray={`${stats.percentage}, 100`} strokeLinecap="round" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                            </svg>
                                            <span className="absolute text-sm sm:text-base font-bold text-green-900">{stats.percentage}%</span>
                                        </div>
                                        <div>
                                            <h2 className="text-[10px] sm:text-sm text-gray-500 font-medium">{t('totalMemorized')}</h2>
                                            <div className="text-base sm:text-2xl font-bold text-gray-800">{stats.total} <span className="text-[10px] sm:text-sm text-gray-400 font-normal">/ {TOTAL_QURAN_AYAHS}</span></div>
                                            <p className="text-[9px] sm:text-xs text-green-800 font-medium">{t('completedSurahs')} {stats.done}</p>
                                        </div>
                                    </div>
                                    
                                    <div className="flex flex-col items-end gap-1.5">
                                        <div className="flex items-center gap-2 flex-wrap justify-end">
                                            {!isReadOnly && (
                                                <FullQuranPlanSelector 
                                                    planId={currentStudent.planId} 
                                                    onSetPlan={(id) => saveToCloud(students.map(s => s.id === currentId ? { ...s, planId: id } : s), currentId)} 
                                                    isReadOnly={isReadOnly} 
                                                    lang={lang} 
                                                    t={t} 
                                                />
                                            )}
                                            {!isReadOnly && (
                                                <button onClick={() => setShowAssignHWModal(true)} className="flex items-center gap-1.5 px-3 py-1.5 rounded-xl bg-purple-600 hover:bg-purple-500 text-white text-[10px] sm:text-xs font-bold shadow-sm transition-colors">
                                                    <i className="fas fa-headphones-alt"></i> <span className="hidden sm:inline">{t('assignHW')}</span>
                                                </button>
                                            )}
                                            {!isReadOnly && (
                                                <button onClick={()=>setShowCertWizard({mode:'quran',certKey:'certificates',pct:stats.percentage,juzNum:null})} className="flex items-center gap-1.5 px-3 py-1.5 rounded-xl bg-yellow-500 hover:bg-yellow-400 text-green-900 text-[10px] sm:text-xs font-bold shadow-sm transition-colors">
                                                    <i className="fas fa-certificate"></i> <span className="hidden sm:inline">{t('issueCert')}</span>
                                                </button>
                                            )}
                                        </div>
                                        <div className="w-32 sm:w-48">
                                            <div className="w-full bg-green-100 rounded-full h-2 overflow-hidden">
                                                <div className="h-full rounded-full bg-green-500 transition-all duration-700" style={{width:`${stats.percentage}%`}} />
                                            </div>
                                        </div>
                                    </div>

                                    <div className="shrink-0 flex items-center justify-end w-16 sm:w-32">
                                        <div className={`flex flex-col items-center justify-center w-14 h-14 sm:w-20 sm:h-20 text-center transition-transform hover:scale-105 ${currentBadgeFull.color} rounded-xl shadow-sm border border-white/50 shrink-0`}>
                                            <div className="mb-0.5">{currentBadgeFull.icon}</div>
                                            <h3 className="font-bold text-[8px] sm:text-[10px] leading-tight truncate px-1 w-full">{currentBadgeFull.text}</h3>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        );
                    })()}

                    {/* Tab bar */}
                    <div className="bg-white border-b border-slate-200 py-3 relative z-10 shadow-sm">
                        <div className="max-w-5xl mx-auto px-4 flex justify-center sm:justify-start">
                            <div className="bg-slate-100/70 p-1.5 rounded-2xl border border-slate-200/60 inline-flex gap-1.5 overflow-x-auto custom-scrollbar max-w-full">
                                <button onClick={()=>setActiveTab('main')}
                                    className={`flex items-center gap-2 px-5 sm:px-6 py-2 sm:py-2.5 rounded-xl font-bold text-xs sm:text-sm transition-all duration-300 whitespace-nowrap ${activeTab==='main' ? 'bg-gradient-to-br from-green-600 to-emerald-500 text-white shadow-lg shadow-green-500/30' : 'text-slate-500 hover:text-slate-800 hover:bg-white hover:shadow-sm'}`}>
                                    <i className={`fas fa-book-open ${activeTab==='main' ? 'text-green-100' : 'text-slate-400'}`}></i>
                                    <span>{t('tabFullQuran')}</span>
                                </button>
                                <button onClick={()=>setActiveTab('juz30')}
                                    className={`flex items-center gap-2 px-5 sm:px-6 py-2 sm:py-2.5 rounded-xl font-bold text-xs sm:text-sm transition-all duration-300 whitespace-nowrap ${activeTab==='juz30' ? 'bg-gradient-to-br from-green-600 to-emerald-500 text-white shadow-lg shadow-green-500/30' : 'text-slate-500 hover:text-slate-800 hover:bg-white hover:shadow-sm'}`}>
                                    <span className="text-base sm:text-lg leading-none drop-shadow-sm">📖</span>
                                    <span>{t('juz30Tab')}</span>
                                </button>
                                <button onClick={()=>setActiveTab('juz29')}
                                    className={`flex items-center gap-2 px-5 sm:px-6 py-2 sm:py-2.5 rounded-xl font-bold text-xs sm:text-sm transition-all duration-300 whitespace-nowrap ${activeTab==='juz29' ? 'bg-gradient-to-br from-amber-500 to-yellow-500 text-white shadow-lg shadow-amber-500/30' : 'text-slate-500 hover:text-slate-800 hover:bg-white hover:shadow-sm'}`}>
                                    <span className="text-base sm:text-lg leading-none drop-shadow-sm">📖</span>
                                    <span>{t('juz29Tab')}</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            )}

            {!isAdminMode && !showSyncModal && (
                <main className="max-w-5xl mx-auto px-4 py-6 sm:px-6 lg:px-8 space-y-6">

                    {/* Global Memorization Plan */}
                    {currentPlan && activeTab === 'main' && (
                        <section className="bg-gradient-to-r from-teal-50 to-emerald-50 rounded-2xl shadow-sm border border-teal-200 p-4 sm:p-5 flex flex-col sm:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-3">
                                <div className="bg-teal-100 text-teal-600 p-3 rounded-full shrink-0"><i className="fas fa-route text-2xl"></i></div>
                                <div>
                                    {currentPlan.id !== 'none' ? (
                                        <>
                                            <h3 className="font-bold text-teal-900 text-sm sm:text-base">{t('planTitle')} {planMemTitle(currentPlan, lang)}</h3>
                                            <p className="text-xs sm:text-sm text-teal-700 mt-1"><strong>{t('planTarget')}</strong> {planMemTarget(currentPlan, lang)}</p>
                                        </>
                                    ) : (
                                        <>
                                            <h3 className="font-bold text-teal-900 text-sm sm:text-base">{t('noMemPlanTitle')}</h3>
                                            <p className="text-xs sm:text-sm text-teal-700 mt-1 opacity-80">{t('noMemPlanHint')}</p>
                                        </>
                                    )}
                                </div>
                            </div>
                            {currentPlan.id !== 'none' && (
                                <div className="bg-white border border-teal-100 rounded-xl p-3 px-6 text-center shadow-sm shrink-0 w-full sm:w-auto">
                                    <p className="text-[10px] sm:text-xs text-gray-500 mb-1">{t('planETA')}</p>
                                    <p className="font-black text-teal-600 text-sm sm:text-lg" dir={isRtl?"rtl":"ltr"}>
                                        {formatRemainingTime(currentPlan.days, stats.remaining, lang, t)}
                                    </p>
                                </div>
                            )}
                        </section>
                    )}

                    {/* JUZ 30 TAB */}
                    {activeTab === 'juz30' && (
                        <JuzSection juzNum={30} surahs={JUZ30_SURAHS} student={currentStudent}
                            onUpdate={handleJuzUpdate} isReadOnly={isReadOnly} t={t}
                            onIssueCert={issueJuzCertificate}
                            onViewCert={(cert, juzNum) => setSelectedJuzCert({ cert, juzNum })}
                            getBadge={getBadge} lang={lang} onReset={() => resetSectionData('juz30')} onPlayAudio={(obj) => setAudioPlayerSurah(obj)} onClearHW={handleClearHW} />
                    )}

                    {/* JUZ 29 TAB */}
                    {activeTab === 'juz29' && (
                        <JuzSection juzNum={29} surahs={JUZ29_SURAHS} student={currentStudent}
                            onUpdate={handleJuzUpdate} isReadOnly={isReadOnly} t={t}
                            onIssueCert={issueJuzCertificate}
                            onViewCert={(cert, juzNum) => setSelectedJuzCert({ cert, juzNum })}
                            getBadge={getBadge} lang={lang} onReset={() => resetSectionData('juz29')} onPlayAudio={(obj) => setAudioPlayerSurah(obj)} onClearHW={handleClearHW} />
                    )}

                    {/* MAIN QURAN TAB */}
                    {activeTab === 'main' && (
                        <>
                            {!isReadOnly && currentStudent.listeningTasks && currentStudent.listeningTasks.length > 0 && (
                                <div className="space-y-3 mb-6">
                                    {currentStudent.listeningTasks.map(task => (
                                        <TeacherHWAlert key={task.id} task={task} onClear={() => handleClearHW(task.id)} lang={lang} t={t} />
                                    ))}
                                </div>
                            )}

                            {/* Student report */}
                            <section className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6">
                                <h3 className="font-bold text-lg mb-6 flex items-center gap-2 text-slate-800"><i className="fas fa-chart-pie text-green-600 text-xl"></i> {t('studentReport')}</h3>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <div className="bg-blue-50/50 border border-blue-100 p-5 rounded-2xl h-full flex flex-col">
                                        <h4 className="font-bold text-blue-800 text-sm mb-4 flex items-center gap-2"><i className="fas fa-spinner fa-spin-pulse"></i> {t('memorizingNow')}</h4>
                                        <div className="space-y-2.5 max-h-[180px] overflow-y-auto pr-1 custom-scrollbar">
                                            {inProgressSurahs.length > 0 ? inProgressSurahs.map(s => (
                                                <button key={s.id} onClick={()=>scrollToSurah(s.id)} className="w-full text-start bg-white p-3 rounded-xl shadow-sm border border-blue-50 hover:border-blue-300 transition-all group">
                                                    <div className="flex justify-between mb-2 text-xs items-center">
                                                        <span className="font-bold text-slate-700 group-hover:text-blue-700">{t('surah')} {getSurahPrimary(s, lang)}</span>
                                                        <span className="text-blue-600 font-bold" dir="ltr">{progress[s.id]} / {s.totalAyahs}</span>
                                                    </div>
                                                    <div className="w-full bg-blue-100 rounded-full h-1.5">
                                                        <div className="bg-blue-500 h-1.5 rounded-full transition-all duration-500" style={{width:`${(progress[s.id]/s.totalAyahs)*100}%`}}></div>
                                                    </div>
                                                </button>
                                            )) : <p className="text-xs text-slate-500 my-auto text-center">{t('noData')}</p>}
                                        </div>
                                    </div>
                                    <div className="bg-green-50/50 border border-green-100 p-5 rounded-2xl h-full flex flex-col">
                                        <h4 className="font-bold text-green-800 text-sm mb-4 flex items-center gap-2"><i className="fas fa-check-double"></i> {t('completedSurahsList')}</h4>
                                        <div className="flex flex-wrap gap-2 max-h-[180px] overflow-y-auto pr-1 custom-scrollbar content-start">
                                            {completedSurahsList.length > 0 ? completedSurahsList.map(s => (
                                                <button key={s.id} onClick={()=>scrollToSurah(s.id)} className="bg-white text-green-700 px-3 py-1.5 rounded-lg text-[11px] sm:text-xs font-bold border border-green-200 shadow-sm hover:bg-green-600 hover:text-white transition-colors">
                                                    {getSurahPrimary(s, lang)}
                                                </button>
                                            )) : <p className="text-xs text-slate-500 my-auto w-full text-center">{t('noData')}</p>}
                                        </div>
                                    </div>
                                    <div className="flex flex-col gap-4 h-full">
                                        <div className="bg-red-50/70 border border-red-100 p-4 rounded-2xl flex-1 flex flex-col">
                                            <h4 className="font-bold text-red-700 mb-3 flex items-center gap-2 text-sm"><i className="fas fa-exclamation-triangle"></i> {t('needsRevision')}</h4>
                                            <div className="flex flex-wrap gap-2 overflow-y-auto custom-scrollbar max-h-[80px] content-start">
                                                {weakRevisions.length > 0 ? weakRevisions.map(s => (
                                                    <button key={s.id} onClick={()=>scrollToSurah(s.id)} className="bg-white text-red-600 px-3 py-1.5 rounded-lg text-[10px] font-bold border border-red-200 shadow-sm hover:bg-red-50">
                                                        {getSurahPrimary(s, lang)}
                                                    </button>
                                                )) : <span className="text-xs text-slate-400 my-auto">—</span>}
                                            </div>
                                        </div>
                                        <div className="bg-orange-50/70 border border-orange-100 p-4 rounded-2xl flex-1 flex flex-col">
                                            <h4 className="font-bold text-orange-700 mb-3 flex items-center gap-2 text-sm"><i className="fas fa-history"></i> {t('oldRevisions')}</h4>
                                            <div className="flex flex-wrap gap-2 overflow-y-auto custom-scrollbar max-h-[80px] content-start">
                                                {oldRevisions.length > 0 ? oldRevisions.map(s => (
                                                    <button key={s.id} onClick={()=>scrollToSurah(s.id)} className="bg-white text-orange-600 px-3 py-1.5 rounded-lg text-[10px] font-bold border border-orange-200 shadow-sm hover:bg-orange-50">
                                                        {getSurahPrimary(s, lang)}
                                                    </button>
                                                )) : <span className="text-xs text-slate-400 my-auto">—</span>}
                                            </div>
                                        </div>
                                        <div className="bg-green-50/70 border border-green-100 p-4 rounded-2xl flex-1 flex flex-col">
                                            <h4 className="font-bold text-green-700 mb-3 flex items-center gap-2 text-sm"><i className="fas fa-check-circle"></i> {t('recentRevisions')}</h4>
                                            <div className="flex flex-wrap gap-2 overflow-y-auto custom-scrollbar max-h-[80px] content-start">
                                                {recentRevisions.length > 0 ? recentRevisions.map(s => (
                                                    <button key={s.id} onClick={()=>scrollToSurah(s.id)} className="bg-white text-green-600 px-3 py-1.5 rounded-lg text-[10px] font-bold border border-green-200 shadow-sm hover:bg-green-50">
                                                        {getSurahPrimary(s, lang)}
                                                    </button>
                                                )) : <span className="text-xs text-slate-400 my-auto">—</span>}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </section>

                            {/* Certificates */}
                            {(currentStudent.certificates && currentStudent.certificates.length > 0) && (
                                <section className="bg-white rounded-3xl shadow-sm border border-yellow-200 p-6 md:p-8">
                                    <h3 className="font-bold mb-6 flex items-center gap-2 text-xl text-slate-800"><i className="fas fa-award text-yellow-500 text-3xl"></i> {t('certHonorBoard')}</h3>
                                    <div className="flex flex-wrap gap-4">
                                        {currentStudent.certificates.map((cert) => (
                                            <button key={cert.id} onClick={()=>setSelectedCert(cert)} className="flex items-center gap-4 bg-gradient-to-l from-yellow-50/50 to-white min-w-[220px] border border-yellow-100 p-4 rounded-2xl hover:shadow-md hover:border-yellow-300 transition-all text-start relative group">
                                                <div className="bg-yellow-500 text-white w-12 h-12 rounded-full flex items-center justify-center shadow-md group-hover:scale-110 transition-transform">
                                                    <span className="text-2xl">{cert.sticker || '🏅'}</span>
                                                </div>
                                                <div>
                                                    <p className="font-bold text-sm text-green-900">{t('certAchievement')} {cert.percentage}%</p>
                                                    <p className="text-xs text-slate-500 mt-1">{new Date(cert.timestamp).toLocaleDateString(localeForLang(lang))}</p>
                                                    {cert.reason && <p className="text-[10px] text-slate-400 mt-0.5 truncate max-w-[140px]">{cert.reason}</p>}
                                                </div>
                                                <span className="absolute top-3 right-3 text-[9px] bg-slate-100 text-slate-800 font-bold px-2 py-0.5 rounded">{certLangBadge(normLang(cert.certLang||'ar'))}</span>
                                            </button>
                                        ))}
                                    </div>
                                </section>
                            )}

                            <div className="flex flex-col sm:flex-row justify-between items-center gap-4">
                                <div className="relative w-full sm:max-w-md">
                                    <i className={`fas fa-search absolute top-1/2 -translate-y-1/2 ${isRtl?'right-4':'left-4'} text-slate-400`}></i>
                                    <input type="text" placeholder={t('searchSurah')} value={searchQuery} onChange={(e)=>setSearchQuery(e.target.value)} className={`w-full py-3 ${isRtl?'pr-12 pl-4':'pl-12 pr-4'} rounded-xl border border-slate-200 focus:ring-2 focus:ring-green-800 focus:border-transparent outline-none shadow-sm`} />
                                </div>
                                <button onClick={() => resetSectionData('main')} className="flex items-center gap-2 text-red-600 bg-red-50 hover:bg-red-100 px-4 py-2 rounded-lg text-sm font-medium transition-colors"><i className="fas fa-sync-alt"></i> {t('resetData')}</button>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                                {displayedSurahs.map((surah) => {
                                    const memorizedCount = progress[surah.id] || 0;
                                    const isComplete = memorizedCount === surah.totalAyahs;
                                    const progressPercent = (memorizedCount / surah.totalAyahs) * 100;
                                    const isHighlighted = highlightedSurah === surah.id;
                                    return (
                                        <div id={`surah-card-${surah.id}`} key={surah.id}
                                            className={`relative overflow-visible rounded-2xl border p-5 transition-all duration-200 hover:shadow-md ${isComplete ? 'bg-green-50 border-yellow-200 ring-1 ring-yellow-300' : 'bg-white border-slate-200'} ${isHighlighted ? 'ring-4 ring-blue-400 shadow-xl' : ''}`}>
                                            <div className="absolute bottom-0 left-0 right-0 h-1 rounded-b-2xl overflow-hidden pointer-events-none">
                                                <div className={`absolute bottom-0 h-full bg-yellow-500 transition-all duration-500 ${isRtl?'right-0':'left-0'}`} style={{width:`${progressPercent}%`}} />
                                            </div>
                                            <div className="flex justify-between items-start mb-4">
                                                <div>
                                                    <div className="flex items-center gap-2">
                                                        <span className="flex items-center justify-center w-7 h-7 rounded-full bg-slate-100 text-slate-500 text-xs font-bold shadow-inner">{surah.id}</span>
                                                        <h3 className="text-lg font-bold text-slate-800">{t('surah')} {getSurahPrimary(surah, lang)} <br/><span className="text-sm font-normal text-slate-400 mt-0.5">{getSurahSecondary(surah, lang)}</span></h3>
                                                        <button onClick={() => setAudioPlayerSurah({ surah, hwTask: null })} className="text-green-500 hover:text-green-700 bg-green-50 hover:bg-green-100 w-6 h-6 rounded-full flex items-center justify-center transition-colors" title={t('listenSurah')}>
                                                            <i className="fas fa-headphones-alt text-xs"></i>
                                                        </button>
                                                    </div>
                                                    <p className="text-sm text-slate-500 mt-2">{t('ayahs')} {surah.totalAyahs}</p>
                                                </div>
                                                <button onClick={()=>!isReadOnly&&toggleCompleteSurah(surah)} className={`p-2.5 rounded-full transition-colors ${isComplete?'text-yellow-500 bg-yellow-100 shadow-sm':'text-slate-300 hover:text-yellow-500 hover:bg-slate-50'} ${isReadOnly?'cursor-default':''}`}>
                                                    <i className="fas fa-check-circle text-2xl"></i>
                                                </button>
                                            </div>
                                            {!isReadOnly && (
                                                <div className="flex items-center gap-3">
                                                    <div className="flex-1">
                                                        <input type="range" min="0" max={surah.totalAyahs} value={memorizedCount} onChange={(e)=>updateSurah(surah.id,parseInt(e.target.value)||0)} className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-green-800" dir={isRtl ? "rtl" : "ltr"} />
                                                    </div>
                                                    <div className="w-16 shrink-0">
                                                        <input type="number" min="0" max={surah.totalAyahs} value={memorizedCount===0?'':memorizedCount} onChange={(e)=>updateSurah(surah.id,parseInt(e.target.value)||0)} placeholder="0" className="w-full px-2 py-1.5 text-center text-sm font-semibold rounded border border-slate-200 focus:outline-none focus:border-green-800 focus:ring-1 focus:ring-green-800 bg-slate-50" />
                                                    </div>
                                                </div>
                                            )}
                                            {isReadOnly && (
                                                <div className="mt-2">
                                                    <div className="w-full bg-slate-100 rounded-full h-2">
                                                        <div className="bg-green-500 h-2 rounded-full" style={{width:`${progressPercent}%`}}></div>
                                                    </div>
                                                    <p className="text-xs text-slate-500 mt-1 text-center" dir="ltr">{memorizedCount} / {surah.totalAyahs}</p>
                                                </div>
                                            )}
                                            <div className="mt-4 pt-3 border-t border-slate-100 flex flex-col gap-3">
                                                <div className="flex justify-between items-center w-full">
                                                    <span className="text-xs text-slate-500 font-medium">{t('revision')}</span>
                                                    {!isReadOnly && Object.keys(revisions[surah.id]||{}).length > 0 && (
                                                        <button onClick={()=>clearRevisions(surah.id)} className="text-slate-400 hover:text-red-600 flex items-center gap-1.5 text-[11px] bg-slate-50 hover:bg-red-50 px-3 py-1 rounded-full">
                                                            <i className="fas fa-sync-alt"></i> <span className="font-bold">{t('revisionResetBtn')}</span>
                                                        </button>
                                                    )}
                                                </div>
                                                <div className="flex gap-1.5 w-full justify-start" dir="ltr">
                                                    {[1,2,3,4,5].map(num => {
                                                        const revData = (revisions[surah.id]||{})[num];
                                                        const rating = typeof revData==='object'&&revData!==null ? revData.rating : revData;
                                                        const isSelectorOpen = revisionSelector?.surahId===surah.id && revisionSelector?.revNum===num;
                                                        let IconClass = "w-7 h-7 rounded-full border text-[10px] flex items-center justify-center transition-all duration-200 ";
                                                        if (rating==='excellent') IconClass += "bg-green-100 border-green-500 text-green-700 shadow-sm scale-110 z-10";
                                                        else if (rating==='good') IconClass += "bg-blue-100 border-blue-500 text-blue-600 shadow-sm scale-110 z-10";
                                                        else if (rating==='weak') IconClass += "bg-orange-100 border-orange-500 text-orange-600 shadow-sm scale-110 z-10";
                                                        else IconClass += "bg-slate-50 border-slate-200 text-slate-400 hover:border-green-400";
                                                        return (
                                                            <div key={num} className="relative">
                                                                <button onClick={()=>!isReadOnly&&setRevisionSelector(isSelectorOpen?null:{surahId:surah.id,revNum:num})} className={IconClass}>
                                                                    {rating ? <i className="fas fa-star text-sm"></i> : <span className="font-bold">{num}</span>}
                                                                </button>
                                                                {isSelectorOpen && !isReadOnly && (
                                                                    <React.Fragment>
                                                                        <div className="fixed inset-0 z-40" onClick={()=>setRevisionSelector(null)} />
                                                                        <div className="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 bg-white rounded-2xl shadow-xl border border-slate-200 p-1.5 flex gap-1 z-50">
                                                                            <button onClick={()=>setRevisionRating(surah.id,num,'excellent')} className="p-2 hover:bg-green-50 rounded-lg text-green-600" title={t('excellent')}><i className="fas fa-star text-lg"></i></button>
                                                                            <button onClick={()=>setRevisionRating(surah.id,num,'good')} className="p-2 hover:bg-blue-50 rounded-lg text-blue-600" title={t('good')}><i className="fas fa-thumbs-up text-lg"></i></button>
                                                                            <button onClick={()=>setRevisionRating(surah.id,num,'weak')} className="p-2 hover:bg-orange-50 rounded-lg text-orange-600" title={t('weak')}><i className="fas fa-exclamation-circle text-lg"></i></button>
                                                                            {rating && <button onClick={()=>setRevisionRating(surah.id,num,null)} className="p-2 hover:bg-gray-100 rounded-lg text-gray-400"><i className="fas fa-times text-lg"></i></button>}
                                                                        </div>
                                                                    </React.Fragment>
                                                                )}
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>

                            {!searchQuery && (
                                <div className="flex flex-col md:flex-row justify-center items-center gap-4 md:gap-8 mt-12 pt-8 border-t border-slate-200">
                                    <div className="flex items-center gap-3">
                                        <button onClick={()=>{if(currentJuz!=='all'){setCurrentJuz(prev=>Math.max(prev-1,1));window.scrollTo({top:300,behavior:'smooth'});}}} disabled={currentJuz==='all'||currentJuz===1} className="p-3 rounded-xl border border-slate-200 text-slate-500 disabled:opacity-50 hover:bg-green-50 hover:text-green-800 bg-white w-12 h-12 shadow-sm transition-colors"><i className={`fas ${isRtl?'fa-chevron-right':'fa-chevron-left'} text-lg`}></i></button>
                                        <div className="relative">
                                            <select value={currentJuz} onChange={(e)=>{const val=e.target.value;setCurrentJuz(val==='all'?'all':Number(val));window.scrollTo({top:300,behavior:'smooth'});}} className={`appearance-none py-3 rounded-xl border-2 border-green-500 bg-white text-green-900 font-bold focus:outline-none cursor-pointer text-center min-w-[160px] text-lg shadow-sm ${isRtl?'pl-10 pr-4':'pr-10 pl-4'}`}>
                                                <option value="all" className="font-bold">{t('showAll')}</option>
                                                {[...Array(30)].map((_,i)=><option key={i+1} value={i+1} className="font-bold">{t('juz')} {i+1}</option>)}
                                            </select>
                                            <i className={`fas fa-chevron-down absolute top-1/2 -translate-y-1/2 text-green-600 text-sm pointer-events-none ${isRtl?'left-4':'right-4'}`}></i>
                                        </div>
                                        <button onClick={()=>{if(currentJuz!=='all'){setCurrentJuz(prev=>Math.min(prev+1,30));window.scrollTo({top:300,behavior:'smooth'});}}} disabled={currentJuz==='all'||currentJuz===30} className="p-3 rounded-xl border border-slate-200 text-slate-500 disabled:opacity-50 hover:bg-green-50 hover:text-green-800 bg-white w-12 h-12 shadow-sm transition-colors"><i className={`fas ${isRtl?'fa-chevron-left':'fa-chevron-right'} text-lg`}></i></button>
                                    </div>
                                    <div className="hidden md:block w-px h-10 bg-slate-300"></div>
                                    <button onClick={()=>setCurrentJuz(currentJuz==='all'?1:'all')} className={`flex items-center gap-2 px-6 py-3 rounded-xl font-bold border-2 transition-all shadow-sm ${currentJuz==='all'?'bg-green-900 text-white border-green-900 hover:bg-green-800':'text-green-900 bg-white border-green-500 hover:bg-green-50'}`}>
                                        <i className={`fas ${currentJuz==='all'?'fa-layer-group':'fa-list-ul'}`}></i> {currentJuz==='all' ? t('backToJuz') : t('showAllSurahs')}
                                    </button>
                                </div>
                            )}
                            {displayedSurahs.length===0 && <div className="text-center py-12 text-slate-500 text-lg">{t('noSurahFound')}</div>}
                        </>
                    )}
                </main>
            )}

            {!isAdminMode && !showSyncModal && (
                <footer className="max-w-5xl mx-auto px-4 py-6 mt-8 border-t border-slate-200 text-center">
                    <p className="text-slate-600 font-bold text-sm sm:text-base">{t('copyright')}</p>
                </footer>
            )}

            {/* Dialog */}
            {dialog.isOpen && (
                <div className="fixed inset-0 z-[150] flex items-center justify-center bg-slate-900/60 p-4 backdrop-blur-sm">
                    <div className="bg-white rounded-3xl p-6 md:p-8 w-full max-w-sm shadow-2xl">
                        <p className="font-bold mb-6 text-slate-800 text-lg">{dialog.message}</p>
                        {dialog.type==='prompt' && (
                            <input type="text" autoFocus defaultValue={dialog.defaultValue} id="dialogInput" className="w-full px-4 py-3 mb-6 border border-slate-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none" onKeyDown={(e)=>{if(e.key==='Enter') dialog.onConfirm(document.getElementById('dialogInput').value);}} />
                        )}
                        {dialog.type==='planSelect' && (
                            <select id="planSelectInput" defaultValue={currentStudent.planId||'none'} className="w-full px-4 py-3 mb-6 border border-slate-300 rounded-xl focus:ring-2 focus:ring-teal-500 outline-none font-medium">
                                {MEMORIZATION_PLANS.map(plan=><option key={plan.id} value={plan.id}>{planMemTitle(plan, lang)}</option>)}
                            </select>
                        )}
                        {dialog.type==='certLanguage' ? (
                            <div className="flex flex-col gap-2 max-h-[60vh] overflow-y-auto">
                                {UI_LANGS.map(code => (
                                    <button key={code} type="button" onClick={()=>dialog.onConfirm(code)} className="bg-slate-100 hover:bg-green-100 text-slate-800 py-2.5 rounded-xl font-bold border border-slate-200 text-sm">{LANG_LABELS[code]}</button>
                                ))}
                                <button type="button" onClick={()=>setDialog({isOpen:false})} className="text-slate-500 py-2 hover:text-slate-800 font-medium mt-1">{t('cancel')}</button>
                            </div>
                        ) : (
                            <div className={`flex gap-3 mt-4 ${isRtl?'justify-end':'justify-start'}`}>
                                {dialog.type!=='alert' && <button onClick={()=>setDialog({isOpen:false})} className="px-5 py-2.5 bg-slate-100 rounded-xl text-slate-600 font-bold hover:bg-slate-200">{t('cancel')}</button>}
                                <button onClick={()=>{
                                    if(dialog.type==='prompt') dialog.onConfirm(document.getElementById('dialogInput').value);
                                    else if(dialog.type==='planSelect') dialog.onConfirm(document.getElementById('planSelectInput').value);
                                    else dialog.onConfirm();
                                }} className="px-5 py-2.5 bg-green-900 text-white rounded-xl font-bold hover:bg-green-800 shadow-sm">{t('confirm')}</button>
                            </div>
                        )}
                    </div>
                </div>
            )}
        </div>
    );
}

const root = createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
