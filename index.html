        .sticker-sparkle { animation: sparkle 1.5s ease-in-out infinite; }

        .sticker-card {
            box-shadow: 0 6px 12px -2px rgba(0,0,0,0.15), inset 0 -4px 0 rgba(0,0,0,0.1) !important;
            border: 3px solid #ffffff !important;
            border-radius: 1.25rem !important;
            position: relative; overflow: hidden; z-index: 10;
        }
        .sticker-card::after {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.7) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            animation: sticker-shine 4s infinite; z-index: 20; pointer-events: none;
        }

        .sticker-award:hover { transform: scale(1.3) rotate(10deg); }
        .sticker-award:hover::after { content: '✕'; position: absolute; top: -6px; right: -6px; background: #ef4444; color: white; border-radius: 50%; width: 14px; height: 14px; font-size: 9px; display: flex; align-items: center; justify-content: center; }
        .sticker-picker-btn { font-size: 1.5rem; cursor: pointer; padding: 4px 6px; border-radius: 8px; border: 1.5px solid transparent; transition: all 0.12s; display: inline-flex; align-items: center; justify-content: center; }

        .child-card { border-radius: 1.25rem; border: 2.5px solid; transition: all 0.2s; }

        input[type=range].child-range { -webkit-appearance: none; height: 8px; border-radius: 4px; }
        input[type=range].child-range::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; cursor: pointer; }

        .audio-bar { width: 6px; background-color: #10b981; border-radius: 4px; animation: bounce-bar 1s infinite ease-in-out; }

const UI_LANGS = ['ar','en','fr','de','es','id'];
const LANG_LABELS = { ar: 'العربية', en: 'English', fr: 'Français', de: 'Deutsch', es: 'Español', id: 'Bahasa Indonesia' };

function normLang(code) {
    const c = String(code || 'ar').toLowerCase();
    if (UI_LANGS.includes(c)) return c;
    return 'ar';
}

/** Returns migrated student rows, or null if the field is missing or not a non-empty array. */
function migrateStudentsFromFirestore(rawStudents) {
    if (!rawStudents || !Array.isArray(rawStudents) || rawStudents.length === 0) return null;
    return rawStudents.map((s) => {
        let tasks = s.listeningTasks || [];
        if (s.listeningTask) { tasks = [...tasks, s.listeningTask]; }
        return {
            juz30Data:{}, juz29Data:{}, juz30PlanId:'none', juz29PlanId:'none', juz30Certificates:[], juz29Certificates:[], listeningTasks:tasks, ...s
        };
    });
}

function isRtlLang(l) { return l === 'ar'; }
function planMemTitle(plan, lang) {
    if (lang === 'ar') return plan.arTitle;
    const k = { en:'enTitle', fr:'frTitle', de:'deTitle', es:'esTitle', id:'idTitle' }[lang] || 'enTitle';
    return plan[k] || plan.enTitle;
}
function planMemTarget(plan, lang) {
    if (lang === 'ar') return plan.arTarget;
    const k = { en:'enTarget', fr:'frTarget', de:'deTarget', es:'esTarget', id:'idTarget' }[lang] || 'enTarget';
    return plan[k] || plan.enTarget;
}
function planJuzLabel(plan, lang) {
    if (lang === 'ar') return plan.arLabel;
    const k = { en:'enLabel', fr:'frLabel', de:'deLabel', es:'esLabel', id:'idLabel' }[lang] || 'enLabel';
    return plan[k] || plan.enLabel;
}
function getSurahPrimary(surah, lang) {
    if (lang === 'ar') return surah.name;
    return surah.enName;
}
function getSurahSecondary(surah, lang) {
    if (lang === 'ar') return surah.enName;
    const k = { en:'enMeaning', fr:'frMeaning', de:'deMeaning', es:'esMeaning', id:'idMeaning' }[lang] || 'enMeaning';
    return surah[k] || surah.enMeaning;
}
function localeForLang(lang) {
    return { ar:'ar-EG', en:'en-US', fr:'fr-FR', de:'de-DE', es:'es-ES', id:'id-ID' }[lang] || 'en-US';
}
function certLangBadge(code) {
    const m = { ar:'AR', en:'EN', fr:'FR', de:'DE', es:'ES', id:'ID' };
    return m[code] || String(code || '').toUpperCase().slice(0, 2);
}

/** Merge English defaults with locale overrides (fr/de/es/id store only overrides). Arabic stays standalone. */
function uiLocalePack(code) {
    const c = normLang(code);
    if (c === 'ar') return tDict.ar;
    if (c === 'en') return tDict.en;
    const extra = tDict[c];
    if (!extra) return tDict.en;
    return { ...tDict.en, ...extra };
}

const formatRemainingTime = (totalDays, remainingAyahs, lang, tf) => {
    if (remainingAyahs <= 0) return tf('fmtKhatmDone');
    const daysLeft = Math.ceil(totalDays * (remainingAyahs / TOTAL_QURAN_AYAHS));
    if (daysLeft < 30) {
        if (lang === 'ar') return `${daysLeft} يوم`;
        return tf('fmtNDays').replace(/\{\{n\}\}/g, String(daysLeft));
    }
    const months = Math.floor(daysLeft / 30);
    const rDays = Math.ceil(daysLeft % 30);
    if (months < 12) {
        if (lang === 'ar') return `${months} شهر و ${rDays} يوم`;
        return tf('fmtMonthsDays').replace(/\{\{m\}\}/g, String(months)).replace(/\{\{d\}\}/g, String(rDays));
    }
    const years = Math.floor(months / 12);
    const rMonths = months % 12;
    if (lang === 'ar') return `${years} سنة${rMonths > 0 ? ` و ${rMonths} شهر` : ''}`;
    const tail = rMonths > 0 ? tf('fmtYearsMonthsTailEn').replace(/\{\{x\}\}/g, String(rMonths)) : '';
    return tf('fmtYearsMonthsEn').replace(/\{\{y\}\}/g, String(years)).replace(/\{\{tail\}\}/g, tail);
};

const formatJuzETA = (remainingAyahs, ayahsPerWeek, lang, tf) => {
    if (remainingAyahs <= 0) return tf('fmtJuzDone');
    if (ayahsPerWeek <= 0) return '—';
    const weeks = Math.ceil(remainingAyahs / ayahsPerWeek);
    if (weeks < 4) {
        if (lang === 'ar') return `${weeks} أسبوع`;
        return tf('fmtNWeeks').replace(/\{\{n\}\}/g, String(weeks));
    }
    const totalMonths = Math.floor(weeks / 4);
    const remWeeks = weeks % 4;
    if (totalMonths < 12) {
        if (lang === 'ar') return `${totalMonths} شهر${remWeeks > 0 ? ` و ${remWeeks} أسبوع` : ''}`;
        const wPart = remWeeks > 0
            ? (lang === 'en' ? ` and ${remWeeks} week${remWeeks !== 1 ? 's' : ''}`
                : lang === 'fr' ? ` et ${remWeeks} sem.`
                : lang === 'de' ? `, ${remWeeks} Wo.`
                : lang === 'es' ? ` y ${remWeeks} sem.`
                : `, ${remWeeks} mgg`)
            : '';
        return tf('fmtMonthsWeeksEn').replace(/\{\{mo\}\}/g, String(totalMonths)).replace(/\{\{w\}\}/g, wPart);
    }
    const years = Math.floor(totalMonths / 12);
    const remMonths = totalMonths % 12;
    if (lang === 'ar') return `${years} سنة${remMonths > 0 ? ` و ${remMonths} شهر` : ''}`;
    const tail = remMonths > 0 ? tf('fmtYearsMonthsTailEn').replace(/\{\{x\}\}/g, String(remMonths)) : '';
    return tf('fmtYearsMonthsEn').replace(/\{\{y\}\}/g, String(years)).replace(/\{\{tail\}\}/g, tail);
};

// ── Audio Player Modal ───────────────────────────────────────────────────────
function AudioPlayerModal({ surah, onClose, t, lang, hwTask, onHWComplete }) {
    const initialFrom = hwTask ? hwTask.fromAyah : 1;
    const initialTo = hwTask ? hwTask.toAyah : surah.totalAyahs;

    const [fromAyah, setFromAyah] = useState(initialFrom);
    const [toAyah, setToAyah] = useState(initialTo);
    const [currentAyah, setCurrentAyah] = useState(initialFrom);
    const [isPlaying, setIsPlaying] = useState(false);
    const [ayahText, setAyahText] = useState('');
    const [isLoadingText, setIsLoadingText] = useState(false);
    // For HW tasks, reciter is locked to what the teacher assigned.
    // For free listening, the student can pick their own reciter.
    const [reciter, setReciter] = useState(() => {
        if (hwTask && hwTask.reciter) return hwTask.reciter;
        try { return localStorage.getItem('quran-reciter') || 'Husary_128kbps'; }
        catch(e) { return 'Husary_128kbps'; }
    });
    const [loopsCompleted, setLoopsCompleted] = useState(0);
    const [hwFinished, setHwFinished] = useState(false);
    const audioRef = useRef(null);

    const pad = (num) => String(num).padStart(3, '0');
    // Using Mahmoud Khalil Al-Husary 128kbps from everyayah.com
    const audioSrc = `https://everyayah.com/data/${reciter}/${pad(surah.id)}${pad(currentAyah)}.mp3`;

    useEffect(() => {
        let isMounted = true;
        const fetchAyahText = async () => {
            setIsLoadingText(true);
            try {
                const res = await fetch(`https://api.alquran.cloud/v1/ayah/${surah.id}:${currentAyah}/quran-uthmani`);
                const data = await res.json();
                if (isMounted && data.code === 200) {
                    setAyahText(data.data.text);
                }
            } catch (err) {
                console.error('Failed to fetch ayah text', err);
            } finally {
                if (isMounted) setIsLoadingText(false);
            }
        };
        fetchAyahText();
        return () => { isMounted = false; };
    }, [surah.id, currentAyah]);

    useEffect(() => {
        if (isPlaying && audioRef.current && !hwFinished) {
            audioRef.current.play().catch(e => {
                console.error('Audio play blocked or failed:', e);
                setIsPlaying(false);
            });
        }
    }, [currentAyah, isPlaying, hwFinished]);

    const handlePlayPause = () => {
        if (hwFinished) return;
        if (isPlaying) {
            audioRef.current.pause();
            setIsPlaying(false);
        } else {
            let f = Math.max(1, Math.min(parseInt(fromAyah)||1, surah.totalAyahs));
            let t_val = Math.max(f, Math.min(parseInt(toAyah)||surah.totalAyahs, surah.totalAyahs));
            setFromAyah(f);
            setToAyah(t_val);
            if (!isPlaying && (currentAyah < f || currentAyah > t_val)) {
                setCurrentAyah(f);
            }
            setIsPlaying(true);
        }
    };

    const handleStop = () => {
        setIsPlaying(false);
        if (audioRef.current) {
            audioRef.current.pause();
            audioRef.current.currentTime = 0;
        }
        setCurrentAyah(fromAyah);
    };

    const handleEnded = () => {
        if (currentAyah < toAyah) {
            setCurrentAyah(prev => prev + 1);
        } else {
            if (hwTask) {
                const newLoops = loopsCompleted + 1;
                setLoopsCompleted(newLoops);
                if (newLoops >= hwTask.requiredRepeats) {
                    setIsPlaying(false);
                    setHwFinished(true);
                    onHWComplete();
                } else {
                    setCurrentAyah(fromAyah); // loop back to start
                }
            } else {
                setIsPlaying(false);
                setCurrentAyah(fromAyah);
            }
        }
    };

    return (
        <div className="fixed inset-0 z-[200] flex items-center justify-center bg-slate-900/80 backdrop-blur-sm p-2 sm:p-4 animate-fade-in-up" dir={isRtlLang(lang) ? 'rtl' : 'ltr'}>
            <div className="bg-white rounded-2xl sm:rounded-3xl shadow-2xl w-full max-w-lg flex flex-col overflow-hidden relative" style={{maxHeight:'calc(100vh - 16px)'}}>

                {hwFinished && (
                    <div className="absolute inset-0 z-50 bg-white/95 backdrop-blur flex flex-col items-center justify-center p-6 text-center animate-fade-in-up">
                        <div className="text-5xl mb-3 anim-tada">🎉</div>
                        <h2 className="text-xl font-bold text-green-700 mb-2">{t('greatJob')}</h2>
                        <p className="text-slate-600 font-medium mb-5">{t('hwCompletedMsg')}</p>
                        <button onClick={onClose} className="bg-green-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg hover:bg-green-500 w-full">{t('close')}</button>
                    </div>
                )}

                {/* Header - always visible, never scrolls */}
                <div className={`px-4 py-3 flex justify-between items-center text-white shrink-0 ${hwTask ? 'bg-gradient-to-r from-purple-800 to-purple-600' : 'bg-gradient-to-r from-green-800 to-green-600'}`}>
                    <div className="flex items-center gap-2">
                        <i className="fas fa-headphones-alt text-lg text-white/80"></i>
                        <div>
                            <span className="font-bold text-sm sm:text-base">{hwTask ? t('assignHW') : t('audioPlayer')}</span>
                            <span className="block text-xs text-white/70 font-medium">{getSurahPrimary(surah, lang)}</span>
                        </div>

    );

// ── Interactive Word-by-Word Mushaf Page ─────────────────────────────────────
function InteractiveMushafPage({ pageNum, mistakes, onWordClick }) {
    const [lines, setLines] = useState({});
    const [loading, setLoading] = useState(true);

    useEffect(() => {
        const load = async () => {
            setLoading(true);
            try {
                const res = await fetch(`https://api.quran.com/api/v4/verses/by_page/${pageNum}?words=true&word_fields=text_uthmani`);
                const data = await res.json();
                const words = [];
                data.verses.forEach(verse => verse.words.forEach(word => words.push(word)));
                
                const grouped = {};
                words.forEach(w => {
                    const ln = w.line_number;
                    if (!grouped[ln]) grouped[ln] = [];
                    grouped[ln].push(w);
                });
                setLines(grouped);
            } catch(e) { console.error("Failed to load page", e); }
            setLoading(false);
        };
        if(pageNum >= 1 && pageNum <= 604) load();
    }, [pageNum]);

    if (loading) return <div className="flex-1 flex items-center justify-center min-h-[50vh]"><i className="fas fa-spinner fa-spin text-3xl text-green-500"></i></div>;

    return (
        <div className="flex-1 flex flex-col justify-between p-4 sm:p-8 bg-[#fdfaf6] min-h-[50vh] md:min-h-[80vh] relative shadow-[-10px_0_20px_rgba(0,0,0,0.05)_inset]" dir="rtl">
            <div className="flex-1 flex flex-col justify-between max-w-full h-full">
                {Object.keys(lines).sort((a,b)=>Number(a)-Number(b)).map(lineNum => {
                    const lineWords = lines[lineNum];
                    const isCentered = lineWords.length < 5 || (lineWords.length > 0 && lineWords[0].text_uthmani?.includes('بِسۡمِ'));
                    return (
                        <div key={lineNum} className="flex w-full" style={{ justifyContent: isCentered ? 'center' : 'space-between', gap: '6px' }}>
                            {lineWords.map((word, idx) => {
                                const wordKey = `${pageNum}-${word.line_number}-${word.position}-${word.id}`;
                                const mistakeColor = mistakes[wordKey];
                                const bg = mistakeColor === 'red' ? 'bg-red-200 text-red-800 border-b-2 border-red-500' :
                                           mistakeColor === 'orange' ? 'bg-orange-200 text-orange-800 border-b-2 border-orange-500' :
                                           mistakeColor === 'yellow' ? 'bg-yellow-200 text-yellow-800 border-b-2 border-yellow-500' : 'hover:text-green-600 border-b-2 border-transparent hover:border-green-300';
                                return (
                                    <span key={idx} onClick={() => onWordClick(wordKey)}
                                        className={`cursor-pointer transition-all px-0.5 rounded ${bg} flex items-center`}
                                        style={{ fontFamily: "'me_quran', 'Amiri Quran', 'Traditional Arabic', serif", fontSize: 'clamp(18px, 2.3vw, 26px)', lineHeight: '1.8' }}
                                        title={word.translation?.text || ''}>
                                        {word.text_uthmani || word.text}
                                    </span>
                                );
                            })}
                        </div>
                    );
                })}
            </div>
            <div className="text-center mt-4 text-xs text-slate-400 font-bold border-t border-slate-200/50 pt-2">{pageNum}</div>
        </div>
    );
}

// ── Main 2-Page Viewer Modal ─────────────────────────────────────────────────
function MushafViewerModal({ surah, onClose, t, lang }) {
    const startPage = SURAH_START_PAGES[surah.id - 1];
    const [currentPage, setCurrentPage] = useState(startPage);
    const [mistakes, setMistakes] = useState({});

    const rightPageNum = currentPage % 2 !== 0 ? currentPage : currentPage - 1;
    const leftPageNum = rightPageNum + 1;

    const nextPage = () => { if (leftPageNum < 604) setCurrentPage(leftPageNum + 1); };
    const prevPage = () => { if (rightPageNum > 1) setCurrentPage(rightPageNum - 1); };

    const handleWordClick = (wordKey) => {
        setMistakes(prev => {
            const current = prev[wordKey];
            let next = 'red';
            if (current === 'red') next = 'orange';
            else if (current === 'orange') next = 'yellow';
            else if (current === 'yellow') next = null;
            const updated = { ...prev };
            if (next) updated[wordKey] = next; else delete updated[wordKey];
            return updated;
        });
    };

    return (
        <div className="fixed inset-0 z-[300] flex flex-col bg-slate-900/95 backdrop-blur-md animate-fade-in-up">
            <div className="flex flex-wrap items-center justify-between px-4 py-3 bg-slate-800 text-white shadow-md gap-3">
                <div className="flex items-center gap-3">
                    <button onClick={onClose} className="w-8 h-8 md:w-10 md:h-10 rounded-full bg-slate-700 hover:bg-red-500 flex items-center justify-center transition-colors"><i className="fas fa-times text-lg md:text-xl"></i></button>
                    <h2 className="text-lg md:text-xl font-bold font-['Traditional_Arabic']">{getSurahPrimary(surah, lang)}</h2>
                </div>
                <div className="flex items-center gap-2 md:gap-4 text-[10px] md:text-xs font-bold bg-slate-900/50 px-3 py-1.5 rounded-full">
                    <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-red-400"></span> خطأ حفظ</span>
                    <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-orange-400"></span> خطأ تجويد</span>
                    <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-yellow-400"></span> تردد</span>
                </div>
                <div className="flex items-center gap-2 md:gap-4" dir="ltr">
                    <button onClick={prevPage} disabled={rightPageNum <= 1} className="px-3 md:px-4 py-1.5 md:py-2 bg-slate-700 hover:bg-green-600 disabled:opacity-50 rounded-lg font-bold transition-colors text-sm"><i className="fas fa-chevron-left md:mr-2"></i> <span className="hidden md:inline">السابق</span></button>
                    <span className="font-bold text-yellow-400 w-20 md:w-24 text-center text-sm">صفحة {rightPageNum}-{leftPageNum}</span>
                    <button onClick={nextPage} disabled={leftPageNum >= 604} className="px-3 md:px-4 py-1.5 md:py-2 bg-slate-700 hover:bg-green-600 disabled:opacity-50 rounded-lg font-bold transition-colors text-sm"><span className="hidden md:inline">التالي</span> <i className="fas fa-chevron-right md:ml-2"></i></button>
                </div>
            </div>
            <div className="flex-1 overflow-auto flex items-center justify-center p-2 md:p-4">
                <div className="flex flex-col lg:flex-row shadow-2xl ring-4 ring-yellow-600/30 bg-[#fdfaf6] max-w-7xl w-full mx-auto" dir="rtl">
                    <InteractiveMushafPage pageNum={rightPageNum} mistakes={mistakes} onWordClick={handleWordClick} />
                    {leftPageNum <= 604 && (
                        <div className="border-t-2 lg:border-t-0 lg:border-r-2 border-[#e5d5b5] flex-1 flex flex-col">
                            <InteractiveMushafPage pageNum={leftPageNum} mistakes={mistakes} onWordClick={handleWordClick} />
                        </div>
                    )}
                </div>
            </div>
        </div>
    );
}

// ── Juz Visual Report ────────────────────────────────────────────────────────
function JuzVisualReport({ juzNum, surahs, juzData, juzPlanId, lang, t, totalJuzAyahs, onScrollToSurah }) {
    const plan = JUZ_WEEKLY_PLANS.find(p => p.id === (juzPlanId || 'none')) || JUZ_WEEKLY_PLANS[0];
    const isJuz30 = juzNum === 30;

    const stats = useMemo(() => {
        let done=[], inProg=[], notStarted=[], needsRev=[], recentRev=[], oldRev=[];
        const now = Date.now();
        const FOURTEEN_DAYS = 14*24*60*60*1000;
        let totalMemorized = 0;

        surahs.forEach(s => {
            const d = juzData[s.id] || {};
            const m = d.memorized || 0;
            totalMemorized += m;
            if (m === s.totalAyahs) done.push(s);
            else if (m > 0) inProg.push(s);
            else notStarted.push(s);

            // Revision analysis
            const revs = d.revisions || {};
            const vals = Object.values(revs);
            if (vals.length > 0) {
                let hasWeak = false, latestDate = 0;
                vals.forEach(v => {
                    const rating = typeof v==='object' ? v.rating : v;
                    const date = typeof v==='object' ? v.date : 0;
                    if (rating === 'weak') hasWeak = true;
                    if (date > latestDate) latestDate = date;
                });
                if (hasWeak) needsRev.push(s);
                else if (now - latestDate > FOURTEEN_DAYS) oldRev.push(s);
                else recentRev.push(s);
            }
        });

        return { done, inProg, notStarted, needsRev, recentRev, oldRev, totalMemorized };
    }, [juzData, surahs]);

    const remaining = totalJuzAyahs - stats.totalMemorized;
    const pct = Math.round((stats.totalMemorized / totalJuzAyahs) * 100);
    const eta = plan.ayahsPerWeek > 0 ? formatJuzETA(remaining, plan.ayahsPerWeek, lang, t) : null;

    const accentColor = isJuz30 ? '#15803d' : '#d97706';
    const lightBg = isJuz30 ? 'bg-green-50' : 'bg-amber-50';
    const borderColor = isJuz30 ? 'border-green-200' : 'border-amber-200';
    const textColor = isJuz30 ? 'text-green-800' : 'text-amber-800';
    const headerGrad = isJuz30 ? 'from-green-800 to-green-600' : 'from-amber-600 to-yellow-500';

    return (
        <div className="space-y-6">
            {/* Plan info bar */}
            <section className="bg-gradient-to-r from-teal-50 to-emerald-50 rounded-2xl shadow-sm border border-teal-200 p-4 sm:p-5 flex flex-col sm:flex-row items-center justify-between gap-4">
                <div className="flex items-center gap-3">
                    <div className="bg-teal-100 text-teal-600 p-3 rounded-full shrink-0"><i className="fas fa-route text-2xl"></i></div>
                    <div>
                        {plan.ayahsPerWeek > 0 ? (
                            <>
                                <h3 className="font-bold text-teal-900 text-sm sm:text-base">{t('juzWeeklyPlan')}: {planJuzLabel(plan, lang)}</h3>
                                <p className="text-xs sm:text-sm text-teal-700 mt-1"><strong>{t('remainingAyahs')}:</strong> {remaining} {t('ayahs')}</p>
                            </>
                        ) : (
                            <>
                                <h3 className="font-bold text-teal-900 text-sm sm:text-base">{t('noJuzPlanTitle')}</h3>
                                <p className="text-xs sm:text-sm text-teal-700 mt-1 opacity-80">{t('noJuzPlanHint')}</p>
                            </>
                        )}
                    </div>
                </div>
                {plan.ayahsPerWeek > 0 && (
                    <div className="bg-white border border-teal-100 rounded-xl p-3 px-6 text-center shadow-sm shrink-0 w-full sm:w-auto">
                        <p className="text-[10px] sm:text-xs text-gray-500 mb-1">{t('etaToFinish')}</p>
                        <p className="font-black text-teal-600 text-sm sm:text-lg" dir={isRtlLang(lang)?"rtl":"ltr"}>
                            {eta}
                        </p>
                    </div>
                )}
            </section>

            {/* Visual Report Box */}
            <section className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6">
                <h3 className="font-bold text-lg mb-6 flex items-center gap-2 text-slate-800">
                    <i className="fas fa-chart-pie text-green-600 text-xl"></i> {t('juzReport')}
                </h3>
                
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    {/* Col 1: In Progress */}
                    <div className="bg-blue-50/50 border border-blue-100 p-5 rounded-2xl h-full flex flex-col">
                        <h4 className="font-bold text-blue-800 text-sm mb-4 flex items-center gap-2">
                            <i className="fas fa-spinner fa-spin-pulse"></i> {t('juzMemorizingNow')}
                        </h4>
                        <div className="space-y-2.5 max-h-[180px] overflow-y-auto pr-1 custom-scrollbar">
                            {stats.inProg.length > 0 ? stats.inProg.map(s => {
                                const d = juzData[s.id] || {};
                                const m = d.memorized || 0;
                                const p = Math.round((m/s.totalAyahs)*100);
                                return (
                                    <button key={s.id} onClick={() => onScrollToSurah && onScrollToSurah(s.id)} className="w-full text-start bg-white p-3 rounded-xl shadow-sm border border-blue-50 hover:border-blue-300 transition-all group">
                                        <div className="flex justify-between items-center mb-2 text-xs">
                                            <span className="font-bold text-slate-700 group-hover:text-blue-700">{getSurahPrimary(s, lang)}</span>
                                            <span className="text-blue-600 font-bold" dir="ltr">{m} / {s.totalAyahs}</span>
                                        </div>
                                        <div className="w-full bg-blue-100 rounded-full h-1.5">
                                            <div className="bg-blue-500 h-1.5 rounded-full transition-all duration-500" style={{width:`${p}%`}}></div>
                                        </div>
                                    </button>
                                );
                            }) : <p className="text-xs text-slate-500 my-auto text-center">{t('noData')}</p>}
                        </div>
                    </div>

                    {/* Col 2: Completed */}
                    <div className="bg-green-50/50 border border-green-100 p-5 rounded-2xl h-full flex flex-col">
                        <h4 className="font-bold text-green-800 text-sm mb-4 flex items-center gap-2">

                            {stats.done.length > 0 ? stats.done.map(s => (
                                <button key={s.id} onClick={() => onScrollToSurah && onScrollToSurah(s.id)} className="bg-white text-green-700 px-3 py-1.5 rounded-lg text-[11px] sm:text-xs font-bold border border-green-200 shadow-sm hover:bg-green-600 hover:text-white transition-colors">
                                    {getSurahPrimary(s, lang)}
                                </button>
                            )) : <p className="text-xs text-slate-500 my-auto w-full text-center">{t('noData')}</p>}
                        </div>
                    </div>

                    {/* Col 3: Revision status */}
                    <div className="flex flex-col gap-4 h-full">
                        <div className="bg-red-50/70 border border-red-100 p-4 rounded-2xl flex-1 flex flex-col">
                            <h4 className="font-bold text-red-700 mb-3 flex items-center gap-2 text-sm">
                                <i className="fas fa-exclamation-triangle"></i> {t('juzNeedsRevision')}
                            </h4>
                            <div className="flex flex-wrap gap-2 overflow-y-auto custom-scrollbar max-h-[80px] content-start">
                                {stats.needsRev.length > 0 ? stats.needsRev.map(s => (
                                    <button key={s.id} onClick={() => onScrollToSurah && onScrollToSurah(s.id)} className="bg-white text-red-600 px-3 py-1.5 rounded-lg text-[10px] font-bold border border-red-200 shadow-sm hover:bg-red-50">
                                        {getSurahPrimary(s, lang)}
                                    </button>
                                )) : <span className="text-xs text-slate-400 my-auto">—</span>}
                            </div>
                        </div>

                        <div className="bg-orange-50/70 border border-orange-100 p-4 rounded-2xl flex-1 flex flex-col">
                            <h4 className="font-bold text-orange-700 mb-3 flex items-center gap-2 text-sm">

                            <h4 className="font-bold text-green-700 mb-3 flex items-center gap-2 text-sm">
                                <i className="fas fa-check-circle"></i> {t('juzRecentRevision')}

                            <div className="flex flex-wrap gap-2 overflow-y-auto custom-scrollbar max-h-[80px] content-start">
                                {stats.recentRev.length > 0 ? stats.recentRev.map(s => (

                            </div>

                    </div>
                </div>
            </section>
        </div>
    );
}

// ── Child-Friendly Surah Card for Juz 29/30 ─────────────────────────────────
function JuzSurahCard({ surah, juzData, onUpdate, isReadOnly, lang, t, juzNum, onPlayAudio }) {
    const data = juzData[surah.id] || { memorized: 0, revisions: {}, stickers: [] };
    const { memorized, revisions, stickers } = data;
    const isComplete = memorized === surah.totalAyahs;
    const pct = Math.round((memorized / surah.totalAyahs) * 100);

    const [showStickerPicker, setShowStickerPicker] = useState(false);
    const [openRevNum, setOpenRevNum] = useState(null);
    const emoji = SURAH_EMOJI[surah.id] || '📖';

    const isJuz30 = juzNum === 30;
    const accentColor = isJuz30 ? '#15803d' : '#d97706';
    const lightBg = isJuz30 ? '#f0fdf4' : '#fffbeb';
    const borderColor = isComplete ? '#fbbf24' : (isJuz30 ? '#bbf7d0' : '#fde68a');

    const toggleComplete = () => { if (isReadOnly) return; onUpdate(surah.id, { memorized: isComplete ? 0 : surah.totalAyahs }); };
    const handleMemorized = (val) => { if (isReadOnly) return; onUpdate(surah.id, { memorized: Math.max(0, Math.min(surah.totalAyahs, parseInt(val)||0)) }); };
    const addSticker = (stk) => { if (isReadOnly) return; onUpdate(surah.id, { stickers: [...(stickers||[]), stk] }); setShowStickerPicker(false); };
    const removeSticker = (idx) => { if (isReadOnly) return; const n=[...(stickers||[])]; n.splice(idx,1); onUpdate(surah.id, { stickers:n }); };
    const setRevision = (num, rating) => {
        if (isReadOnly) return;
        const newR = {...(revisions||{})};
        if (rating===null) delete newR[num]; else newR[num] = { rating, date:Date.now() };
        onUpdate(surah.id, { revisions:newR }); setOpenRevNum(null);
    };
    const clearRevisions = () => { if (isReadOnly) return; onUpdate(surah.id, { revisions:{} }); };
    const resetSurah = () => { if (isReadOnly) return; onUpdate(surah.id, { memorized:0, revisions:{}, stickers:[] }); };

    return (
        <div id={`juz${juzNum}-surah-${surah.id}`}
            className={`child-card rounded-2xl p-4 transition-all ${isComplete ? 'child-card-complete' : 'child-card-incomplete'}`}
            style={{ borderColor, background: isComplete ? undefined : 'white' }}>
            <div className="flex items-start gap-3 mb-3">
                <div className="surah-emoji-badge text-2xl" style={{ background: lightBg, color: accentColor, fontSize:'1.6rem' }}>{emoji}</div>
                <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2">
                        <span className="text-xs font-bold px-2 py-0.5 rounded-full text-white" style={{ background:accentColor }}>{surah.id}</span>
                        <h3 className="text-base font-bold text-slate-800 truncate">{getSurahPrimary(surah, lang)}</h3>
                        <button onClick={() => onPlayAudio({ surah, hwTask: null })} className="text-green-500 hover:text-green-700 bg-green-50 hover:bg-green-100 w-6 h-6 rounded-full flex items-center justify-center transition-colors" title={t('listenSurah')}>
                            <i className="fas fa-headphones-alt text-xs"></i>
                        </button>
                        <button onClick={() => setMushafSurah(surah)} className="text-blue-500 hover:text-blue-700 bg-blue-50 hover:bg-blue-100 w-6 h-6 rounded-full flex items-center justify-center transition-colors mr-1" title="عرض المصحف">
                            <i className="fas fa-book-open text-xs"></i>
                        </button>
                        {isComplete && <span className="text-yellow-500 text-lg anim-tada">🌟</span>}
                    </div>
                    <p className="text-xs text-slate-400 mt-0.5">{getSurahSecondary(surah, lang)} • {surah.totalAyahs} {t('ayahs')}</p>
                </div>
                <button onClick={toggleComplete} className={`w-9 h-9 rounded-full flex items-center justify-center text-lg transition-all shrink-0 ${isComplete ? 'text-yellow-500 bg-yellow-100 shadow-md scale-110' : 'text-slate-300 hover:text-yellow-400 bg-slate-50 hover:bg-yellow-50'}`}>
                    {isComplete ? '✅' : '☐'}
                </button>
            </div>
            <div className="mb-3">
                <div className="flex justify-between items-center mb-1">
                    <span className="text-xs text-slate-500">{pct}% {t('memorizedOf') || 'memorized'}</span>
                    <span className="text-xs font-bold" style={{ color:accentColor }}>{memorized} / {surah.totalAyahs}</span>
                </div>
                <div className="w-full bg-slate-100 rounded-full h-3 overflow-hidden">
                    <div className="h-full rounded-full transition-all duration-500" style={{ width:`${pct}%`, background: isComplete ? 'linear-gradient(90deg,#f59e0b,#10b981)' : accentColor }} />
                </div>
                {!isReadOnly && (
                    <div className="flex items-center gap-2 mt-2">
                        <input type="range" min="0" max={surah.totalAyahs} value={memorized} className="flex-1 h-2 cursor-pointer rounded-lg" style={{ accentColor }} onChange={(e) => handleMemorized(e.target.value)} />
                        <input type="number" min="0" max={surah.totalAyahs} value={memorized || ''} placeholder="0"
                            className="w-14 text-center text-sm font-bold rounded-lg border border-slate-200 py-1 focus:outline-none"
                            style={{ borderColor: accentColor+'80' }} onChange={(e) => handleMemorized(e.target.value)} />
                    </div>
                )}
            </div>
            <div className="flex items-center gap-2 mb-3">
                <span className="text-xs text-slate-500 font-medium shrink-0">{t('revision')}</span>
                <div className="flex gap-1.5" dir="ltr">
                    {[1,2,3,4,5].map(num => {
                        const rev = (revisions||{})[num];
                        const rating = rev?.rating || null;
                        const isOpen = openRevNum === num;
                        const cls = rating==='excellent' ? 'bg-green-100 border-green-500 text-green-700' :
                                    rating==='good' ? 'bg-blue-100 border-blue-500 text-blue-700' :
                                    rating==='weak' ? 'bg-orange-100 border-orange-500 text-orange-700' :
                                    'bg-slate-50 border-slate-200 text-slate-400 hover:border-green-400';
                        return (
                            <div key={num} className="relative">
                                <button onClick={() => !isReadOnly && setOpenRevNum(isOpen ? null : num)}
                                    className={`w-7 h-7 rounded-full border text-xs flex items-center justify-center font-bold transition-all ${cls} ${isReadOnly?'cursor-default':'cursor-pointer'}`}>
                                    {rating==='excellent'?'★':rating==='good'?'✓':rating==='weak'?'!':num}
                                </button>
                                {isOpen && !isReadOnly && (
                                    <>
                                        <div className="fixed inset-0 z-40" onClick={() => setOpenRevNum(null)} />
                                        <div className="absolute bottom-9 left-1/2 -translate-x-1/2 bg-white rounded-xl shadow-xl border border-slate-200 p-1.5 flex gap-1 z-50 whitespace-nowrap">
                                            <button onClick={() => setRevision(num,'excellent')} className="px-2 py-1 text-xs bg-green-50 hover:bg-green-100 text-green-700 rounded-lg border border-green-200">★ {t('excellent')}</button>
                                            <button onClick={() => setRevision(num,'good')} className="px-2 py-1 text-xs bg-blue-50 hover:bg-blue-100 text-blue-700 rounded-lg border border-blue-200">✓ {t('good')}</button>
                                            <button onClick={() => setRevision(num,'weak')} className="px-2 py-1 text-xs bg-orange-50 hover:bg-orange-100 text-orange-700 rounded-lg border border-orange-200">! {t('weak')}</button>
                                            {rating && <button onClick={() => setRevision(num,null)} className="px-2 py-1 text-xs bg-slate-50 hover:bg-slate-100 text-slate-400 rounded-lg border border-slate-200">✕</button>}
                                        </div>
                                    </>
                                )}
                            </div>
                        );
                    })}
                </div>
                {!isReadOnly && Object.keys(revisions||{}).length > 0 && (
                    <button onClick={clearRevisions} className="ml-auto text-slate-300 hover:text-red-400 text-xs px-1.5 py-0.5 rounded hover:bg-red-50 transition-colors" title={t('resetRevisions')}>↺</button>
                )}
            </div>
            <div className="border-t border-slate-100 pt-3">
                <div className="flex items-center gap-1 flex-wrap">
                    <span className="text-xs text-slate-400 font-medium shrink-0">{t('stickerLabel')}</span>
                    {(stickers||[]).map((stk, idx) => (
                        <span key={idx} className="sticker-award text-2xl sticker-pop" title={isReadOnly ? stk : t('removeSticker')} onClick={() => !isReadOnly && removeSticker(idx)}>{stk}</span>
                    ))}
                    {!isReadOnly && (
                        <button onClick={() => setShowStickerPicker(!showStickerPicker)}
                            className="flex items-center gap-1 px-2 py-1 rounded-full text-xs font-bold border-2 border-dashed border-yellow-400 text-yellow-600 hover:bg-yellow-50 hover:border-yellow-500 transition-colors">
                            + {t('addStickerBtn')}
                        </button>
                    )}
                </div>
                {showStickerPicker && !isReadOnly && (
                    <StickerPicker onSelect={addSticker} onClose={() => setShowStickerPicker(false)} t={t} />
                )}
            </div>
            {!isReadOnly && (
                <div className="flex justify-end mt-2">
                    <button onClick={resetSurah} className="text-xs text-slate-300 hover:text-red-400 hover:bg-red-50 px-2 py-0.5 rounded transition-colors">↺ {t('resetSurahData')}</button>
                </div>
            )}
        </div>
    );
}

// ── Juz Section (29 or 30) ───────────────────────────────────────────────────
function JuzSection({ juzNum, surahs, student, onUpdate, isReadOnly, t, onIssueCert, onViewCert, getBadge, lang, onReset, onPlayAudio, onClearHW }) {
    const juzKey = `juz${juzNum}Data`;
    const planKey = `juz${juzNum}PlanId`;
    const certKey = `juz${juzNum}Certificates`;
    const juzData = student[juzKey] || {};
    const juzPlanId = student[planKey] || 'none';
    const juzCerts = student[certKey] || [];
    const isJuz30 = juzNum === 30;
    const totalJuzAyahs = isJuz30 ? JUZ30_TOTAL_AYAHS : JUZ29_TOTAL_AYAHS;

    const stats = useMemo(() => {
        let done=0, inProg=0, total=0, memorized=0;
        surahs.forEach(s => { const d=juzData[s.id]||{}; const m=d.memorized||0; memorized+=m; total+=s.totalAyahs; if(m===s.totalAyahs)done++; else if(m>0)inProg++; });
        return { done, inProg, notStarted:surahs.length-done-inProg, total, memorized, pct:Math.round((memorized/total)*100) };
    }, [juzData, surahs]);

    const isFullyComplete = stats.done === surahs.length;

    const plan = JUZ_WEEKLY_PLANS.find(p => p.id === juzPlanId) || JUZ_WEEKLY_PLANS[0];
    const remaining = totalJuzAyahs - stats.memorized;
    const eta = plan.ayahsPerWeek > 0 ? formatJuzETA(remaining, plan.ayahsPerWeek, lang, t) : null;

    const handleUpdate = (surahId, updates) => {
        const existing = juzData[surahId] || { memorized:0, revisions:{}, stickers:[] };
        onUpdate(juzKey, { ...juzData, [surahId]: { ...existing, ...updates } });
    };

    const handleSetPlan = (planId) => {
        onUpdate(planKey, planId);
    };

    const scrollToSurahCard = (surahId) => {
        const el = document.getElementById(`juz${juzNum}-surah-${surahId}`);
        if (el) { const y = el.getBoundingClientRect().top + window.pageYOffset - 220; window.scrollTo({ top:y, behavior:'smooth' }); }
    };

    const certAccentBorder = isJuz30 ? 'border-green-200' : 'border-amber-200';
    const certAccentBg = isJuz30 ? 'bg-green-600' : 'bg-amber-500';
    const certIconColor = isJuz30 ? 'text-green-600' : 'text-amber-600';
    const certBadgeColor = isJuz30 ? 'bg-green-100 text-green-800' : 'bg-amber-100 text-amber-800';

    return (
        <div className="space-y-5">
            {isFullyComplete && (
                <div className={`rounded-2xl p-4 text-center font-bold text-lg border-2 ${isJuz30 ? 'bg-green-50 border-green-300 text-green-800' : 'bg-amber-50 border-amber-300 text-amber-800'}`}>
                    <span className="anim-tada inline-block">{t(isJuz30 ? 'juz30Complete' : 'juz29Complete')}</span>
                </div>
            )}

            {!isReadOnly && student.listeningTasks && student.listeningTasks.length > 0 && (
                <div className="space-y-3">
                    {student.listeningTasks.map(task => (
                        <TeacherHWAlert key={task.id} task={task} onClear={() => onClearHW(task.id)} lang={lang} t={t} />
                    ))}
                </div>
            )}

            <JuzVisualReport juzNum={juzNum} surahs={surahs} juzData={juzData} juzPlanId={juzPlanId} lang={lang} t={t} totalJuzAyahs={totalJuzAyahs} onScrollToSurah={scrollToSurahCard} />

            <div className={`bg-white rounded-3xl shadow-sm border ${certAccentBorder} p-5`}>
                <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
                    <h3 className="font-bold text-base flex items-center gap-2 text-slate-800">
                        <i className={`fas fa-award text-2xl ${certIconColor}`}></i>
                        {t('juzCertHonorBoard')}
                        {juzCerts.length > 0 && <span className={`text-[11px] px-2 py-0.5 rounded-full font-bold ${certBadgeColor}`}>{juzCerts.length}</span>}
                    </h3>
                </div>
                {juzCerts.length === 0 ? (
                    <div className={`text-center py-6 rounded-2xl border-2 border-dashed ${isJuz30 ? 'border-green-200 text-green-400' : 'border-amber-100 text-amber-400'}`}>
                        <i className="fas fa-certificate text-3xl mb-2 opacity-30"></i>
                        <p className="text-xs font-medium opacity-60">{t('noCertificatesYet')}</p>
                    </div>
                ) : (
                    <div className="flex flex-wrap gap-3">
                        {juzCerts.map((cert) => {
                            const cl = normLang(cert.certLang || lang);
                            return (
                                <button key={cert.id} onClick={() => onViewCert(cert, juzNum)}
                                    className={`flex items-center gap-3 bg-gradient-to-l from-yellow-50/50 to-white min-w-[200px] border border-yellow-100 p-3 rounded-2xl hover:shadow-md hover:border-yellow-300 transition-all text-start relative group`}>
                                    <div className={`${certAccentBg} text-white w-10 h-10 rounded-full flex items-center justify-center shadow-md group-hover:scale-110 transition-transform shrink-0`}>
                                        <i className="fas fa-certificate text-sm"></i>
                                    </div>
                                    <div>
                                        <p className="font-bold text-xs text-slate-800">{t('certAchievement')} {cert.percentage}%</p>
                                        <p className="text-[10px] text-slate-500 mt-0.5">{new Date(cert.timestamp).toLocaleDateString(localeForLang(lang))}</p>
                                    </div>
                                    <span className="absolute top-2 right-2 text-[9px] bg-slate-100 text-slate-800 font-bold px-1.5 py-0.5 rounded">{certLangBadge(cl)}</span>
                                </button>
                            );
                        })}
                    </div>
                )}
            </div>

            {!isReadOnly && (
                <div className="flex justify-end items-center">
                    <button onClick={onReset} className="flex items-center gap-2 text-red-600 bg-red-50 hover:bg-red-100 px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                        <i className="fas fa-sync-alt"></i> {t('resetThisJuz')}
                    </button>
                </div>
            )}

            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                {surahs.map(surah => (
                    <JuzSurahCard key={surah.id} surah={surah} juzData={juzData}
                        onUpdate={handleUpdate} isReadOnly={isReadOnly} lang={lang} t={t} juzNum={juzNum} onPlayAudio={onPlayAudio} />
                ))}
            </div>
        </div>
    );
}

// ── Main App ─────────────────────────────────────────────────────────────────
function App() {
    const [lang, setLangState] = useState(() => { try { return normLang(localStorage.getItem('quran-lang')); } catch(e) { return 'ar'; } });
    const isRtl = isRtlLang(lang);
    const t = (key) => {
        const pack = uiLocalePack(lang);
        if (pack[key] !== undefined) return pack[key];
        return tDict.en[key] ?? key;
    };
    
    const hasLoadedLangRef = useRef(false);
    const langCloudRef = useRef(lang);
    langCloudRef.current = lang;

    const setLang = (code) => {
        const n = normLang(code);
        setLangState(n);
        try { localStorage.setItem('quran-lang', n); } catch(e) {}
        if (db && syncKey && !isAdminMode) {
            if (isReadOnly && currentId) {
                const updated = students.map(s => s.id === currentId ? { ...s, interfaceLang: n } : s);
                setStudents(updated);
                setDoc(doc(db, 'quran_centers', syncKey), { students: updated }, { merge: true });
            } else if (!isReadOnly) {
                setDoc(doc(db, 'quran_centers', syncKey), { teacherLang: n }, { merge: true });
            }
        }
    };

    useEffect(() => {
        document.documentElement.lang = lang;
        document.documentElement.dir = isRtl ? 'rtl' : 'ltr';
    }, [lang, isRtl]);

    const [syncKey, setSyncKey] = useState(() => {
        if (localStorage.getItem('quran-parent-code')) {
            return localStorage.getItem('quran-student-sync-key') || "";
        }
        try { return localStorage.getItem('quran-sync-key') || ""; } catch(e) { return ""; }
    });
    const [isReadOnly, setIsReadOnly] = useState(() => !!localStorage.getItem('quran-parent-code'));
    const [showSyncModal, setShowSyncModal] = useState(() => {
        if (localStorage.getItem('quran-parent-code')) return false;
        try { return !localStorage.getItem('quran-sync-key'); } catch(e) { return true; }
    });

    const [tempSyncKey, setTempSyncKey] = useState("");
    const [isSaving, setIsSaving] = useState(false);
    const [isAdminMode, setIsAdminMode] = useState(false);
    const [activeTab, setActiveTab] = useState('main');

    const defaultStudent = { id:'1', name:'طالب 1', progress:{}, revisions:{}, certificates:[], planId:'none', juz30Data:{}, juz29Data:{}, juz30PlanId:'none', juz29PlanId:'none', listeningTasks:[] };
    const [students, setStudents] = useState([defaultStudent]);
    const [currentId, setCurrentId] = useState('1');
    const [allowedCodes, setAllowedCodes] = useState([]);
    const [newCodeInput, setNewCodeInput] = useState("");
    const [searchQuery, setSearchQuery] = useState("");
    const [revisionSelector, setRevisionSelector] = useState(null);
    const [currentJuz, setCurrentJuz] = useState(1);
    const [dialog, setDialog] = useState({ isOpen:false, type:'confirm', message:'', defaultValue:'', onConfirm:()=>{} });
    const [highlightedSurah, setHighlightedSurah] = useState(null);
    const [selectedCert, setSelectedCert] = useState(null);
    const [selectedJuzCert, setSelectedJuzCert] = useState(null);
    const [showCertWizard, setShowCertWizard] = useState(null);
    const [isDataLoaded, setIsDataLoaded] = useState(false);
    const [audioPlayerSurah, setAudioPlayerSurah] = useState(null);
    const [showAssignHWModal, setShowAssignHWModal] = useState(false);
    const [mushafSurah, setMushafSurah] = useState(null);

    useEffect(() => {
        if (!db || !syncKey || isAdminMode) return;
        setIsDataLoaded(false);
        const docRef = doc(db, 'quran_centers', syncKey);

        const applyFromDocData = (data) => {
            const migrated = migrateStudentsFromFirestore(data.students);
            if (!migrated) return false;
            setStudents(migrated);
            if (isReadOnly) {
                const parentCode = localStorage.getItem('quran-parent-code');
                if (parentCode && parentCode.includes('-')) {
                    const [firstName, pin] = parentCode.split('-');
                    const target = migrated.find(s => s.name.trim().split(/\s+/)[0].toLowerCase() === firstName && s.pin === pin);
                    if (target) {
                        setCurrentId(target.id);
                        if (!hasLoadedLangRef.current && target.interfaceLang) {
                            const nl = normLang(target.interfaceLang);
                            setLang(nl);
                            localStorage.setItem('quran-lang', nl);
                        }
                    }
                }
            } else if (data.currentId && migrated.find(s => s.id === data.currentId)) {
                setCurrentId(data.currentId);
                if (!hasLoadedLangRef.current && data.teacherLang) {
                    const nl = normLang(data.teacherLang);
                    setLang(nl);
                    localStorage.setItem('quran-lang', nl);
                }
            }
            hasLoadedLangRef.current = true;
            return true;
        };

        const seedDocForNewTeacher = async () => {
            const seed = { id:'1', name:'طالب 1', progress:{}, revisions:{}, certificates:[], planId:'none', juz30Data:{}, juz29Data:{}, juz30PlanId:'none', juz29PlanId:'none', listeningTasks:[] };
            await setDoc(docRef, { students: [seed], currentId: '1', teacherLang: langCloudRef.current }, { merge: true });
        };

        const reconcileCenterWithServer = async (reason) => {
            try {
                const serverSnap = await getDocFromServer(docRef);
                if (serverSnap.exists()) {
                    const data = serverSnap.data();
                    if (applyFromDocData(data)) return;
                    if (!isReadOnly) {
                        const seed = { id:'1', name:'طالب 1', progress:{}, revisions:{}, certificates:[], planId:'none', juz30Data:{}, juz29Data:{}, juz30PlanId:'none', juz29PlanId:'none', listeningTasks:[] };
                        setStudents([seed]);
                        setCurrentId('1');
                        await setDoc(docRef, { students: [seed], currentId: '1', teacherLang: langCloudRef.current }, { merge: true });
                        hasLoadedLangRef.current = true;
                    }
                    return;
                }
                if (!isReadOnly) await seedDocForNewTeacher();
            } catch (e) {
                console.warn('quran_centers server reconcile failed', reason, e);
            }
        };

        const unsub = onSnapshot(docRef, (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                if (!applyFromDocData(data)) {
                    reconcileCenterWithServer(docSnap.metadata.fromCache ? 'cache-incomplete' : 'doc-incomplete');
                }
            } else {
                reconcileCenterWithServer(docSnap.metadata.fromCache ? 'cache-missing-doc' : 'missing-doc');
            }
            setIsDataLoaded(true);
        });
        return () => { unsub(); hasLoadedLangRef.current = false; };
    }, [syncKey, isAdminMode, isReadOnly]);

    useEffect(() => {
        if (!db || isReadOnly) return;
        const adminRef = doc(db, 'quran_centers', '_admin_settings_');
        const unsub = onSnapshot(adminRef, (docSnap) => {
            if (docSnap.exists()) {
                const codes = docSnap.data().codes || [];
                setAllowedCodes(codes);
                if (syncKey && syncKey !== MASTER_ADMIN_PASSWORD && !codes.includes(syncKey)) {
                    setSyncKey(""); setShowSyncModal(true);
                    try { localStorage.removeItem('quran-sync-key'); } catch(e){}
                    setDialog({ isOpen:true, type:'alert', message:t('codeRevoked'), onConfirm:()=>setDialog({isOpen:false}) });
                }
            }
        });
        return () => unsub();
    }, [db, syncKey, isReadOnly, lang]);

    const saveToCloud = async (newStudents, newId) => {
        if (isReadOnly) return;
        setStudents(newStudents); setCurrentId(newId);
        if (db && syncKey) {
            setIsSaving(true);
            try { await setDoc(doc(db,'quran_centers',syncKey), { students:newStudents, currentId:newId }, { merge:true }); }
            catch(e) { console.error(e); } finally { setTimeout(()=>setIsSaving(false), 500); }
        }
    };

    const handleSetSyncKey = async (e) => {
        e.preventDefault();
        const key = tempSyncKey.trim().toLowerCase();
        if (!key) return;
        setIsSaving(true);
        if (key === MASTER_ADMIN_PASSWORD) {
            setIsAdminMode(true); setTempSyncKey(""); setShowSyncModal(false); setIsSaving(false); return;
        }

        try {
            const adminSnap = await getDoc(doc(db,'quran_centers','_admin_settings_'));
            const codes = adminSnap.exists() ? adminSnap.data().codes || [] : [];

            if (key.includes('-')) {
                const parts = key.split('-');
                const part1 = parts[0].trim();
                const part2 = parts[1].trim();

                // Smart detection to handle RTL/LTR typing flips: 
                // Checks which part is the number (PIN) and which is the Name
                let firstName, pin;
                if (/^\d+$/.test(part1)) {
                    pin = part1;
                    firstName = part2;
                } else {
                    firstName = part1;
                    pin = part2;
                }

                let foundTeacherCode = null;

                // SPEED OPTIMIZATION FOR LARGE ACADEMIES: Process in fast batches of 15 
                // and STOP immediately once the student is found to save massive time!
                const chunkSize = 15;
                for (let i = 0; i < codes.length; i += chunkSize) {
                    const chunk = codes.slice(i, i + chunkSize);
                    const snapPromises = chunk.map(code => getDoc(doc(db,'quran_centers', code)).catch(() => null));
                    const snaps = await Promise.all(snapPromises);

                    for (let j = 0; j < snaps.length; j++) {
                        const snap = snaps[j];
                        if (snap && snap.exists()) {
                            const studentsList = snap.data().students || [];
                            const foundStudent = studentsList.find(s => 
                                s.name.trim().split(/\s+/)[0].toLowerCase() === firstName && 
                                s.pin === pin
                            );
                            if (foundStudent) {
                                foundTeacherCode = chunk[j];
                                break;
                            }
                        }
                    }
                    // If we found the student in this batch, stop searching the rest of the teachers!
                    if (foundTeacherCode) break; 
                }

                if (foundTeacherCode) {
                    setIsDataLoaded(false); 
                    setIsReadOnly(true); 
                    setSyncKey(foundTeacherCode);
                    localStorage.setItem('quran-student-sync-key', foundTeacherCode);
                    localStorage.setItem('quran-parent-code', key); 
                    setShowSyncModal(false);
                } else { 
                    setDialog({ isOpen:true, type:'alert', message:t('parentCodeInvalid'), onConfirm:()=>setDialog({isOpen:false}) }); 
                }
                setIsSaving(false); 
                return;
            }

            if (codes.includes(key)) {
                setIsDataLoaded(false); setSyncKey(key);
                localStorage.setItem('quran-sync-key', key); setShowSyncModal(false);
            } else { 
                setDialog({ isOpen:true, type:'alert', message:t('codeNotRegistered'), onConfirm:()=>setDialog({isOpen:false}) }); 
            }
        } catch(err) { 
            setDialog({ isOpen:true, type:'alert', message:t('connError'), onConfirm:()=>setDialog({isOpen:false}) }); 
        }
        setIsSaving(false);
    };

    const handleAddCode = async () => {
        const code = newCodeInput.trim().toLowerCase();
        if (!code) return;
        if (allowedCodes.includes(code)) { setDialog({ isOpen:true, type:'alert', message:t('codeInvalid'), onConfirm:()=>setDialog({isOpen:false}) }); return; }
        await setDoc(doc(db,'quran_centers','_admin_settings_'), { codes:[...allowedCodes, code] }, { merge:true });
        setNewCodeInput("");
    };

    const handleRemoveCode = (code) => {
        setDialog({ isOpen:true, type:'confirm', message:`${t('confirmDeleteAdmin')} "${code}"؟`, onConfirm: async () => {
            await setDoc(doc(db,'quran_centers','_admin_settings_'), { codes:allowedCodes.filter(c=>c!==code) }, { merge:true });
            setDialog({ isOpen:false });
        }});
    };

    const handleLogout = () => {
        setIsDataLoaded(false); setSyncKey(""); setIsAdminMode(false); setIsReadOnly(false); setShowSyncModal(true);
        localStorage.removeItem('quran-sync-key'); 
        localStorage.removeItem('quran-parent-code');
        localStorage.removeItem('quran-student-sync-key');
        setStudents([defaultStudent]); setCurrentId('1');
        hasLoadedLangRef.current = false;
    };

    const currentStudent = students.find(s => s.id === currentId) || students[0];
    const progress = currentStudent?.progress || {};
    const revisions = currentStudent?.revisions || {};

    useEffect(() => {
        if (isDataLoaded && !isReadOnly && !isAdminMode && syncKey && currentStudent && !currentStudent.pin && students.length > 0) {
            const newPin = Math.floor(1000 + Math.random() * 9000).toString();
            saveToCloud(students.map(s => s.id===currentStudent.id ? { ...s, pin:newPin, planId:s.planId||'none', juz30Data:s.juz30Data||{}, juz29Data:s.juz29Data||{}, juz30PlanId:s.juz30PlanId||'none', juz29PlanId:s.juz29PlanId||'none', listeningTasks:s.listeningTasks||[] } : s), currentId);
        }
    }, [currentStudent, isReadOnly, isAdminMode, syncKey, students, isDataLoaded]);

    const addStudent = () => {
        setDialog({ isOpen:true, type:'prompt', message:t('studentNamePrompt'), onConfirm:(name) => {
            if (name?.trim()) {
                const nId = Date.now().toString();
                const pin = Math.floor(1000 + Math.random() * 9000).toString();
                saveToCloud([...students, { id:nId, name:name.trim(), progress:{}, revisions:{}, pin, certificates:[], planId:'none', juz30Data:{}, juz29Data:{}, juz30PlanId:'none', juz29PlanId:'none', listeningTasks:[] }], nId);
            }
            setDialog({ isOpen:false });
        }});
    };

    const renameStudent = () => {
        setDialog({ isOpen:true, type:'prompt', message:t('editStudentPrompt'), defaultValue:currentStudent.name, onConfirm:(newName) => {
            if (newName?.trim()) saveToCloud(students.map(s => s.id===currentId ? {...s, name:newName.trim()} : s), currentId);
            setDialog({ isOpen:false });
        }});
    };

    const deleteStudent = () => {
        if (students.length===1) { setDialog({ isOpen:true, type:'alert', message:t('cantDeleteOnlyStudent'), onConfirm:()=>setDialog({isOpen:false}) }); return; }
        setDialog({ isOpen:true, type:'confirm', message:`${t('confirmDeleteStudent')} "${currentStudent.name}"؟`, onConfirm:() => {
            const filtered = students.filter(s => s.id!==currentId);
            saveToCloud(filtered, filtered[0].id); setDialog({ isOpen:false });
        }});
    };

    const resetSectionData = (section) => {
        let msg = `${t('confirmReset')} ${currentStudent.name}؟`;
        if (section === 'juz30') msg = t('confirmResetJuz30');
        if (section === 'juz29') msg = t('confirmResetJuz29');

        setDialog({ isOpen:true, type:'confirm', message: msg, onConfirm:() => {
            saveToCloud(students.map(s => {
                if (s.id !== currentId) return s;
                let updated = { ...s };
                if (section === 'main') {
                    updated.progress = {};
                    updated.revisions = {};
                    updated.juz30Data = {};
                    updated.juz29Data = {};
                } else if (section === 'juz30') {
                    updated.juz30Data = {};
                    let newProgress = { ...(updated.progress || {}) };
                    JUZ30_IDS.forEach(id => delete newProgress[id]);
                    updated.progress = newProgress;
                } else if (section === 'juz29') {
                    updated.juz29Data = {};
                    let newProgress = { ...(updated.progress || {}) };
                    JUZ29_IDS.forEach(id => delete newProgress[id]);
                    updated.progress = newProgress;
                }
                return updated;
            }), currentId);
            setDialog({ isOpen:false });
        }});
    };

    const openPlanDialog = () => {
        setDialog({ isOpen:true, type:'planSelect', message:t('selectPlanMsg'), onConfirm:(selectedPlanId) => {
            saveToCloud(students.map(s => s.id===currentId ? {...s, planId:selectedPlanId} : s), currentId);
            setDialog({ isOpen:false });
        }});
    };

    const handleJuzUpdate = (keyOrJuzKey, value) => {
        saveToCloud(students.map(s => {
            if (s.id === currentId) {
                let updatedStudent = { ...s, [keyOrJuzKey]: value };
                if (keyOrJuzKey === 'juz30Data' || keyOrJuzKey === 'juz29Data') {
                    let newProgress = { ...(s.progress || {}) };
                    Object.keys(value).forEach(surahId => {
                        if (value[surahId]?.memorized !== undefined) {
                            newProgress[surahId] = value[surahId].memorized;
                        }
                    });
                    updatedStudent.progress = newProgress;
                }
                return updatedStudent;
            }
            return s;
        }), currentId);
    };

    const fallbackCopy = (text) => {
        const ta = document.createElement("textarea"); ta.value=text; ta.style.position="fixed"; ta.style.top="0"; ta.style.left="0";
        document.body.appendChild(ta); ta.focus(); ta.select(); try { document.execCommand('copy'); } catch(err) {} document.body.removeChild(ta);
    };

    const handleShare = () => {
        const pin = currentStudent.pin || "0000";
        const firstName = currentStudent.name.trim().split(/\s+/)[0].toLowerCase();
        const studentCode = `${firstName}-${pin}`;
        
        if (!navigator.clipboard) { fallbackCopy(studentCode); setDialog({ isOpen:true, type:'alert', message:t('linkCopied'), onConfirm:()=>setDialog({isOpen:false}) }); return; }
        navigator.clipboard.writeText(studentCode).then(() => setDialog({ isOpen:true, type:'alert', message:t('linkCopied'), onConfirm:()=>setDialog({isOpen:false}) }),
            () => { fallbackCopy(studentCode); setDialog({ isOpen:true, type:'alert', message:t('linkCopied'), onConfirm:()=>setDialog({isOpen:false}) }); });
    };

    // HW Functions
    const handleAssignHW = (task) => {
        saveToCloud(students.map(s => s.id === currentId ? { ...s, listeningTasks: [...(s.listeningTasks || []), task] } : s), currentId);
        setShowAssignHWModal(false);
    };
    const handleClearHW = (taskId) => {
        saveToCloud(students.map(s => s.id === currentId ? { ...s, listeningTasks: (s.listeningTasks || []).filter(t => t.id !== taskId) } : s), currentId);
    };
    const handleHWComplete = (taskId) => {
        const student = students.find(s => s.id === currentId);
        if(student && student.listeningTasks) {
             const updatedTasks = student.listeningTasks.map(t => t.id === taskId ? { ...t, completed: true } : t);
             const fakeCloudCall = () => {
                 setStudents(students.map(s => s.id === currentId ? { ...s, listeningTasks: updatedTasks } : s));
                 if(db && syncKey && !isReadOnly) {
                     setDoc(doc(db,'quran_centers',syncKey), { students: students.map(s => s.id === currentId ? { ...s, listeningTasks: updatedTasks } : s), currentId }, { merge:true });
                 }
             };
             // Use API call manually to let student signal completion
             if(isReadOnly && db && syncKey) {
                 setDoc(doc(db,'quran_centers',syncKey), { students: students.map(s => s.id === currentId ? { ...s, listeningTasks: updatedTasks } : s), currentId }, { merge:true });
                 setStudents(students.map(s => s.id === currentId ? { ...s, listeningTasks: updatedTasks } : s));
             } else {
                 fakeCloudCall();
             }
        }
    };
    const startAudioHW = (task) => {
        const hwSurah = SURAHS_DATA.find(s => s.id === task.surahId);
        if (hwSurah) {
            setAudioPlayerSurah({ surah: hwSurah, hwTask: task });
        }
    };

    const stats = useMemo(() => {
        let total=0; let done=0;
        SURAHS_DATA.forEach(s => { const m=progress[s.id]||0; total+=m; if(m===s.totalAyahs) done++; });
        const p = ((total/TOTAL_QURAN_AYAHS)*100).toFixed(2);
        return { total, done, percentage:parseFloat(p), remaining:TOTAL_QURAN_AYAHS-total };
    }, [progress]);

    const getBadge = (p, l=lang, small=false) => {
        const pack = uiLocalePack(l);
        const curT = (k) => (pack[k] !== undefined ? pack[k] : (tDict.en[k] ?? k));
        const iconSize = small ? "text-lg sm:text-2xl" : "text-3xl sm:text-5xl";
        if (p===100) return { icon:<i className={`fas fa-crown ${iconSize} text-yellow-500 anim-glow`}></i>, text:curT('badge100'), color:"bg-yellow-100 text-yellow-800 sticker-card" };
        if (p>=95) return { icon:<i className={`fas fa-flag-checkered ${iconSize} text-rose-500 anim-tada`}></i>, text:curT('badge95'), color:"bg-rose-100 text-rose-800 sticker-card" };
        if (p>=90) return { icon:<i className={`fas fa-gem ${iconSize} text-teal-500 anim-glow`}></i>, text:curT('badge90'), color:"bg-teal-100 text-teal-800 sticker-card" };
        if (p>=80) return { icon:<i className={`fas fa-user-graduate ${iconSize} text-fuchsia-600 anim-float`}></i>, text:curT('badge80'), color:"bg-fuchsia-100 text-fuchsia-800 sticker-card" };
        if (p>=70) return { icon:<i className={`fas fa-award ${iconSize} text-purple-500 anim-wobble`}></i>, text:curT('badge70'), color:"bg-purple-100 text-purple-800 sticker-card" };
        if (p>=60) return { icon:<i className={`fas fa-shield-alt ${iconSize} text-indigo-500 anim-float`}></i>, text:curT('badge60'), color:"bg-indigo-100 text-indigo-800 sticker-card" };
        if (p>=50) return { icon:<i className={`fas fa-trophy ${iconSize} text-blue-500 anim-tada`}></i>, text:curT('badge50'), color:"bg-blue-100 text-blue-800 sticker-card" };
        if (p>=40) return { icon:<i className={`fas fa-fire ${iconSize} text-red-500 anim-glow`}></i>, text:curT('badge40'), color:"bg-red-100 text-red-800 sticker-card" };
        if (p>=30) return { icon:<i className={`fas fa-medal ${iconSize} text-emerald-600 anim-wobble`}></i>, text:curT('badge30'), color:"bg-emerald-100 text-emerald-800 sticker-card" };
        if (p>=20) return { icon:<i className={`fas fa-star ${iconSize} text-yellow-400 anim-spin`}></i>, text:curT('badge20'), color:"bg-yellow-50 text-yellow-700 sticker-card" };
        if (p>=15) return { icon:<i className={`fas fa-lightbulb ${iconSize} text-amber-500 anim-glow`}></i>, text:curT('badge15'), color:"bg-amber-100 text-amber-800 sticker-card" };
        if (p>=10) return { icon:<i className={`fas fa-leaf ${iconSize} text-lime-500 anim-wobble`}></i>, text:curT('badge10'), color:"bg-lime-100 text-lime-800 sticker-card" };
        if (p>=5) return { icon:<i className={`fas fa-seedling ${iconSize} text-green-500 anim-float`}></i>, text:curT('badge5'), color:"bg-green-100 text-green-800 sticker-card" };
        if (p>0) return { icon:<i className={`fas fa-sun ${iconSize} text-orange-500 anim-spin`}></i>, text:curT('badge1'), color:"bg-orange-100 text-orange-800 sticker-card" };
        return { icon:<i className={`fas fa-rocket ${iconSize} text-slate-500 anim-bounce-soft`}></i>, text:curT('badgeStart'), color:"bg-slate-100 text-slate-700 sticker-card" };
    };

    const currentBadge = getBadge(stats.percentage);
    const currentPlan = MEMORIZATION_PLANS.find(p => p.id===(currentStudent.planId||'none'));

    const issueCertificate = () => setShowCertWizard({ mode:'quran', certKey:'certificates', pct:stats.percentage, juzNum:null });
    const issueJuzCertificate = (juzNum, certKey, pct) => setShowCertWizard({ mode:'juz', certKey, pct, juzNum });

    const updateSurah = (sId, val) => {
        const num = Math.min(Math.max(0,val), SURAHS_DATA.find(s=>s.id===sId).totalAyahs);
        saveToCloud(students.map(s => {
            if (s.id === currentId) {
                let updatedStudent = { ...s, progress: { ...s.progress, [sId]: num } };
                const numId = parseInt(sId);
                if (JUZ30_IDS.includes(numId)) {
                    updatedStudent.juz30Data = { ...updatedStudent.juz30Data, [sId]: { ...(updatedStudent.juz30Data?.[sId] || {}), memorized: num } };
                } else if (JUZ29_IDS.includes(numId)) {
                    updatedStudent.juz29Data = { ...updatedStudent.juz29Data, [sId]: { ...(updatedStudent.juz29Data?.[sId] || {}), memorized: num } };
                }
                return updatedStudent;
            }
            return s;
        }), currentId);
    };

    const toggleCompleteSurah = (surah) => { updateSurah(surah.id, progress[surah.id]===surah.totalAyahs ? 0 : surah.totalAyahs); };

    const setRevisionRating = (surahId, revNum, rating) => {
        saveToCloud(students.map(s => {
            if (s.id===currentId) {
                const sr = {...(s.revisions?.[surahId]||{})};
                if (rating===null) delete sr[revNum]; else sr[revNum] = { rating, date:Date.now() };
                return {...s, revisions:{...(s.revisions||{}),[surahId]:sr}};
            }
            return s;
        }), currentId);
        setRevisionSelector(null);
    };

    const clearRevisions = (surahId) => {
        saveToCloud(students.map(s => {
            if (s.id===currentId) { const newR={...(s.revisions||{})}; delete newR[surahId]; return {...s, revisions:newR}; }
            return s;
        }), currentId);
    };

    const scrollToSurah = (sId) => {
        if (isReadOnly) return;
        setSearchQuery(""); setCurrentJuz('all');
        setTimeout(() => {
            const el = document.getElementById(`surah-card-${sId}`);
            if (el) { const y=el.getBoundingClientRect().top+window.pageYOffset-220; window.scrollTo({top:y,behavior:'smooth'}); setHighlightedSurah(sId); setTimeout(()=>setHighlightedSurah(null),2500); }
        }, 150);
    };

    const getRevisionDetails = (revs) => {
        if (!revs) return { hasRevisions:false, hasWeak:false, latestDate:0 };
        const vals = Object.values(revs);
        if (vals.length===0) return { hasRevisions:false, hasWeak:false, latestDate:0 };
        let hasWeak=false, latestDate=0;
        vals.forEach(v => { const rating=typeof v==='object'&&v!==null?v.rating:v; const date=typeof v==='object'&&v!==null?v.date:0; if(rating==='weak')hasWeak=true; if(date>latestDate)latestDate=date; });
        return { hasRevisions:true, hasWeak, latestDate };
    };

    const inProgressSurahs = useMemo(() => SURAHS_DATA.filter(s=>progress[s.id]>0&&progress[s.id]<s.totalAyahs), [progress]);
    const completedSurahsList = useMemo(() => SURAHS_DATA.filter(s=>progress[s.id]===s.totalAyahs), [progress]);

    const FOURTEEN_DAYS = 14*24*60*60*1000;
    const { weakRevisions, recentRevisions, oldRevisions } = useMemo(() => {
        const weak=[],recent=[],old=[];
        const now=Date.now();
        SURAHS_DATA.forEach(s => {
            const rd = getRevisionDetails(revisions[s.id]);
            if (!rd.hasRevisions) return;
            if (rd.hasWeak) weak.push(s);
            else if (now-rd.latestDate>FOURTEEN_DAYS) old.push(s);
            else recent.push(s);
        });
        return { weakRevisions:weak, recentRevisions:recent, oldRevisions:old };
    }, [revisions]);

    const displayedSurahs = (() => {
        const base = currentJuz==='all' ? SURAHS_DATA : SURAHS_DATA.filter(s=>JUZ_SURAHS_MAP[currentJuz-1].includes(s.id));
        if (!searchQuery.trim()) return base;
        const qLow = searchQuery.trim().toLowerCase();
        return base.filter(s =>
            s.name.includes(searchQuery) ||
            String(getSurahPrimary(s, lang)).toLowerCase().includes(qLow) ||
            String(getSurahSecondary(s, lang)).toLowerCase().includes(qLow)
        );
    })();

    // ── Admin panel ──────────────────────────────────────────────────────────
    if (isAdminMode) {
        return (
            <div className="min-h-screen bg-slate-50 p-4 sm:p-8" dir={isRtl?'rtl':'ltr'}>
                <div className="max-w-3xl mx-auto bg-white p-6 sm:p-10 rounded-3xl shadow-xl border-t-4 border-green-700 mt-10">
                    <div className="flex flex-col sm:flex-row items-center gap-4 mb-10 border-b pb-6">
                        <div className="bg-green-100 p-4 rounded-full text-green-700"><i className="fas fa-user-shield text-4xl"></i></div>
                        <div className="text-center sm:text-start">
                            <h2 className="text-3xl font-bold text-green-900">{t('adminTitle')}</h2>
                            <p className="text-gray-500 text-sm mt-2">{t('adminDesc')}</p>
                        </div>
                    </div>
                    <div className="bg-green-50 p-6 rounded-2xl mb-8 border border-green-100">
                        <h3 className="font-bold text-green-800 mb-4">{t('addTeacher')}</h3>
                        <div className="flex flex-col sm:flex-row gap-3">
                            <input value={newCodeInput} onChange={e=>setNewCodeInput(e.target.value)} placeholder={t('newCodePlaceholder')} className="flex-1 border-2 border-green-200 p-4 rounded-xl focus:border-green-600 focus:outline-none font-bold text-center sm:text-start shadow-sm" dir="ltr" />
                            <button onClick={handleAddCode} className="bg-green-700 hover:bg-green-800 text-white px-8 py-4 rounded-xl font-bold shadow-md transition-colors flex items-center justify-center gap-2">
                                <i className="fas fa-plus"></i> {t('saveCode')}
                            </button>
                        </div>
                    </div>
                    <h3 className="font-bold text-gray-700 mb-4 text-lg">{t('allowedCodes')} ({allowedCodes.length}):</h3>
                    {allowedCodes.length===0 ? (
                        <div className="text-center py-12 bg-gray-50 rounded-2xl border-2 border-dashed border-gray-300">
                            <i className="fas fa-users-slash text-gray-300 text-5xl mb-4"></i>
                            <p className="text-gray-500 font-medium">{t('noCodes')}</p>
                        </div>
                    ) : (
                        <ul className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            {[...allowedCodes].sort((a,b)=>a.localeCompare(b)).map(c => (
