                        <div className="p-5 border-t border-slate-100 bg-slate-50 shrink-0">
                            <button disabled={!reasonId || (reasonId==='custom' && !customReason)} 
                                onClick={()=>onSave({certLang, reason:finalReason, sticker, teacherSig})}
                                className="w-full py-4 rounded-2xl text-white font-bold text-lg shadow-lg transition-all hover:opacity-90 flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed"
                                style={{background:'linear-gradient(135deg,#1a4731,#2d6a4f)'}}>
                                <i className="fas fa-save text-yellow-400"></i>
                                {cT('certIssueBtn')}
                            </button>
                        </div>
                    </div>
                    <div className="flex-1 bg-slate-200/60 flex items-center justify-center relative shadow-inner overflow-hidden">
                        <div className="absolute top-4 left-4 right-4 flex justify-center pointer-events-none z-10">
                            <span className="bg-slate-800/60 text-white text-[10px] uppercase tracking-wider px-3 py-1 rounded-full backdrop-blur-sm font-bold shadow-sm">
                                {isAr ? 'معاينة حية' : 'Live Preview'}
                            </span>
                        </div>
                        <div className="w-0 h-0 flex items-center justify-center">
                            <div className="w-[740px] h-[560px] flex items-center justify-center origin-center transition-transform duration-300 scale-[0.45] sm:scale-[0.6] md:scale-[0.75] lg:scale-[0.75] xl:scale-[0.9]">
                                <div className="shadow-2xl ring-1 ring-black/10 rounded-sm overflow-hidden">
                                    <CertDisplay cert={certPreview} studentName={studentName} />
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    );
}

// ── Juz Section (29 or 30) ───────────────────────────────────────────────────
function JuzSection({ juzNum, surahs, student, onUpdate, isReadOnly, isAr, t, onIssueCert, onViewCert, getBadge, lang, onReset, onPlayAudio, onClearHW }) {
    const juzKey = `juz${juzNum}Data`;
    const planKey = `juz${juzNum}PlanId`;
    const certKey = `juz${juzNum}Certificates`;
    const juzData = student[juzKey] || {};
    const juzPlanId = student[planKey] || 'none';
    const juzCerts = student[certKey] || [];
    const isJuz30 = juzNum === 30;
    const totalJuzAyahs = isJuz30 ? JUZ30_TOTAL_AYAHS : JUZ29_TOTAL_AYAHS;

    const stats = useMemo(() => {
        let done=0, inProg=0, total=0, memorized=0;
        surahs.forEach(s => { const d=juzData[s.id]||{}; const m=d.memorized||0; memorized+=m; total+=s.totalAyahs; if(m===s.totalAyahs)done++; else if(m>0)inProg++; });
        return { done, inProg, notStarted:surahs.length-done-inProg, total, memorized, pct:Math.round((memorized/total)*100) };
    }, [juzData, surahs]);

    const isFullyComplete = stats.done === surahs.length;

    const plan = JUZ_WEEKLY_PLANS.find(p => p.id === juzPlanId) || JUZ_WEEKLY_PLANS[0];
    const remaining = totalJuzAyahs - stats.memorized;
    const eta = plan.ayahsPerWeek > 0 ? formatJuzETA(remaining, plan.ayahsPerWeek, isAr) : null;

    const handleUpdate = (surahId, updates) => {
        const existing = juzData[surahId] || { memorized:0, revisions:{}, stickers:[] };
        onUpdate(juzKey, { ...juzData, [surahId]: { ...existing, ...updates } });
    };

    const handleSetPlan = (planId) => {
        onUpdate(planKey, planId);
    };

    const scrollToSurahCard = (surahId) => {
        const el = document.getElementById(`juz${juzNum}-surah-${surahId}`);
        if (el) { const y = el.getBoundingClientRect().top + window.pageYOffset - 220; window.scrollTo({ top:y, behavior:'smooth' }); }
    };

    const certAccentBorder = isJuz30 ? 'border-green-200' : 'border-amber-200';
    const certAccentBg = isJuz30 ? 'bg-green-600' : 'bg-amber-500';
    const certIconColor = isJuz30 ? 'text-green-600' : 'text-amber-600';
    const certBadgeColor = isJuz30 ? 'bg-green-100 text-green-800' : 'bg-amber-100 text-amber-800';

    return (
        <div className="space-y-5">
            {isFullyComplete && (
                <div className={`rounded-2xl p-4 text-center font-bold text-lg border-2 ${isJuz30 ? 'bg-green-50 border-green-300 text-green-800' : 'bg-amber-50 border-amber-300 text-amber-800'}`}>
                    <span className="anim-tada inline-block">{t(isJuz30 ? 'juz30Complete' : 'juz29Complete')}</span>
                </div>
            )}

            {!isReadOnly && student.listeningTasks && student.listeningTasks.length > 0 && (
                <div className="space-y-3">
                    {student.listeningTasks.map(task => (
                        <TeacherHWAlert key={task.id} task={task} onClear={() => onClearHW(task.id)} isAr={isAr} t={t} />
                    ))}
                </div>
            )}

            <JuzVisualReport juzNum={juzNum} surahs={surahs} juzData={juzData} juzPlanId={juzPlanId} isAr={isAr} t={t} totalJuzAyahs={totalJuzAyahs} onScrollToSurah={scrollToSurahCard} />

            <div className={`bg-white rounded-3xl shadow-sm border ${certAccentBorder} p-5`}>
                <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
                    <h3 className="font-bold text-base flex items-center gap-2 text-slate-800">
                        <i className={`fas fa-award text-2xl ${certIconColor}`}></i>
                        {t('juzCertHonorBoard')}
                        {juzCerts.length > 0 && <span className={`text-[11px] px-2 py-0.5 rounded-full font-bold ${certBadgeColor}`}>{juzCerts.length}</span>}
                    </h3>
                </div>
                {juzCerts.length === 0 ? (
                    <div className={`text-center py-6 rounded-2xl border-2 border-dashed ${isJuz30 ? 'border-green-200 text-green-400' : 'border-amber-100 text-amber-400'}`}>
                        <i className="fas fa-certificate text-3xl mb-2 opacity-30"></i>
                        <p className="text-xs font-medium opacity-60">{isAr ? 'لا توجد شهادات بعد. ابدأ بالحفظ واحصل على أولى شهاداتك!' : 'No certificates yet. Start memorizing to earn your first certificate!'}</p>
                    </div>
                ) : (
                    <div className="flex flex-wrap gap-3">
                        {juzCerts.map((cert) => {
                            const badge = getBadge(cert.percentage, cert.certLang || lang);
                            return (
                                <button key={cert.id} onClick={() => onViewCert(cert, juzNum)}
                                    className={`flex items-center gap-3 bg-gradient-to-l from-yellow-50/50 to-white min-w-[200px] border border-yellow-100 p-3 rounded-2xl hover:shadow-md hover:border-yellow-300 transition-all text-start relative group`}>
                                    <div className={`${certAccentBg} text-white w-10 h-10 rounded-full flex items-center justify-center shadow-md group-hover:scale-110 transition-transform shrink-0`}>
                                        <i className="fas fa-certificate text-sm"></i>
                                    </div>
                                    <div>
                                        <p className="font-bold text-xs text-slate-800">{t('certAchievement')} {cert.percentage}%</p>
                                        <p className="text-[10px] text-slate-500 mt-0.5">{new Date(cert.timestamp).toLocaleDateString(isAr?'ar-EG':'en-US')}</p>
                                    </div>
                                    {cert.certLang==='en' && <span className="absolute top-2 right-2 text-[9px] bg-blue-100 text-blue-800 font-bold px-1.5 py-0.5 rounded">EN</span>}
                                    {cert.certLang==='ar' && <span className="absolute top-2 right-2 text-[9px] bg-green-100 text-green-800 font-bold px-1.5 py-0.5 rounded">AR</span>}
                                </button>
                            );
                        })}
                    </div>
                )}
            </div>

            {!isReadOnly && (
                <div className="flex justify-end items-center">
                    <button onClick={onReset} className="flex items-center gap-2 text-red-600 bg-red-50 hover:bg-red-100 px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                        <i className="fas fa-sync-alt"></i> {isAr ? 'تصفير بيانات هذا الجزء' : 'Reset this Juz'}
                    </button>
                </div>
            )}

            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                {surahs.map(surah => (
                    <JuzSurahCard key={surah.id} surah={surah} juzData={juzData}
                        onUpdate={handleUpdate} isReadOnly={isReadOnly} isAr={isAr} t={t} juzNum={juzNum} onPlayAudio={onPlayAudio} />
                ))}
            </div>
        </div>
    );
}

// ── Main App ─────────────────────────────────────────────────────────────────
function App() {
    const [lang, setLang] = useState(() => { try { return localStorage.getItem('quran-lang') || 'ar'; } catch(e) { return 'ar'; } });
    const isAr = lang === 'ar';
    const t = (key) => tDict[lang][key] || key;
    const toggleLang = () => { const n = isAr ? 'en' : 'ar'; setLang(n); localStorage.setItem('quran-lang', n); };

    const [syncKey, setSyncKey] = useState(() => {
        if (localStorage.getItem('quran-parent-code')) {
            return localStorage.getItem('quran-student-sync-key') || "";
        }
        try { return localStorage.getItem('quran-sync-key') || ""; } catch(e) { return ""; }
    });
    const [isReadOnly, setIsReadOnly] = useState(() => !!localStorage.getItem('quran-parent-code'));
    const [showSyncModal, setShowSyncModal] = useState(() => {
        if (localStorage.getItem('quran-parent-code')) return false;
        try { return !localStorage.getItem('quran-sync-key'); } catch(e) { return true; }
    });

    const [tempSyncKey, setTempSyncKey] = useState("");
    const [isSaving, setIsSaving] = useState(false);
    const [isAdminMode, setIsAdminMode] = useState(false);
    const [activeTab, setActiveTab] = useState('main');

    const defaultStudent = { id:'1', name:'طالب 1', progress:{}, revisions:{}, certificates:[], planId:'none', juz30Data:{}, juz29Data:{}, juz30PlanId:'none', juz29PlanId:'none', listeningTasks:[] };
    const [students, setStudents] = useState([defaultStudent]);
    const [currentId, setCurrentId] = useState('1');
    const [allowedCodes, setAllowedCodes] = useState([]);
    const [newCodeInput, setNewCodeInput] = useState("");
    const [searchQuery, setSearchQuery] = useState("");
    const [revisionSelector, setRevisionSelector] = useState(null);
    const [currentJuz, setCurrentJuz] = useState(1);
    const [dialog, setDialog] = useState({ isOpen:false, type:'confirm', message:'', defaultValue:'', onConfirm:()=>{} });
    const [highlightedSurah, setHighlightedSurah] = useState(null);
    const [selectedCert, setSelectedCert] = useState(null);
    const [selectedJuzCert, setSelectedJuzCert] = useState(null);
    const [showCertWizard, setShowCertWizard] = useState(null);
    const [isDataLoaded, setIsDataLoaded] = useState(false);
    const [audioPlayerSurah, setAudioPlayerSurah] = useState(null);
    const [showAssignHWModal, setShowAssignHWModal] = useState(false);

    useEffect(() => {
        if (!db || !syncKey || isAdminMode) return;
        setIsDataLoaded(false);
        const docRef = doc(db, 'quran_centers', syncKey);
        const unsub = onSnapshot(docRef, (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                if (data.students && data.students.length > 0) {
                    const migrated = data.students.map(s => {
                        let tasks = s.listeningTasks || [];
                        if (s.listeningTask) { tasks = [...tasks, s.listeningTask]; } // Migrate old single task format
                        return {
                            juz30Data:{}, juz29Data:{}, juz30PlanId:'none', juz29PlanId:'none', juz30Certificates:[], juz29Certificates:[], listeningTasks:tasks, ...s
                        };
                    });
                    setStudents(migrated);
                    if (isReadOnly) {
                        const parentCode = localStorage.getItem('quran-parent-code');
                        if (parentCode && parentCode.includes('-')) {
                            const [firstName, pin] = parentCode.split('-');
                            const target = migrated.find(s => s.name.trim().split(/\s+/)[0].toLowerCase() === firstName && s.pin === pin);
                            if (target) setCurrentId(target.id);
                        }
                    } else if (data.currentId && migrated.find(s => s.id === data.currentId)) {
                        setCurrentId(data.currentId);
                    }
                }
            } else if (!isReadOnly) {
                setDoc(docRef, { students, currentId });
            }
            setIsDataLoaded(true);
        });
        return () => unsub();
    }, [syncKey, isAdminMode, isReadOnly]);

    useEffect(() => {
        if (!db || isReadOnly) return;
        const adminRef = doc(db, 'quran_centers', '_admin_settings_');
        const unsub = onSnapshot(adminRef, (docSnap) => {
            if (docSnap.exists()) {
                const codes = docSnap.data().codes || [];
                setAllowedCodes(codes);
                if (syncKey && syncKey !== MASTER_ADMIN_PASSWORD && !codes.includes(syncKey)) {
                    setSyncKey(""); setShowSyncModal(true);
                    try { localStorage.removeItem('quran-sync-key'); } catch(e){}
                    setDialog({ isOpen:true, type:'alert', message:t('codeRevoked'), onConfirm:()=>setDialog({isOpen:false}) });
                }
            }
        });
        return () => unsub();
    }, [db, syncKey, isReadOnly, lang]);

    const saveToCloud = async (newStudents, newId) => {
        if (isReadOnly) return;
        setStudents(newStudents); setCurrentId(newId);
        if (db && syncKey) {
            setIsSaving(true);
            try { await setDoc(doc(db,'quran_centers',syncKey), { students:newStudents, currentId:newId }, { merge:true }); }
            catch(e) { console.error(e); } finally { setTimeout(()=>setIsSaving(false), 500); }
        }
    };

    const handleSetSyncKey = async (e) => {
        e.preventDefault();
        const key = tempSyncKey.trim().toLowerCase();
        if (!key) return;
        setIsSaving(true);
        if (key === MASTER_ADMIN_PASSWORD) {
            setIsAdminMode(true); setTempSyncKey(""); setShowSyncModal(false); setIsSaving(false); return;
        }

        try {
            const adminSnap = await getDoc(doc(db,'quran_centers','_admin_settings_'));
            const codes = adminSnap.exists() ? adminSnap.data().codes || [] : [];

            if (key.includes('-')) {
                const [firstName, pin] = key.split('-');
                let foundTeacherCode = null;

                for (const code of codes) {
                    const snap = await getDoc(doc(db,'quran_centers', code));
                    if (snap.exists()) {
                        const studentsList = snap.data().students || [];
                        const foundStudent = studentsList.find(s => 
                            s.name.trim().split(/\s+/)[0].toLowerCase() === firstName && 
                            s.pin === pin
                        );
                        if (foundStudent) {
                            foundTeacherCode = code;
                            break;
                        }
                    }
                }

                if (foundTeacherCode) {
                    setIsDataLoaded(false); 
                    setIsReadOnly(true); 
                    setSyncKey(foundTeacherCode);
                    localStorage.setItem('quran-student-sync-key', foundTeacherCode);
                    localStorage.setItem('quran-parent-code', key); 
                    setShowSyncModal(false);
                } else { 
                    setDialog({ isOpen:true, type:'alert', message:t('parentCodeInvalid'), onConfirm:()=>setDialog({isOpen:false}) }); 
                }
                setIsSaving(false); 
                return;
            }

            if (codes.includes(key)) {
                setIsDataLoaded(false); setSyncKey(key);
                localStorage.setItem('quran-sync-key', key); setShowSyncModal(false);
            } else { 
                setDialog({ isOpen:true, type:'alert', message:t('codeNotRegistered'), onConfirm:()=>setDialog({isOpen:false}) }); 
            }
        } catch(err) { 
            setDialog({ isOpen:true, type:'alert', message:t('connError'), onConfirm:()=>setDialog({isOpen:false}) }); 
        }
        setIsSaving(false);
    };

    const handleAddCode = async () => {
        const code = newCodeInput.trim().toLowerCase();
        if (!code) return;
        if (allowedCodes.includes(code)) { setDialog({ isOpen:true, type:'alert', message:t('codeInvalid'), onConfirm:()=>setDialog({isOpen:false}) }); return; }
        await setDoc(doc(db,'quran_centers','_admin_settings_'), { codes:[...allowedCodes, code] }, { merge:true });
        setNewCodeInput("");
    };

    const handleRemoveCode = (code) => {
        setDialog({ isOpen:true, type:'confirm', message:`${t('confirmDeleteAdmin')} "${code}"؟`, onConfirm: async () => {
            await setDoc(doc(db,'quran_centers','_admin_settings_'), { codes:allowedCodes.filter(c=>c!==code) }, { merge:true });
            setDialog({ isOpen:false });
        }});
    };

    const handleLogout = () => {
        setIsDataLoaded(false); setSyncKey(""); setIsAdminMode(false); setIsReadOnly(false); setShowSyncModal(true);
        localStorage.removeItem('quran-sync-key'); 
        localStorage.removeItem('quran-parent-code');
        localStorage.removeItem('quran-student-sync-key');
        setStudents([defaultStudent]); setCurrentId('1');
    };

    const currentStudent = students.find(s => s.id === currentId) || students[0];
    const progress = currentStudent?.progress || {};
    const revisions = currentStudent?.revisions || {};

    useEffect(() => {
        if (isDataLoaded && !isReadOnly && !isAdminMode && syncKey && currentStudent && !currentStudent.pin && students.length > 0) {
            const newPin = Math.floor(1000 + Math.random() * 9000).toString();
            saveToCloud(students.map(s => s.id===currentStudent.id ? { ...s, pin:newPin, planId:s.planId||'none', juz30Data:s.juz30Data||{}, juz29Data:s.juz29Data||{}, juz30PlanId:s.juz30PlanId||'none', juz29PlanId:s.juz29PlanId||'none', listeningTasks:s.listeningTasks||[] } : s), currentId);
        }
    }, [currentStudent, isReadOnly, isAdminMode, syncKey, students, isDataLoaded]);

    const addStudent = () => {
        setDialog({ isOpen:true, type:'prompt', message:t('studentNamePrompt'), onConfirm:(name) => {
            if (name?.trim()) {
                const nId = Date.now().toString();
                const pin = Math.floor(1000 + Math.random() * 9000).toString();
                saveToCloud([...students, { id:nId, name:name.trim(), progress:{}, revisions:{}, pin, certificates:[], planId:'none', juz30Data:{}, juz29Data:{}, juz30PlanId:'none', juz29PlanId:'none', listeningTasks:[] }], nId);
            }
            setDialog({ isOpen:false });
        }});
    };

    const renameStudent = () => {
        setDialog({ isOpen:true, type:'prompt', message:t('editStudentPrompt'), defaultValue:currentStudent.name, onConfirm:(newName) => {
            if (newName?.trim()) saveToCloud(students.map(s => s.id===currentId ? {...s, name:newName.trim()} : s), currentId);
            setDialog({ isOpen:false });
        }});
    };

    const deleteStudent = () => {
        if (students.length===1) { setDialog({ isOpen:true, type:'alert', message:t('cantDeleteOnlyStudent'), onConfirm:()=>setDialog({isOpen:false}) }); return; }
        setDialog({ isOpen:true, type:'confirm', message:`${t('confirmDeleteStudent')} "${currentStudent.name}"؟`, onConfirm:() => {
            const filtered = students.filter(s => s.id!==currentId);
            saveToCloud(filtered, filtered[0].id); setDialog({ isOpen:false });
        }});
    };

    const resetSectionData = (section) => {
        let msg = `${t('confirmReset')} ${currentStudent.name}؟`;
        if (section === 'juz30') msg = isAr ? `هل أنت متأكد من تصفير بيانات الجزء 30؟` : `Are you sure you want to reset Juz 30 data?`;
        if (section === 'juz29') msg = isAr ? `هل أنت متأكد من تصفير بيانات الجزء 29؟` : `Are you sure you want to reset Juz 29 data?`;

        setDialog({ isOpen:true, type:'confirm', message: msg, onConfirm:() => {
            saveToCloud(students.map(s => {
                if (s.id !== currentId) return s;
                let updated = { ...s };
                if (section === 'main') {
                    updated.progress = {};
                    updated.revisions = {};
                    updated.juz30Data = {};
                    updated.juz29Data = {};
                } else if (section === 'juz30') {
                    updated.juz30Data = {};
                    let newProgress = { ...(updated.progress || {}) };
                    JUZ30_IDS.forEach(id => delete newProgress[id]);
                    updated.progress = newProgress;
                } else if (section === 'juz29') {
                    updated.juz29Data = {};
                    let newProgress = { ...(updated.progress || {}) };
                    JUZ29_IDS.forEach(id => delete newProgress[id]);
                    updated.progress = newProgress;
                }
                return updated;
            }), currentId);
            setDialog({ isOpen:false });
        }});
    };

    const openPlanDialog = () => {
        setDialog({ isOpen:true, type:'planSelect', message:t('selectPlanMsg'), onConfirm:(selectedPlanId) => {
            saveToCloud(students.map(s => s.id===currentId ? {...s, planId:selectedPlanId} : s), currentId);
            setDialog({ isOpen:false });
        }});
    };

    const handleJuzUpdate = (keyOrJuzKey, value) => {
        saveToCloud(students.map(s => {
            if (s.id === currentId) {
                let updatedStudent = { ...s, [keyOrJuzKey]: value };
                if (keyOrJuzKey === 'juz30Data' || keyOrJuzKey === 'juz29Data') {
                    let newProgress = { ...(s.progress || {}) };
                    Object.keys(value).forEach(surahId => {
                        if (value[surahId]?.memorized !== undefined) {
                            newProgress[surahId] = value[surahId].memorized;
                        }
                    });
                    updatedStudent.progress = newProgress;
                }
                return updatedStudent;
            }
            return s;
        }), currentId);
    };

    const fallbackCopy = (text) => {
        const ta = document.createElement("textarea"); ta.value=text; ta.style.position="fixed"; ta.style.top="0"; ta.style.left="0";
        document.body.appendChild(ta); ta.focus(); ta.select(); try { document.execCommand('copy'); } catch(err) {} document.body.removeChild(ta);
    };

    const handleShare = () => {
        const pin = currentStudent.pin || "0000";
        const firstName = currentStudent.name.trim().split(/\s+/)[0].toLowerCase();
        const studentCode = `${firstName}-${pin}`;
        
        if (!navigator.clipboard) { fallbackCopy(studentCode); setDialog({ isOpen:true, type:'alert', message:t('linkCopied'), onConfirm:()=>setDialog({isOpen:false}) }); return; }
        navigator.clipboard.writeText(studentCode).then(() => setDialog({ isOpen:true, type:'alert', message:t('linkCopied'), onConfirm:()=>setDialog({isOpen:false}) }),
            () => { fallbackCopy(studentCode); setDialog({ isOpen:true, type:'alert', message:t('linkCopied'), onConfirm:()=>setDialog({isOpen:false}) }); });
    };

    // HW Functions
    const handleAssignHW = (task) => {
        saveToCloud(students.map(s => s.id === currentId ? { ...s, listeningTasks: [...(s.listeningTasks || []), task] } : s), currentId);
        setShowAssignHWModal(false);
    };
    const handleClearHW = (taskId) => {
        saveToCloud(students.map(s => s.id === currentId ? { ...s, listeningTasks: (s.listeningTasks || []).filter(t => t.id !== taskId) } : s), currentId);
    };
    const handleHWComplete = (taskId) => {
        const student = students.find(s => s.id === currentId);
        if(student && student.listeningTasks) {
             const updatedTasks = student.listeningTasks.map(t => t.id === taskId ? { ...t, completed: true } : t);
             const fakeCloudCall = () => {
                 setStudents(students.map(s => s.id === currentId ? { ...s, listeningTasks: updatedTasks } : s));
                 if(db && syncKey && !isReadOnly) {
                     setDoc(doc(db,'quran_centers',syncKey), { students: students.map(s => s.id === currentId ? { ...s, listeningTasks: updatedTasks } : s), currentId }, { merge:true });
                 }
             };
             // Use API call manually to let student signal completion
             if(isReadOnly && db && syncKey) {
                 setDoc(doc(db,'quran_centers',syncKey), { students: students.map(s => s.id === currentId ? { ...s, listeningTasks: updatedTasks } : s), currentId }, { merge:true });
                 setStudents(students.map(s => s.id === currentId ? { ...s, listeningTasks: updatedTasks } : s));
             } else {
                 fakeCloudCall();
             }
        }
    };
    const startAudioHW = (task) => {
        const hwSurah = SURAHS_DATA.find(s => s.id === task.surahId);
        if (hwSurah) {
            setAudioPlayerSurah({ surah: hwSurah, hwTask: task });
        }
    };

    const stats = useMemo(() => {
        let total=0; let done=0;
        SURAHS_DATA.forEach(s => { const m=progress[s.id]||0; total+=m; if(m===s.totalAyahs) done++; });
        const p = ((total/TOTAL_QURAN_AYAHS)*100).toFixed(2);
        return { total, done, percentage:parseFloat(p), remaining:TOTAL_QURAN_AYAHS-total };
    }, [progress]);

    const getBadge = (p, l=lang, small=false) => {
        const curT = (k) => tDict[l][k]||k;
        const iconSize = small ? "text-lg sm:text-2xl" : "text-3xl sm:text-5xl";
        if (p===100) return { icon:<i className={`fas fa-crown ${iconSize} text-yellow-500 anim-glow`}></i>, text:curT('badge100'), color:"bg-yellow-100 text-yellow-800 sticker-card" };
        if (p>=95) return { icon:<i className={`fas fa-flag-checkered ${iconSize} text-rose-500 anim-tada`}></i>, text:curT('badge95'), color:"bg-rose-100 text-rose-800 sticker-card" };
        if (p>=90) return { icon:<i className={`fas fa-gem ${iconSize} text-teal-500 anim-glow`}></i>, text:curT('badge90'), color:"bg-teal-100 text-teal-800 sticker-card" };
        if (p>=80) return { icon:<i className={`fas fa-user-graduate ${iconSize} text-fuchsia-600 anim-float`}></i>, text:curT('badge80'), color:"bg-fuchsia-100 text-fuchsia-800 sticker-card" };
        if (p>=70) return { icon:<i className={`fas fa-award ${iconSize} text-purple-500 anim-wobble`}></i>, text:curT('badge70'), color:"bg-purple-100 text-purple-800 sticker-card" };
        if (p>=60) return { icon:<i className={`fas fa-shield-alt ${iconSize} text-indigo-500 anim-float`}></i>, text:curT('badge60'), color:"bg-indigo-100 text-indigo-800 sticker-card" };
        if (p>=50) return { icon:<i className={`fas fa-trophy ${iconSize} text-blue-500 anim-tada`}></i>, text:curT('badge50'), color:"bg-blue-100 text-blue-800 sticker-card" };
        if (p>=40) return { icon:<i className={`fas fa-fire ${iconSize} text-red-500 anim-glow`}></i>, text:curT('badge40'), color:"bg-red-100 text-red-800 sticker-card" };
        if (p>=30) return { icon:<i className={`fas fa-medal ${iconSize} text-emerald-600 anim-wobble`}></i>, text:curT('badge30'), color:"bg-emerald-100 text-emerald-800 sticker-card" };
        if (p>=20) return { icon:<i className={`fas fa-star ${iconSize} text-yellow-400 anim-spin`}></i>, text:curT('badge20'), color:"bg-yellow-50 text-yellow-700 sticker-card" };
        if (p>=15) return { icon:<i className={`fas fa-lightbulb ${iconSize} text-amber-500 anim-glow`}></i>, text:curT('badge15'), color:"bg-amber-100 text-amber-800 sticker-card" };
        if (p>=10) return { icon:<i className={`fas fa-leaf ${iconSize} text-lime-500 anim-wobble`}></i>, text:curT('badge10'), color:"bg-lime-100 text-lime-800 sticker-card" };
        if (p>=5) return { icon:<i className={`fas fa-seedling ${iconSize} text-green-500 anim-float`}></i>, text:curT('badge5'), color:"bg-green-100 text-green-800 sticker-card" };
        if (p>0) return { icon:<i className={`fas fa-sun ${iconSize} text-orange-500 anim-spin`}></i>, text:curT('badge1'), color:"bg-orange-100 text-orange-800 sticker-card" };
        return { icon:<i className={`fas fa-rocket ${iconSize} text-slate-500 anim-bounce-soft`}></i>, text:curT('badgeStart'), color:"bg-slate-100 text-slate-700 sticker-card" };
    };

    const currentBadge = getBadge(stats.percentage);
    const currentPlan = MEMORIZATION_PLANS.find(p => p.id===(currentStudent.planId||'none'));

    const issueCertificate = () => setShowCertWizard({ mode:'quran', certKey:'certificates', pct:stats.percentage, juzNum:null });
    const issueJuzCertificate = (juzNum, certKey, pct) => setShowCertWizard({ mode:'juz', certKey, pct, juzNum });

    const updateSurah = (sId, val) => {
        const num = Math.min(Math.max(0,val), SURAHS_DATA.find(s=>s.id===sId).totalAyahs);
        saveToCloud(students.map(s => {
            if (s.id === currentId) {
                let updatedStudent = { ...s, progress: { ...s.progress, [sId]: num } };
                const numId = parseInt(sId);
                if (JUZ30_IDS.includes(numId)) {
                    updatedStudent.juz30Data = { ...updatedStudent.juz30Data, [sId]: { ...(updatedStudent.juz30Data?.[sId] || {}), memorized: num } };
                } else if (JUZ29_IDS.includes(numId)) {
                    updatedStudent.juz29Data = { ...updatedStudent.juz29Data, [sId]: { ...(updatedStudent.juz29Data?.[sId] || {}), memorized: num } };
                }
                return updatedStudent;
            }
            return s;
        }), currentId);
    };

    const toggleCompleteSurah = (surah) => { updateSurah(surah.id, progress[surah.id]===surah.totalAyahs ? 0 : surah.totalAyahs); };

    const setRevisionRating = (surahId, revNum, rating) => {
        saveToCloud(students.map(s => {
            if (s.id===currentId) {
                const sr = {...(s.revisions?.[surahId]||{})};
                if (rating===null) delete sr[revNum]; else sr[revNum] = { rating, date:Date.now() };
                return {...s, revisions:{...(s.revisions||{}),[surahId]:sr}};
            }
            return s;
        }), currentId);
        setRevisionSelector(null);
    };

    const clearRevisions = (surahId) => {
        saveToCloud(students.map(s => {
            if (s.id===currentId) { const newR={...(s.revisions||{})}; delete newR[surahId]; return {...s, revisions:newR}; }
            return s;
        }), currentId);
    };

    const scrollToSurah = (sId) => {
        if (isReadOnly) return;
        setSearchQuery(""); setCurrentJuz('all');
        setTimeout(() => {
            const el = document.getElementById(`surah-card-${sId}`);
            if (el) { const y=el.getBoundingClientRect().top+window.pageYOffset-220; window.scrollTo({top:y,behavior:'smooth'}); setHighlightedSurah(sId); setTimeout(()=>setHighlightedSurah(null),2500); }
        }, 150);
    };

    const getRevisionDetails = (revs) => {
        if (!revs) return { hasRevisions:false, hasWeak:false, latestDate:0 };
        const vals = Object.values(revs);
        if (vals.length===0) return { hasRevisions:false, hasWeak:false, latestDate:0 };
        let hasWeak=false, latestDate=0;
        vals.forEach(v => { const rating=typeof v==='object'&&v!==null?v.rating:v; const date=typeof v==='object'&&v!==null?v.date:0; if(rating==='weak')hasWeak=true; if(date>latestDate)latestDate=date; });
        return { hasRevisions:true, hasWeak, latestDate };
    };

    const inProgressSurahs = useMemo(() => SURAHS_DATA.filter(s=>progress[s.id]>0&&progress[s.id]<s.totalAyahs), [progress]);
    const completedSurahsList = useMemo(() => SURAHS_DATA.filter(s=>progress[s.id]===s.totalAyahs), [progress]);

    const FOURTEEN_DAYS = 14*24*60*60*1000;
    const { weakRevisions, recentRevisions, oldRevisions } = useMemo(() => {
        const weak=[],recent=[],old=[];
        const now=Date.now();
        SURAHS_DATA.forEach(s => {
            const rd = getRevisionDetails(revisions[s.id]);
            if (!rd.hasRevisions) return;
            if (rd.hasWeak) weak.push(s);
            else if (now-rd.latestDate>FOURTEEN_DAYS) old.push(s);
            else recent.push(s);
        });
        return { weakRevisions:weak, recentRevisions:recent, oldRevisions:old };
    }, [revisions]);

    const displayedSurahs = searchQuery
        ? SURAHS_DATA.filter(s=>s.name.includes(searchQuery)||s.enName.toLowerCase().includes(searchQuery.toLowerCase()))
        : (currentJuz==='all' ? SURAHS_DATA : SURAHS_DATA.filter(s=>JUZ_SURAHS_MAP[currentJuz-1].includes(s.id)));

    // ── Admin panel ──────────────────────────────────────────────────────────
    if (isAdminMode) {
        return (
            <div className="min-h-screen bg-slate-50 p-4 sm:p-8" dir={isAr?'rtl':'ltr'}>
                <div className="max-w-3xl mx-auto bg-white p-6 sm:p-10 rounded-3xl shadow-xl border-t-4 border-green-700 mt-10">
                    <div className="flex flex-col sm:flex-row items-center gap-4 mb-10 border-b pb-6">
                        <div className="bg-green-100 p-4 rounded-full text-green-700"><i className="fas fa-user-shield text-4xl"></i></div>
                        <div className="text-center sm:text-start">
                            <h2 className="text-3xl font-bold text-green-900">{t('adminTitle')}</h2>
                            <p className="text-gray-500 text-sm mt-2">{t('adminDesc')}</p>
                        </div>
                    </div>
                    <div className="bg-green-50 p-6 rounded-2xl mb-8 border border-green-100">
                        <h3 className="font-bold text-green-800 mb-4">{t('addTeacher')}</h3>
                        <div className="flex flex-col sm:flex-row gap-3">
                            <input value={newCodeInput} onChange={e=>setNewCodeInput(e.target.value)} placeholder={t('newCodePlaceholder')} className="flex-1 border-2 border-green-200 p-4 rounded-xl focus:border-green-600 focus:outline-none font-bold text-center sm:text-start shadow-sm" dir="ltr" />
                            <button onClick={handleAddCode} className="bg-green-700 hover:bg-green-800 text-white px-8 py-4 rounded-xl font-bold shadow-md transition-colors flex items-center justify-center gap-2">
                                <i className="fas fa-plus"></i> {t('saveCode')}
                            </button>
                        </div>
                    </div>
                    <h3 className="font-bold text-gray-700 mb-4 text-lg">{t('allowedCodes')} ({allowedCodes.length}):</h3>
                    {allowedCodes.length===0 ? (
                        <div className="text-center py-12 bg-gray-50 rounded-2xl border-2 border-dashed border-gray-300">
                            <i className="fas fa-users-slash text-gray-300 text-5xl mb-4"></i>
                            <p className="text-gray-500 font-medium">{t('noCodes')}</p>
                        </div>
                    ) : (
                        <ul className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            {[...allowedCodes].sort((a,b)=>a.localeCompare(b)).map(c => (
                                <li key={c} className="flex justify-between items-center bg-white p-4 rounded-xl border border-gray-200 shadow-sm hover:shadow-md transition-shadow">
                                    <span className="font-bold text-xl text-green-800" dir="ltr">{c}</span>
                                    <button onClick={()=>handleRemoveCode(c)} className="text-red-500 hover:text-white hover:bg-red-500 p-2.5 rounded-lg transition-colors flex items-center gap-2">
                                        <i className="fas fa-trash-alt"></i> <span className="hidden sm:inline">{t('delete')}</span>
                                    </button>
                                </li>
                            ))}
                        </ul>
                    )}
                    <div className="mt-12 text-center border-t pt-6 flex flex-col items-center gap-4">
                        <button onClick={toggleLang} className="bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2 rounded-lg font-bold flex items-center gap-2">
                            <i className="fas fa-globe"></i> {isAr?'Switch to English':'التبديل للعربية'}
                        </button>
                        <button onClick={handleLogout} className="text-gray-500 hover:text-red-600 font-medium py-2 px-4 transition-colors flex items-center gap-2">
                            <i className="fas fa-sign-out-alt"></i> {t('logoutAdmin')}
                        </button>
                    </div>
                    <div className="mt-8 text-center text-slate-500 font-bold text-sm">
                        {t('copyright')}
                    </div>
                </div>
                {dialog.isOpen && (
                    <div className="fixed inset-0 z-[150] flex items-center justify-center bg-black/50 p-4" dir={isAr?'rtl':'ltr'}>
                        <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6">
                            <h3 className="text-lg font-bold text-gray-800 mb-4">{dialog.message}</h3>
                            <div className={`flex gap-3 mt-2 ${isAr?'justify-end':'justify-start'}`}>
                                {dialog.type!=='alert' && <button onClick={()=>setDialog({...dialog,isOpen:false})} className="px-4 py-2 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-xl font-medium">{t('cancel')}</button>}
                                <button onClick={()=>dialog.onConfirm()} className="px-4 py-2 text-white bg-green-900 hover:bg-green-800 rounded-xl font-medium">{t('confirm')}</button>
                            </div>
                        </div>
                    </div>
                )}
            </div>
        );
    }

    // ── Main App ─────────────────────────────────────────────────────────────
    return (
        <div className="min-h-screen bg-slate-50 pb-20 pt-24 sm:pt-2" dir={isAr?'rtl':'ltr'}>

            {/* ── Assign HW Modal ── */}
            {showAssignHWModal && (
                <AssignHWModal onClose={() => setShowAssignHWModal(false)} onSave={handleAssignHW} t={t} isAr={isAr} />
            )}

            {/* ── Audio Player Modal ── */}
            {audioPlayerSurah && (
                <AudioPlayerModal 
                    surah={audioPlayerSurah.surah} 
                    hwTask={audioPlayerSurah.hwTask}
                    onHWComplete={() => handleHWComplete(audioPlayerSurah.hwTask.id)}
                    onClose={() => setAudioPlayerSurah(null)} 
                    t={t} isAr={isAr} 
                />
            )}

            {/* ── Unified Certificate Viewer ── */}
            {(selectedCert || selectedJuzCert) && (() => {
                const isJuz = !!selectedJuzCert;
                const cert = isJuz ? selectedJuzCert.cert : selectedCert;
                const juzNum = isJuz ? selectedJuzCert.juzNum : null;
                const onClose = isJuz ? () => setSelectedJuzCert(null) : () => setSelectedCert(null);
                return (
                    <div className="fixed inset-0 z-[120] flex items-center justify-center bg-black/80 p-2 sm:p-4 backdrop-blur-sm" dir="ltr">
                        <div className="bg-white rounded-3xl shadow-2xl w-full max-w-4xl h-[95vh] sm:h-[85vh] flex flex-col overflow-hidden">
                            <div className="bg-slate-50 border-b border-slate-200 p-3 sm:p-4 flex justify-between items-center shrink-0">
                                <span className="font-bold text-sm text-slate-800 flex items-center gap-2"><i className="fas fa-certificate text-yellow-500 text-lg"></i> {cert.certLang==='ar'?'شهادة تميز':'Award of Excellence'}</span>
                                <button onClick={onClose} className="w-8 h-8 rounded-full flex items-center justify-center text-slate-500 hover:bg-slate-200 transition-colors"><i className="fas fa-times"></i></button>
                            </div>
                            <div className="flex-1 bg-slate-200/80 flex items-center justify-center relative shadow-inner overflow-hidden custom-scrollbar">
                                <div className="w-0 h-0 flex items-center justify-center">
                                    <div className="w-[740px] h-[560px] flex items-center justify-center origin-center transition-transform duration-300 scale-[0.45] sm:scale-[0.6] md:scale-[0.75] lg:scale-[0.85] xl:scale-100">
                                        <div className="shadow-2xl ring-1 ring-black/10 rounded-sm overflow-hidden">
                                            <CertDisplay cert={cert} studentName={currentStudent?.name} juzNum={juzNum} />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            })()}

            {/* ── Certificate Wizard ── */}
            {showCertWizard && (
                <CertWizard
                    isAr={isAr} t={t} lang={lang}
                    pct={showCertWizard.pct}
                    juzNum={showCertWizard.juzNum}
                    studentName={currentStudent?.name}
                    onClose={() => setShowCertWizard(null)}
                    onSave={(certData) => {
                        const nC = { id:Date.now(), timestamp:Date.now(), percentage:showCertWizard.pct, ...certData };
                        const key = showCertWizard.certKey;
                        saveToCloud(students.map(s => s.id===currentId ? {...s, [key]:[...(s[key]||[]),nC]} : s), currentId);
                        setShowCertWizard(null);
                        setTimeout(() => setDialog({ isOpen:true, type:'alert', message: isAr ? '🎉 تم حفظ الشهادة بنجاح!' : '🎉 Certificate saved!', onConfirm:()=>setDialog({isOpen:false})}), 300);
                    }}
                />
            )}

            {/* Login modal */}
            {showSyncModal && (
                <div className="fixed inset-0 z-[100] flex items-center justify-center bg-green-900/90 p-4" dir={isAr?'rtl':'ltr'}>
                    <form onSubmit={handleSetSyncKey} className="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8 text-center border-4 border-yellow-400 relative">
                        <button type="button" onClick={toggleLang} className={`absolute top-4 ${isAr?'left-4':'right-4'} bg-green-100 hover:bg-green-200 text-green-800 px-3 py-1 rounded-lg text-sm font-bold flex items-center gap-1`}>
                            <i className="fas fa-globe"></i> {isAr?'EN':'عربي'}
                        </button>
                        <div className="w-24 h-24 mx-auto rounded-full border-4 border-yellow-400 bg-white shadow-md mb-4 mt-4 flex items-center justify-center text-green-800 text-4xl">
                            <i className="fas fa-book-open"></i>
                        </div>
                        <h2 className="text-2xl font-bold text-green-900 mb-2">{t('welcomeCloud')}</h2>
                        <p className="text-gray-600 mb-6 text-sm">{t('enterCode')}</p>
                        <input type="text" autoFocus required placeholder={t('yourCode')} value={tempSyncKey} onChange={(e)=>setTempSyncKey(e.target.value)} className="w-full px-4 py-3 mb-6 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-green-700 text-center text-lg font-bold text-green-900 bg-green-50" dir="ltr" disabled={isSaving} />
                        <button type="submit" disabled={isSaving} className="w-full px-4 py-3 text-white bg-green-900 hover:bg-green-800 rounded-xl font-bold text-lg disabled:opacity-50">
                            {isSaving ? t('verifying') : t('loginSync')}
                        </button>
                    </form>
                </div>
            )}

            {!isAdminMode && !showSyncModal && (
                <div className="sticky top-0 z-50 shadow-md">
                    <header className="bg-green-900 text-white border-b-4 border-yellow-500">
                        <div className="max-w-5xl mx-auto px-3 py-3 sm:px-6 flex flex-col sm:flex-row items-center justify-between gap-3">
                            <div className="flex items-center gap-3 w-full sm:w-auto justify-between sm:justify-start">
                                <div className="flex items-center gap-2 sm:gap-3">
                                    <div className="w-10 h-10 sm:w-12 sm:h-12 rounded-full border-2 border-yellow-400 bg-white shadow-sm flex items-center justify-center text-green-800 text-xl sm:text-2xl">
                                        <i className="fas fa-book-open"></i>
                                    </div>
                                    <div>
                                        <h1 className="text-lg sm:text-2xl font-bold text-white leading-tight">{isReadOnly ? t('parentPortal') : t('title')}</h1>
                                        <div className="flex items-center gap-2 mt-1 flex-wrap">
                                            <button onClick={toggleLang} className="bg-white/20 hover:bg-white/30 text-white px-2 py-0.5 rounded text-[10px] sm:text-xs flex items-center gap-1">
                                                <i className="fas fa-globe"></i> {isAr?'English':'عربي'}
                                            </button>
                                            {!isReadOnly && (
                                                <>
                                                    <span className={`w-2 h-2 rounded-full ${isSaving?'bg-orange-400 animate-pulse':'bg-green-400 shadow-[0_0_8px_#4ade80]'}`}></span>
                                                    <span className="text-[10px] sm:text-xs text-green-200">{isSaving ? t('saving') : `${t('connected')} ${syncKey||t('notSet')})`}</span>
                                                    {syncKey && (
                                                        <button onClick={handleLogout} className={`text-[10px] bg-red-500/20 hover:bg-red-500/40 text-red-100 px-2 py-0.5 rounded border border-red-500/30 flex items-center gap-1 ${isAr?'mr-1':'ml-1'}`}>
                                                            <i className="fas fa-sign-out-alt"></i> {t('logout')}
                                                        </button>
                                                    )}
                                                </>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div className="flex-1 w-full sm:max-w-md flex items-center gap-1.5 sm:gap-2">
                                {isReadOnly ? (
                                    <div className="w-full flex items-center justify-between sm:justify-end gap-4">
                                        <span className="text-xl sm:text-2xl font-bold text-yellow-400 px-4">{currentStudent?.name}</span>
                                        <button onClick={handleLogout} className="p-2 sm:p-2.5 bg-red-600/80 hover:bg-red-50 rounded-xl text-white text-xs sm:text-sm font-bold flex items-center gap-2">
                                            <i className="fas fa-sign-out-alt"></i> {t('logout')}
                                        </button>
                                    </div>
                                ) : (
                                    <>
                                        <div className="relative flex-1">
                                            <select value={currentStudent?.id||''} onChange={(e)=>saveToCloud(students,e.target.value)} className={`w-full py-2 sm:py-2.5 rounded-xl bg-green-800/50 border border-green-700 text-white focus:outline-none focus:ring-2 focus:ring-yellow-500 text-sm sm:text-lg font-medium appearance-none cursor-pointer ${isAr?'pl-4 pr-8 sm:pr-10':'pr-4 pl-8 sm:pl-10'}`}>
                                                {students.map(s=><option key={s.id} value={s.id} className="bg-green-800">{s.name}</option>)}
                                            </select>
                                            <i className={`fas fa-users absolute top-1/2 -translate-y-1/2 text-sm sm:text-lg text-yellow-400 pointer-events-none ${isAr?'right-2 sm:right-3':'left-2 sm:left-3'}`}></i>
                                            <i className={`fas fa-chevron-down absolute top-1/2 -translate-y-1/2 text-sm sm:text-lg text-yellow-400 pointer-events-none ${isAr?'left-2 sm:left-3':'right-2 sm:right-3'}`}></i>
                                        </div>
                                        <button onClick={handleShare} className="p-2 sm:p-2.5 bg-blue-600 hover:bg-blue-500 border border-blue-500 rounded-xl" title={t('shareLink')}><i className="fas fa-share-alt text-base sm:text-lg text-white"></i></button>
                                        <button onClick={renameStudent} className="p-2 sm:p-2.5 bg-green-800 hover:bg-green-700 border border-green-700 rounded-xl" title={t('editStudent')}><i className="fas fa-edit text-base sm:text-lg text-yellow-400"></i></button>
                                        <button onClick={addStudent} className="p-2 sm:p-2.5 bg-yellow-500 hover:bg-yellow-400 rounded-xl" title={t('addStudent')}><i className="fas fa-user-plus text-base sm:text-lg text-green-900"></i></button>
                                        <button onClick={deleteStudent} className="p-2 sm:p-2.5 bg-red-500/20 hover:bg-red-500/40 border border-red-500/30 rounded-xl" title={t('deleteStudent')}><i className="fas fa-trash-alt text-base sm:text-lg text-red-200"></i></button>
                                    </>
                                )}
                            </div>
                        </div>
                    </header>

                    {/* Student HW Notification Banner (Only for ReadOnly/Student Portal) */}
                    {isReadOnly && currentStudent.listeningTasks && currentStudent.listeningTasks.filter(t => !t.completed).length > 0 && (
                        <div className="max-w-5xl mx-auto px-4 mt-4 space-y-3">
                            {currentStudent.listeningTasks.filter(t => !t.completed).map(task => (
                                <div key={task.id} className="w-full p-4 sm:px-6 rounded-2xl flex flex-col sm:flex-row items-center justify-between gap-4 border-2 shadow-sm animate-fade-in-up bg-purple-50 border-purple-200">
                                    <div className="flex items-center gap-4 w-full sm:w-auto">
                                        <div className="w-12 h-12 shrink-0 rounded-full flex items-center justify-center text-2xl bg-purple-200 text-purple-700 anim-bounce-soft">
                                            <i className="fas fa-headphones-alt"></i>
                                        </div>
                                        <div>
                                            <h3 className="font-bold text-lg leading-tight text-purple-800">

                                                    {isAr?s.name:s.enName}
                                                </button>
                                            )) : <p className="text-xs text-slate-500 my-auto w-full text-center">{t('noData')}</p>}
                                        </div>
                                    </div>
                                    <div className="flex flex-col gap-4 h-full">
                                        <div className="bg-red-50/70 border border-red-100 p-4 rounded-2xl flex-1 flex flex-col">
                                            <h4 className="font-bold text-red-700 mb-3 flex items-center gap-2 text-sm"><i className="fas fa-exclamation-triangle"></i> {t('needsRevision')}</h4>
                                            <div className="flex flex-wrap gap-2 overflow-y-auto custom-scrollbar max-h-[80px] content-start">
                                                {weakRevisions.length > 0 ? weakRevisions.map(s => (
                                                    <button key={s.id} onClick={()=>scrollToSurah(s.id)} className="bg-white text-red-600 px-3 py-1.5 rounded-lg text-[10px] font-bold border border-red-200 shadow-sm hover:bg-red-50">
                                                        {isAr?s.name:s.enName}
                                                    </button>
                                                )) : <span className="text-xs text-slate-400 my-auto">—</span>}
                                            </div>
                                        </div>
                                        <div className="bg-orange-50/70 border border-orange-100 p-4 rounded-2xl flex-1 flex flex-col">
                                            <h4 className="font-bold text-orange-700 mb-3 flex items-center gap-2 text-sm"><i className="fas fa-history"></i> {t('oldRevisions')}</h4>
                                            <div className="flex flex-wrap gap-2 overflow-y-auto custom-scrollbar max-h-[80px] content-start">
                                                {oldRevisions.length > 0 ? oldRevisions.map(s => (
                                                    <button key={s.id} onClick={()=>scrollToSurah(s.id)} className="bg-white text-orange-600 px-3 py-1.5 rounded-lg text-[10px] font-bold border border-orange-200 shadow-sm hover:bg-orange-50">
                                                        {isAr?s.name:s.enName}
                                                    </button>
                                                )) : <span className="text-xs text-slate-400 my-auto">—</span>}
                                            </div>
                                        </div>
                                        <div className="bg-green-50/70 border border-green-100 p-4 rounded-2xl flex-1 flex flex-col">
                                            <h4 className="font-bold text-green-700 mb-3 flex items-center gap-2 text-sm"><i className="fas fa-check-circle"></i> {t('recentRevisions')}</h4>
                                            <div className="flex flex-wrap gap-2 overflow-y-auto custom-scrollbar max-h-[80px] content-start">
                                                {recentRevisions.length > 0 ? recentRevisions.map(s => (
                                                    <button key={s.id} onClick={()=>scrollToSurah(s.id)} className="bg-white text-green-600 px-3 py-1.5 rounded-lg text-[10px] font-bold border border-green-200 shadow-sm hover:bg-green-50">
                                                        {isAr?s.name:s.enName}
                                                    </button>
                                                )) : <span className="text-xs text-slate-400 my-auto">—</span>}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </section>

                            {/* Certificates */}
                            {(currentStudent.certificates && currentStudent.certificates.length > 0) && (
                                <section className="bg-white rounded-3xl shadow-sm border border-yellow-200 p-6 md:p-8">
                                    <h3 className="font-bold mb-6 flex items-center gap-2 text-xl text-slate-800"><i className="fas fa-award text-yellow-500 text-3xl"></i> {t('certHonorBoard')}</h3>
                                    <div className="flex flex-wrap gap-4">
                                        {currentStudent.certificates.map((cert) => (
                                            <button key={cert.id} onClick={()=>setSelectedCert(cert)} className="flex items-center gap-4 bg-gradient-to-l from-yellow-50/50 to-white min-w-[220px] border border-yellow-100 p-4 rounded-2xl hover:shadow-md hover:border-yellow-300 transition-all text-start relative group">
                                                <div className="bg-yellow-500 text-white w-12 h-12 rounded-full flex items-center justify-center shadow-md group-hover:scale-110 transition-transform">
                                                    <span className="text-2xl">{cert.sticker || '🏅'}</span>
                                                </div>
                                                <div>
                                                    <p className="font-bold text-sm text-green-900">{t('certAchievement')} {cert.percentage}%</p>
                                                    <p className="text-xs text-slate-500 mt-1">{new Date(cert.timestamp).toLocaleDateString(isAr?'ar-EG':'en-US')}</p>
                                                    {cert.reason && <p className="text-[10px] text-slate-400 mt-0.5 truncate max-w-[140px]">{cert.reason}</p>}
                                                </div>
                                                {cert.certLang==='en' && <span className="absolute top-3 right-3 text-[9px] bg-blue-100 text-blue-800 font-bold px-2 py-0.5 rounded">EN</span>}
                                                {cert.certLang==='ar' && <span className="absolute top-3 right-3 text-[9px] bg-green-100 text-green-800 font-bold px-2 py-0.5 rounded">AR</span>}
                                            </button>
                                        ))}
                                    </div>
                                </section>
                            )}

                            <div className="flex flex-col sm:flex-row justify-between items-center gap-4">
                                <div className="relative w-full sm:max-w-md">
                                    <i className={`fas fa-search absolute top-1/2 -translate-y-1/2 ${isAr?'right-4':'left-4'} text-slate-400`}></i>
                                    <input type="text" placeholder={t('searchSurah')} value={searchQuery} onChange={(e)=>setSearchQuery(e.target.value)} className={`w-full py-3 ${isAr?'pr-12 pl-4':'pl-12 pr-4'} rounded-xl border border-slate-200 focus:ring-2 focus:ring-green-800 focus:border-transparent outline-none shadow-sm`} />
                                </div>
                                <button onClick={() => resetSectionData('main')} className="flex items-center gap-2 text-red-600 bg-red-50 hover:bg-red-100 px-4 py-2 rounded-lg text-sm font-medium transition-colors"><i className="fas fa-sync-alt"></i> {t('resetData')}</button>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                                {displayedSurahs.map((surah) => {
                                    const memorizedCount = progress[surah.id] || 0;
                                    const isComplete = memorizedCount === surah.totalAyahs;
                                    const progressPercent = (memorizedCount / surah.totalAyahs) * 100;
                                    const isHighlighted = highlightedSurah === surah.id;
                                    return (
                                        <div id={`surah-card-${surah.id}`} key={surah.id}
                                            className={`relative overflow-visible rounded-2xl border p-5 transition-all duration-200 hover:shadow-md ${isComplete ? 'bg-green-50 border-yellow-200 ring-1 ring-yellow-300' : 'bg-white border-slate-200'} ${isHighlighted ? 'ring-4 ring-blue-400 shadow-xl' : ''}`}>
                                            <div className="absolute bottom-0 left-0 right-0 h-1 rounded-b-2xl overflow-hidden pointer-events-none">
                                                <div className={`absolute bottom-0 h-full bg-yellow-500 transition-all duration-500 ${isAr?'right-0':'left-0'}`} style={{width:`${progressPercent}%`}} />
                                            </div>
                                            <div className="flex justify-between items-start mb-4">
                                                <div>
                                                    <div className="flex items-center gap-2">
                                                        <span className="flex items-center justify-center w-7 h-7 rounded-full bg-slate-100 text-slate-500 text-xs font-bold shadow-inner">{surah.id}</span>
                                                        <h3 className="text-lg font-bold text-slate-800">{t('surah')} {isAr?surah.name:surah.enName} <br/><span className="text-sm font-normal text-slate-400 mt-0.5">{isAr?surah.enName:surah.enMeaning}</span></h3>
                                                        <button onClick={() => setAudioPlayerSurah({ surah, hwTask: null })} className="text-green-500 hover:text-green-700 bg-green-50 hover:bg-green-100 w-6 h-6 rounded-full flex items-center justify-center transition-colors" title={t('listenSurah')}>
                                                            <i className="fas fa-headphones-alt text-xs"></i>
                                                        </button>
                                                    </div>
                                                    <p className="text-sm text-slate-500 mt-2">{t('ayahs')} {surah.totalAyahs}</p>
                                                </div>
                                                <button onClick={()=>!isReadOnly&&toggleCompleteSurah(surah)} className={`p-2.5 rounded-full transition-colors ${isComplete?'text-yellow-500 bg-yellow-100 shadow-sm':'text-slate-300 hover:text-yellow-500 hover:bg-slate-50'} ${isReadOnly?'cursor-default':''}`}>
                                                    <i className="fas fa-check-circle text-2xl"></i>
                                                </button>
                                            </div>
                                            {!isReadOnly && (
                                                <div className="flex items-center gap-3">
                                                    <div className="flex-1">
                                                        <input type="range" min="0" max={surah.totalAyahs} value={memorizedCount} onChange={(e)=>updateSurah(surah.id,parseInt(e.target.value)||0)} className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-green-800" dir={isAr ? "rtl" : "ltr"} />
                                                    </div>
                                                    <div className="w-16 shrink-0">
                                                        <input type="number" min="0" max={surah.totalAyahs} value={memorizedCount===0?'':memorizedCount} onChange={(e)=>updateSurah(surah.id,parseInt(e.target.value)||0)} placeholder="0" className="w-full px-2 py-1.5 text-center text-sm font-semibold rounded border border-slate-200 focus:outline-none focus:border-green-800 focus:ring-1 focus:ring-green-800 bg-slate-50" />
                                                    </div>
                                                </div>
                                            )}
                                            {isReadOnly && (
                                                <div className="mt-2">
                                                    <div className="w-full bg-slate-100 rounded-full h-2">
                                                        <div className="bg-green-500 h-2 rounded-full" style={{width:`${progressPercent}%`}}></div>
                                                    </div>
                                                    <p className="text-xs text-slate-500 mt-1 text-center" dir="ltr">{memorizedCount} / {surah.totalAyahs}</p>
                                                </div>
                                            )}
                                            <div className="mt-4 pt-3 border-t border-slate-100 flex flex-col gap-3">
                                                <div className="flex justify-between items-center w-full">
                                                    <span className="text-xs text-slate-500 font-medium">{t('revision')}</span>
                                                    {!isReadOnly && Object.keys(revisions[surah.id]||{}).length > 0 && (
                                                        <button onClick={()=>clearRevisions(surah.id)} className="text-slate-400 hover:text-red-600 flex items-center gap-1.5 text-[11px] bg-slate-50 hover:bg-red-50 px-3 py-1 rounded-full">
                                                            <i className="fas fa-sync-alt"></i> <span className="font-bold">{isAr?'إعادة':'Reset'}</span>
                                                        </button>
                                                    )}
                                                </div>
                                                <div className="flex gap-1.5 w-full justify-start" dir="ltr">
                                                    {[1,2,3,4,5].map(num => {
                                                        const revData = (revisions[surah.id]||{})[num];
                                                        const rating = typeof revData==='object'&&revData!==null ? revData.rating : revData;
                                                        const isSelectorOpen = revisionSelector?.surahId===surah.id && revisionSelector?.revNum===num;
                                                        let IconClass = "w-7 h-7 rounded-full border text-[10px] flex items-center justify-center transition-all duration-200 ";
                                                        if (rating==='excellent') IconClass += "bg-green-100 border-green-500 text-green-700 shadow-sm scale-110 z-10";
                                                        else if (rating==='good') IconClass += "bg-blue-100 border-blue-500 text-blue-600 shadow-sm scale-110 z-10";
                                                        else if (rating==='weak') IconClass += "bg-orange-100 border-orange-500 text-orange-600 shadow-sm scale-110 z-10";
                                                        else IconClass += "bg-slate-50 border-slate-200 text-slate-400 hover:border-green-400";
                                                        return (
                                                            <div key={num} className="relative">
                                                                <button onClick={()=>!isReadOnly&&setRevisionSelector(isSelectorOpen?null:{surahId:surah.id,revNum:num})} className={IconClass}>
                                                                    {rating ? <i className="fas fa-star text-sm"></i> : <span className="font-bold">{num}</span>}
                                                                </button>
                                                                {isSelectorOpen && !isReadOnly && (
                                                                    <React.Fragment>
                                                                        <div className="fixed inset-0 z-40" onClick={()=>setRevisionSelector(null)} />
                                                                        <div className="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 bg-white rounded-2xl shadow-xl border border-slate-200 p-1.5 flex gap-1 z-50">
                                                                            <button onClick={()=>setRevisionRating(surah.id,num,'excellent')} className="p-2 hover:bg-green-50 rounded-lg text-green-600" title={t('excellent')}><i className="fas fa-star text-lg"></i></button>
                                                                            <button onClick={()=>setRevisionRating(surah.id,num,'good')} className="p-2 hover:bg-blue-50 rounded-lg text-blue-600" title={t('good')}><i className="fas fa-thumbs-up text-lg"></i></button>
                                                                            <button onClick={()=>setRevisionRating(surah.id,num,'weak')} className="p-2 hover:bg-orange-50 rounded-lg text-orange-600" title={t('weak')}><i className="fas fa-exclamation-circle text-lg"></i></button>
                                                                            {rating && <button onClick={()=>setRevisionRating(surah.id,num,null)} className="p-2 hover:bg-gray-100 rounded-lg text-gray-400"><i className="fas fa-times text-lg"></i></button>}
                                                                        </div>
                                                                    </React.Fragment>
                                                                )}
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>

                            {!searchQuery && (
                                <div className="flex flex-col md:flex-row justify-center items-center gap-4 md:gap-8 mt-12 pt-8 border-t border-slate-200">
                                    <div className="flex items-center gap-3">
                                        <button onClick={()=>{if(currentJuz!=='all'){setCurrentJuz(prev=>Math.max(prev-1,1));window.scrollTo({top:300,behavior:'smooth'});}}} disabled={currentJuz==='all'||currentJuz===1} className="p-3 rounded-xl border border-slate-200 text-slate-500 disabled:opacity-50 hover:bg-green-50 hover:text-green-800 bg-white w-12 h-12 shadow-sm transition-colors"><i className={`fas ${isAr?'fa-chevron-right':'fa-chevron-left'} text-lg`}></i></button>
                                        <div className="relative">
                                            <select value={currentJuz} onChange={(e)=>{const val=e.target.value;setCurrentJuz(val==='all'?'all':Number(val));window.scrollTo({top:300,behavior:'smooth'});}} className={`appearance-none py-3 rounded-xl border-2 border-green-500 bg-white text-green-900 font-bold focus:outline-none cursor-pointer text-center min-w-[160px] text-lg shadow-sm ${isAr?'pl-10 pr-4':'pr-10 pl-4'}`}>
                                                <option value="all" className="font-bold">{t('showAll')}</option>
                                                {[...Array(30)].map((_,i)=><option key={i+1} value={i+1} className="font-bold">{t('juz')} {i+1}</option>)}
                                            </select>
                                            <i className={`fas fa-chevron-down absolute top-1/2 -translate-y-1/2 text-green-600 text-sm pointer-events-none ${isAr?'left-4':'right-4'}`}></i>
                                        </div>
                                        <button onClick={()=>{if(currentJuz!=='all'){setCurrentJuz(prev=>Math.min(prev+1,30));window.scrollTo({top:300,behavior:'smooth'});}}} disabled={currentJuz==='all'||currentJuz===30} className="p-3 rounded-xl border border-slate-200 text-slate-500 disabled:opacity-50 hover:bg-green-50 hover:text-green-800 bg-white w-12 h-12 shadow-sm transition-colors"><i className={`fas ${isAr?'fa-chevron-left':'fa-chevron-right'} text-lg`}></i></button>
                                    </div>
                                    <div className="hidden md:block w-px h-10 bg-slate-300"></div>
                                    <button onClick={()=>setCurrentJuz(currentJuz==='all'?1:'all')} className={`flex items-center gap-2 px-6 py-3 rounded-xl font-bold border-2 transition-all shadow-sm ${currentJuz==='all'?'bg-green-900 text-white border-green-900 hover:bg-green-800':'text-green-900 bg-white border-green-500 hover:bg-green-50'}`}>
                                        <i className={`fas ${currentJuz==='all'?'fa-layer-group':'fa-list-ul'}`}></i> {currentJuz==='all' ? t('backToJuz') : t('showAllSurahs')}
                                    </button>
                                </div>
                            )}
                            {displayedSurahs.length===0 && <div className="text-center py-12 text-slate-500 text-lg">{t('noSurahFound')}</div>}
                        </>
                    )}
                </main>
            )}

            {!isAdminMode && !showSyncModal && (
                <footer className="max-w-5xl mx-auto px-4 py-6 mt-8 border-t border-slate-200 text-center">
                    <p className="text-slate-600 font-bold text-sm sm:text-base">{t('copyright')}</p>
                </footer>
            )}

            {/* Dialog */}
            {dialog.isOpen && (
                <div className="fixed inset-0 z-[150] flex items-center justify-center bg-slate-900/60 p-4 backdrop-blur-sm">
                    <div className="bg-white rounded-3xl p-6 md:p-8 w-full max-w-sm shadow-2xl">
                        <p className="font-bold mb-6 text-slate-800 text-lg">{dialog.message}</p>
                        {dialog.type==='prompt' && (
                            <input type="text" autoFocus defaultValue={dialog.defaultValue} id="dialogInput" className="w-full px-4 py-3 mb-6 border border-slate-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none" onKeyDown={(e)=>{if(e.key==='Enter') dialog.onConfirm(document.getElementById('dialogInput').value);}} />
                        )}
                        {dialog.type==='planSelect' && (
                            <select id="planSelectInput" defaultValue={currentStudent.planId||'none'} className="w-full px-4 py-3 mb-6 border border-slate-300 rounded-xl focus:ring-2 focus:ring-teal-500 outline-none font-medium">
                                {MEMORIZATION_PLANS.map(plan=><option key={plan.id} value={plan.id}>{isAr?plan.arTitle:plan.enTitle}</option>)}
                            </select>
                        )}
                        {dialog.type==='certLanguage' ? (
                            <div className="flex flex-col gap-3">
                                <button onClick={()=>dialog.onConfirm('ar')} className="bg-green-700 text-white py-3 rounded-xl font-bold hover:bg-green-600 text-lg">بالعربية</button>
                                <button onClick={()=>dialog.onConfirm('en')} className="bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-500 text-lg tracking-wide">English</button>
                                <button onClick={()=>setDialog({isOpen:false})} className="text-slate-500 py-2 hover:text-slate-800 font-medium">{t('cancel')}</button>
                            </div>
                        ) : (
                            <div className={`flex gap-3 mt-4 ${isAr?'justify-end':'justify-start'}`}>
                                {dialog.type!=='alert' && <button onClick={()=>setDialog({isOpen:false})} className="px-5 py-2.5 bg-slate-100 rounded-xl text-slate-600 font-bold hover:bg-slate-200">{t('cancel')}</button>}
                                <button onClick={()=>{
                                    if(dialog.type==='prompt') dialog.onConfirm(document.getElementById('dialogInput').value);
                                    else if(dialog.type==='planSelect') dialog.onConfirm(document.getElementById('planSelectInput').value);
                                    else dialog.onConfirm();
                                }} className="px-5 py-2.5 bg-green-900 text-white rounded-xl font-bold hover:bg-green-800 shadow-sm">{t('confirm')}</button>
                            </div>
                        )}
                    </div>
                </div>
            )}
        </div>
    );
}

const root = createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
