              if (docSnap.exists()) {
                const codes = docSnap.data().codes || [];
                setAllowedCodes(codes);
                if (syncKey && syncKey !== MASTER_ADMIN_PASSWORD && !codes.includes(syncKey)) {
                    setSyncKey("");
                    setShowSyncModal(true);
                    try { localStorage.removeItem('quran-sync-key'); } catch(e){}
                    setDialog({ isOpen: true, type: 'alert', message: t('codeRevoked'), onConfirm: () => setDialog({isOpen: false}) });
                }
              }
            });
            return () => unsub();
          }, [db, syncKey, isReadOnly, lang]);

          const saveToCloud = async (newStudents, newId) => {
            if (isReadOnly || !isDataLoaded) return;
            setStudents(newStudents); setCurrentId(newId);
            if (db && syncKey) {
                setIsSaving(true);
                try { await setDoc(doc(db, 'quran_centers', syncKey), { students: newStudents, currentId: newId }, { merge: true }); } 
                catch (e) { console.error(e); } finally { setTimeout(()=>setIsSaving(false), 500); }
            }
          };

          const handleSetSyncKey = async (e) => {
              e.preventDefault();
              const key = tempSyncKey.trim().toLowerCase();
              if (!key) return;
              
              setIsSaving(true);
              if (key === MASTER_ADMIN_PASSWORD) {
                  setIsAdminMode(true); setTempSyncKey(""); setShowSyncModal(false); setIsSaving(false); return;
              }
              if (key.includes('-')) {
                  const [center, pin] = key.split('-');
                  try {
                      const snap = await getDoc(doc(db, 'quran_centers', center));
                      if (snap.exists() && snap.data().students?.find(s => s.pin === pin)) {
                          setIsReadOnly(true); setSyncKey(center); localStorage.setItem('quran-parent-code', key); setShowSyncModal(false);
                      } else { setDialog({ isOpen: true, type: 'alert', message: t('parentCodeInvalid'), onConfirm: () => setDialog({isOpen: false}) }); }
                  } catch(e) { setDialog({ isOpen: true, type: 'alert', message: t('connError'), onConfirm: () => setDialog({isOpen: false}) }); }
                  setIsSaving(false); return;
              }
              try {
                  const adminSnap = await getDoc(doc(db, 'quran_centers', '_admin_settings_'));
                  const codes = adminSnap.exists() ? adminSnap.data().codes || [] : [];
                  if (codes.includes(key)) {
                      setSyncKey(key); localStorage.setItem('quran-sync-key', key); setShowSyncModal(false);
                  } else { setDialog({ isOpen: true, type: 'alert', message: t('codeNotRegistered'), onConfirm: () => setDialog({isOpen: false}) }); }
              } catch(e) { setDialog({ isOpen: true, type: 'alert', message: t('connError'), onConfirm: () => setDialog({isOpen: false}) }); }
              setIsSaving(false);
          };

          const handleAddCode = async () => {
              const code = newCodeInput.trim().toLowerCase();
              if (!code) return;
              if (allowedCodes.includes(code)) {
                  setDialog({ isOpen: true, type: 'alert', message: t('codeInvalid'), onConfirm: () => setDialog({isOpen: false}) }); return;
              }
              await setDoc(doc(db, 'quran_centers', '_admin_settings_'), { codes: [...allowedCodes, code] }, { merge: true });
              setNewCodeInput("");
          };

          const handleRemoveCode = (code) => {
              setDialog({
                  isOpen: true, type: 'confirm', message: `${t('confirmDeleteAdmin')} "${code}"؟`, 
                  onConfirm: async () => {
                      const newCodes = allowedCodes.filter(c => c !== code);
                      await setDoc(doc(db, 'quran_centers', '_admin_settings_'), { codes: newCodes }, { merge: true });
                      setDialog({ isOpen: false });
                  }
              });
          };

          const handleLogout = () => {
              setSyncKey(""); setIsAdminMode(false); setIsReadOnly(false); setShowSyncModal(true); setIsDataLoaded(false);
              localStorage.removeItem('quran-sync-key'); localStorage.removeItem('quran-parent-code');
          };

          const currentStudent = students.find(s => s.id === currentId) || students[0] || {};
          const progress = currentStudent?.progress || {};
          const revisions = currentStudent?.revisions || {};

          useEffect(() => {
              if (isDataLoaded && !isReadOnly && !isAdminMode && syncKey && currentStudent && !currentStudent.pin && students.length > 0) {
                  const newPin = Math.floor(1000 + Math.random() * 9000).toString();
                  saveToCloud(students.map(s => s.id === currentStudent.id ? { ...s, pin: newPin } : s), currentId);
              }
          }, [currentStudent, isReadOnly, isAdminMode, syncKey, students, isDataLoaded]);

          const addStudent = () => {
              setDialog({ isOpen: true, type: 'prompt', message: t('studentNamePrompt'), onConfirm: (name) => {
                  if (name?.trim()) {
                      const nId = Date.now().toString();
                      const pin = Math.floor(1000 + Math.random() * 9000).toString();
                      saveToCloud([...students, { id: nId, name: name.trim(), progress: {}, revisions: {}, pin, certificates: [] }], nId);
                  }
                  setDialog({ isOpen: false });
              }});
          };

          const renameStudent = () => {
              setDialog({ isOpen: true, type: 'prompt', message: t('editStudentPrompt'), defaultValue: currentStudent.name, onConfirm: (newName) => {
                  if (newName?.trim()) saveToCloud(students.map(s => s.id === currentId ? {...s, name: newName.trim()} : s), currentId);
                  setDialog({ isOpen: false });
              }});
          };

          const deleteStudent = () => {
              if (students.length === 1) { setDialog({ isOpen: true, type: 'alert', message: t('cantDeleteOnlyStudent'), onConfirm: () => setDialog({isOpen: false}) }); return; }
              setDialog({ isOpen: true, type: 'confirm', message: `${t('confirmDeleteStudent')} "${currentStudent.name}"؟`, onConfirm: () => {
                  const filtered = students.filter(s => s.id !== currentId);
                  saveToCloud(filtered, filtered[0].id); setDialog({ isOpen: false });
              }});
          };

          const resetProgress = () => {
              setDialog({ isOpen: true, type: 'confirm', message: `${t('confirmReset')} ${currentStudent.name}؟`, onConfirm: () => {
                  saveToCloud(students.map(s => s.id === currentId ? {...s, progress: {}, revisions: {}} : s), currentId); setDialog({ isOpen: false });
              }});
          };

          const handleShare = () => {
              const code = `${syncKey}-${currentStudent.pin || '0000'}`;
              const msg = isAr ? `لمتابعة حفظ الطالب: ${currentStudent.name}\nكود المتابعة الخاص بكم هو: ${code}` : `To track student: ${currentStudent.name}\nYour tracking code is: ${code}`;
              
              const textArea = document.createElement("textarea");
              textArea.value = msg; textArea.style.position = "fixed"; textArea.style.top = "0"; textArea.style.left = "0";
              document.body.appendChild(textArea); textArea.focus(); textArea.select();
              try { document.execCommand('copy'); setDialog({ isOpen: true, type: 'alert', message: t('linkCopied'), onConfirm: () => setDialog({isOpen: false}) }); } catch (err) {}
              document.body.removeChild(textArea);
          };

          const stats = useMemo(() => {
            let total = 0; let done = 0;
            SURAHS_DATA.forEach(s => { const m = progress[s.id] || 0; total += m; if (m === s.totalAyahs) done++; });
            const p = ((total / TOTAL_QURAN_AYAHS) * 100).toFixed(2);
            return { total, done, percentage: parseFloat(p) };
          }, [progress]);

          const getBadge = (p, l = lang) => {
            const curT = (k) => tDict[l][k] || k;
            const baseStyle = "transform transition-all duration-500 badge-3d hover:scale-105 hover:-translate-y-1";
            
            if (p === 100) return { icon: <i className="fas fa-crown text-3xl sm:text-5xl text-yellow-100 drop-shadow-md animate-bounce"></i>, text: curT('badge100'), color: `bg-gradient-to-br from-yellow-400 via-yellow-500 to-yellow-600 text-white border-yellow-300 shadow-[0_4px_15px_rgba(234,179,8,0.5)] ${baseStyle}` };
            if (p >= 95) return { icon: <i className="fas fa-mountain text-3xl sm:text-5xl text-slate-100 drop-shadow-md animate-float"></i>, text: curT('badge95'), color: `bg-gradient-to-br from-slate-400 via-slate-500 to-slate-700 text-white border-slate-300 shadow-[0_4px_15px_rgba(100,116,139,0.5)] ${baseStyle}` };
            if (p >= 90) return { icon: <i className="fas fa-gem text-3xl sm:text-5xl text-cyan-100 drop-shadow-md animate-pulse"></i>, text: curT('badge90'), color: `bg-gradient-to-br from-cyan-400 via-cyan-500 to-blue-600 text-white border-cyan-300 shadow-[0_4px_15px_rgba(6,182,212,0.5)] ${baseStyle}` };
            if (p >= 80) return { icon: <i className="fas fa-chess-knight text-3xl sm:text-5xl text-purple-100 drop-shadow-md animate-float"></i>, text: curT('badge80'), color: `bg-gradient-to-br from-purple-500 via-purple-600 to-purple-800 text-white border-purple-400 shadow-[0_4px_15px_rgba(168,85,247,0.5)] ${baseStyle}` };
            if (p >= 70) return { icon: <i className="fas fa-rosette text-3xl sm:text-5xl text-rose-100 drop-shadow-md"></i>, text: curT('badge70'), color: `bg-gradient-to-br from-rose-400 via-rose-500 to-rose-700 text-white border-rose-300 shadow-[0_4px_15px_rgba(244,63,94,0.5)] ${baseStyle}` };
            if (p >= 60) return { icon: <i className="fas fa-shield-alt text-3xl sm:text-5xl text-indigo-100 drop-shadow-md animate-pulse"></i>, text: curT('badge60'), color: `bg-gradient-to-br from-indigo-400 via-indigo-500 to-indigo-700 text-white border-indigo-300 shadow-[0_4px_15px_rgba(99,102,241,0.5)] ${baseStyle}` };
            if (p >= 50) return { icon: <i className="fas fa-trophy text-3xl sm:text-5xl text-yellow-200 drop-shadow-md animate-float"></i>, text: curT('badge50'), color: `bg-gradient-to-br from-amber-400 via-amber-500 to-amber-700 text-white border-amber-300 shadow-[0_4px_15px_rgba(245,158,11,0.5)] ${baseStyle}` };
            if (p >= 40) return { icon: <i className="fas fa-fire text-3xl sm:text-5xl text-orange-100 drop-shadow-md animate-pulse"></i>, text: curT('badge40'), color: `bg-gradient-to-br from-orange-400 via-orange-500 to-red-600 text-white border-orange-300 shadow-[0_4px_15px_rgba(249,115,22,0.5)] ${baseStyle}` };
            if (p >= 30) return { icon: <i className="fas fa-medal text-3xl sm:text-5xl text-teal-100 drop-shadow-md"></i>, text: curT('badge30'), color: `bg-gradient-to-br from-teal-400 via-teal-500 to-teal-700 text-white border-teal-300 shadow-[0_4px_15px_rgba(20,184,166,0.5)] ${baseStyle}` };
            if (p >= 20) return { icon: <i className="fas fa-star text-3xl sm:text-5xl text-yellow-200 drop-shadow-md animate-float"></i>, text: curT('badge20'), color: `bg-gradient-to-br from-blue-400 via-blue-500 to-blue-700 text-white border-blue-300 shadow-[0_4px_15px_rgba(59,130,246,0.5)] ${baseStyle}` };
            if (p >= 15) return { icon: <i className="fas fa-lightbulb text-3xl sm:text-5xl text-yellow-100 drop-shadow-md animate-pulse"></i>, text: curT('badge15'), color: `bg-gradient-to-br from-yellow-300 via-yellow-400 to-yellow-500 text-yellow-900 border-yellow-200 shadow-[0_4px_15px_rgba(253,224,71,0.5)] ${baseStyle}` };
            if (p >= 10) return { icon: <i className="fas fa-leaf text-3xl sm:text-5xl text-emerald-100 drop-shadow-md"></i>, text: curT('badge10'), color: `bg-gradient-to-br from-emerald-400 via-emerald-500 to-emerald-700 text-white border-emerald-300 shadow-[0_4px_15px_rgba(16,185,129,0.5)] ${baseStyle}` };
            if (p >= 5) return { icon: <i className="fas fa-seedling text-3xl sm:text-5xl text-green-100 drop-shadow-md animate-float"></i>, text: curT('badge5'), color: `bg-gradient-to-br from-green-400 via-green-500 to-green-600 text-white border-green-300 shadow-[0_4px_15px_rgba(34,197,94,0.5)] ${baseStyle}` };
            if (p > 0) return { icon: <i className="fas fa-sun text-3xl sm:text-5xl text-yellow-500 drop-shadow-md animate-pulse"></i>, text: curT('badgeGT0'), color: `bg-gradient-to-br from-amber-50 via-amber-100 to-amber-200 text-amber-800 border-amber-300 shadow-sm ${baseStyle}` };
            
            return { icon: <i className="fas fa-rocket text-3xl sm:text-5xl text-slate-400 drop-shadow-md animate-float"></i>, text: curT('badge0'), color: `bg-gradient-to-br from-slate-50 via-slate-100 to-slate-200 text-slate-600 border-slate-300 shadow-sm ${baseStyle}` };
          };

          const currentBadge = getBadge(stats.percentage);

          const issueCertificate = () => {
              setDialog({ isOpen: true, type: 'certLanguage', message: t('chooseCertLang'), onConfirm: (cL) => {
                  const nC = { id: Date.now(), timestamp: Date.now(), percentage: stats.percentage, certLang: cL };
                  saveToCloud(students.map(s => s.id === currentId ? {...s, certificates: [...(s.certificates || []), nC]} : s), currentId);
                  setDialog({ isOpen: false });
              }});
          };

          const updateSurah = (sId, val) => {
            const num = Math.min(Math.max(0, val), SURAHS_DATA.find(s => s.id === sId).totalAyahs);
            saveToCloud(students.map(s => s.id === currentId ? { ...s, progress: { ...s.progress, [sId]: num } } : s), currentId);
          };

          const toggleCompleteSurah = (surah) => {
            const isComplete = progress[surah.id] === surah.totalAyahs;
            updateSurah(surah.id, isComplete ? 0 : surah.totalAyahs);
          };

          const setRevisionRating = (surahId, revNum, rating) => {
            saveToCloud(students.map(s => {
              if (s.id === currentId) {
                const surahRevs = { ...(s.revisions?.[surahId] || {}) };
                if (rating === null) delete surahRevs[revNum]; else surahRevs[revNum] = { rating, date: Date.now() };
                return { ...s, revisions: { ...(s.revisions || {}), [surahId]: surahRevs } };
              }
              return s;
            }), currentId);
            setRevisionSelector(null);
          };

          const clearRevisions = (surahId) => {
            saveToCloud(students.map(s => {
              if (s.id === currentId) {
                const newRevisions = { ...(s.revisions || {}) };
                delete newRevisions[surahId];
                return { ...s, revisions: newRevisions };
              }
              return s;
            }), currentId);
          };

          const scrollToSurah = (sId) => {
              setSearchQuery(""); setCurrentJuz('all');
              setTimeout(() => {
                  const el = document.getElementById(`surah-card-${sId}`);
                  if (el) window.scrollTo({ top: el.offsetTop - 220, behavior: 'smooth' });
              }, 150);
          };

          const getRevisionDetails = (revs) => {
            if (!revs) return { hasRevisions: false, hasWeak: false, latestDate: 0 };
            const vals = Object.values(revs);
            if (vals.length === 0) return { hasRevisions: false, hasWeak: false, latestDate: 0 };
            let hasWeak = false; let latestDate = 0;
            vals.forEach(v => {
                const rating = typeof v === 'object' && v !== null ? v.rating : v;
                const date = typeof v === 'object' && v !== null ? v.date : 0;
                if (rating === 'weak') hasWeak = true;
                if (date > latestDate) latestDate = date;
            });
            return { hasRevisions: true, hasWeak, latestDate };
          };

          const inProgressSurahs = useMemo(() => SURAHS_DATA.filter(s => progress[s.id] > 0 && progress[s.id] < s.totalAyahs), [progress]);
          const completedSurahsList = useMemo(() => SURAHS_DATA.filter(s => progress[s.id] === s.totalAyahs), [progress]);
          
          const FOURTEEN_DAYS = 14 * 24 * 60 * 60 * 1000;
          const { weakRevisions, recentRevisions, oldRevisions } = useMemo(() => {
              const weak = []; const recent = []; const old = [];
              const now = Date.now();
              SURAHS_DATA.forEach(s => {
                  const revDetails = getRevisionDetails(revisions[s.id]);
                  if (!revDetails.hasRevisions) return;
                  if (revDetails.hasWeak) weak.push(s);
                  else if (now - revDetails.latestDate > FOURTEEN_DAYS) old.push(s);
                  else recent.push(s);
              });
              return { weakRevisions: weak, recentRevisions: recent, oldRevisions: old };
          }, [revisions]);

          const displayedSurahs = searchQuery
            ? SURAHS_DATA.filter(s => s.name.includes(searchQuery) || s.enName.toLowerCase().includes(searchQuery.toLowerCase()))
            : (currentJuz === 'all' ? SURAHS_DATA : SURAHS_DATA.filter(s => JUZ_SURAHS[currentJuz-1].includes(s.id)));

          // --- إعدادت الخطة الزمنية ---
          const currentPlan = MEMORIZATION_PLANS.find(p => p.id === currentStudent?.planId);
          const remainingTime = useMemo(() => {
              if (!currentPlan || stats.percentage === 100) return null;
              const remainingAyahs = TOTAL_QURAN_AYAHS - stats.total;
              let remainingWeeks = 0;
              if (currentPlan.pagesPerWeek) remainingWeeks = (remainingAyahs * (604 / TOTAL_QURAN_AYAHS)) / currentPlan.pagesPerWeek;
              else if (currentPlan.rubsPerWeek) remainingWeeks = (remainingAyahs * (240 / TOTAL_QURAN_AYAHS)) / currentPlan.rubsPerWeek;
              
              const totalMonths = Math.floor(remainingWeeks / 4.33);
              const years = Math.floor(totalMonths / 12);
              const months = totalMonths % 12;
              return { years, months };
          }, [currentPlan, stats.total]);

          const formatTimeAr = (y, m) => {
              let res = [];
              if (y === 1) res.push("سنة واحدة");
              else if (y === 2) res.push("سنتان");
              else if (y > 2 && y <= 10) res.push(`${y} سنوات`);
              else if (y > 10) res.push(`${y} سنة`);
              
              if (m === 1) res.push("شهر واحد");
              else if (m === 2) res.push("شهران");
              else if (m > 2 && m <= 10) res.push(`${m} أشهر`);
              else if (m > 10) res.push(`${m} شهراً`);
              
              if (res.length === 0) return "أقل من شهر!";
              return res.join(" و ");
          };

          const formatTimeEn = (y, m) => {
              let res = [];
              if (y === 1) res.push("1 Year");
              else if (y > 1) res.push(`${y} Years`);
              
              if (m === 1) res.push("1 Month");
              else if (m > 1) res.push(`${m} Months`);
              
              if (res.length === 0) return "Less than a month!";
              return res.join(" and ");
          };

          // --- لوحة الإدارة ---
          if (isAdminMode) {
              return (
                <div className="min-h-screen bg-slate-50 font-sans p-4 sm:p-8" dir={isAr ? 'rtl' : 'ltr'}>
                  <div className="max-w-3xl mx-auto bg-white p-6 sm:p-10 rounded-3xl shadow-xl border-t-4 border-green-700 mt-10">
                    <div className="flex flex-col sm:flex-row items-center gap-4 mb-10 border-b pb-6">
                        <div className="bg-green-100 p-4 rounded-full text-green-700">
                            <i className="fas fa-user-shield text-4xl"></i>
                        </div>
                        <div className="text-center sm:text-start">
                            <h2 className="text-3xl font-bold text-green-900">{t('adminTitle')}</h2>
                            <p className="text-gray-500 text-sm mt-2">{t('adminDesc')}</p>
                        </div>
                    </div>

                    <div className="bg-green-50 p-6 rounded-2xl mb-8 border border-green-100">
                        <h3 className="font-bold text-green-800 mb-4">{t('addTeacher')}</h3>
                        <div className="flex flex-col sm:flex-row gap-3">
                            <input 
                                value={newCodeInput} 
                                onChange={e=>setNewCodeInput(e.target.value)} 
                                placeholder={t('newCodePlaceholder')} 
                                className="flex-1 border-2 border-green-200 p-4 rounded-xl focus:border-green-600 focus:outline-none font-bold text-center sm:text-start shadow-sm" dir="ltr"
                            />
                            <button onClick={handleAddCode} className="bg-green-700 hover:bg-green-800 text-white px-8 py-4 rounded-xl font-bold shadow-md transition-colors flex items-center justify-center gap-2">
                                <i className="fas fa-plus"></i> {t('saveCode')}
                            </button>
                        </div>
                    </div>

                    <h3 className="font-bold text-gray-700 mb-4 text-lg">{t('allowedCodes')} ({allowedCodes.length}):</h3>
                    {allowedCodes.length === 0 ? (
                        <div className="text-center py-12 bg-gray-50 rounded-2xl border-2 border-dashed border-gray-300">
                            <i className="fas fa-users-slash text-gray-300 text-5xl mb-4"></i>
                            <p className="text-gray-500 font-medium">{t('noCodes')}</p>
                        </div>
                    ) : (
                        <ul className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            {[...allowedCodes].sort((a, b) => a.localeCompare(b)).map(c => (
                                <li key={c} className="flex justify-between items-center bg-white p-4 rounded-xl border border-gray-200 shadow-sm hover:shadow-md transition-shadow">
                                    <span className="font-bold text-xl text-green-800" dir="ltr">{c}</span>
                                    <button onClick={()=>handleRemoveCode(c)} className="text-red-500 hover:text-white hover:bg-red-500 p-2.5 rounded-lg transition-colors flex items-center gap-2" title={t('delete')}>
                                        <i className="fas fa-trash-alt"></i> <span className="hidden sm:inline">{t('delete')}</span>
                                    </button>
                                </li>
                            ))}
                        </ul>
                    )}

                    <div className="mt-12 text-center border-t pt-6 flex flex-col items-center gap-4">
                        <button onClick={toggleLang} className="bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2 rounded-lg font-bold flex items-center gap-2 transition-colors">
                            <i className="fas fa-globe"></i> {isAr ? 'Switch to English' : 'التبديل للعربية'}
                        </button>
                        <button onClick={() => {setIsAdminMode(false); setTempSyncKey(""); setShowSyncModal(true);}} className="text-gray-500 hover:text-red-600 font-medium py-2 px-4 transition-colors flex items-center justify-center gap-2 mx-auto">
                            <i className="fas fa-sign-out-alt"></i> {t('logoutAdmin')}
                        </button>
                    </div>
                  </div>

                  {dialog.isOpen && (
                    <div className="fixed inset-0 z-[150] flex items-center justify-center bg-black/50 p-4" dir={isAr ? 'rtl' : 'ltr'}>
                      <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6">
                        <h3 className="text-lg font-bold text-gray-800 mb-4">{dialog.message}</h3>
                        <div className={`flex gap-3 mt-2 ${isAr ? 'justify-end' : 'justify-start'}`}>
                          {dialog.type !== 'alert' && <button onClick={() => setDialog({ ...dialog, isOpen: false })} className="px-4 py-2 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-xl font-medium">{t('cancel')}</button>}
                          <button onClick={() => dialog.onConfirm()} className="px-4 py-2 text-white bg-green-900 hover:bg-green-800 rounded-xl font-medium">{t('confirm')}</button>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              );
          }

          if (!isDataLoaded && syncKey && !showSyncModal) {
              return (
                  <div className="min-h-screen bg-slate-50 flex items-center justify-center font-sans" dir={isAr ? 'rtl' : 'ltr'}>
                      <div className="flex flex-col items-center gap-4">
                          <i className="fas fa-spinner fa-spin text-5xl text-green-700"></i>
                          <p className="text-green-800 font-bold text-lg">{isAr ? 'جاري مزامنة البيانات السحابية...' : 'Syncing Cloud Data...'}</p>
                      </div>
                  </div>
              );
          }

          return (
            <div className="min-h-screen bg-slate-50 font-sans pb-20 pt-4 sm:pt-6" dir={isAr ? 'rtl' : 'ltr'}>
              
              {/* نافذة عرض الشهادة */}
              {selectedCert && (
                  <div className="fixed inset-0 z-[120] flex items-center justify-center bg-black/80 p-2 sm:p-4 backdrop-blur-sm" dir={isAr ? 'rtl' : 'ltr'}>
                      <div className="bg-white rounded-3xl shadow-2xl w-full max-w-4xl flex flex-col overflow-hidden max-h-[90vh]">
                          <div className="bg-green-900 text-white p-4 flex justify-between items-center">
                              <h3 className="font-bold text-lg flex items-center gap-2"><i className="fas fa-certificate text-yellow-400"></i> {t('certAchievement')}</h3>
                              <button onClick={() => setSelectedCert(null)} className="text-green-200 hover:text-white bg-green-800 hover:bg-green-700 w-8 h-8 rounded-full flex items-center justify-center transition-colors">
                                  <i className="fas fa-times"></i>
                              </button>
                          </div>
                          
                          <div className="p-4 sm:p-8 overflow-auto bg-gray-50 flex justify-center custom-scrollbar">
                              {(() => {
                                  const certLang = selectedCert?.certLang || 'ar'; 
                                  const cT = (key) => tDict[certLang][key] || key;
                                  const certBadge = selectedCert ? getBadge(selectedCert.percentage, certLang) : currentBadge;
                                  
                                  return (
                                      <div id="printable-certificate" className="relative bg-white shrink-0 overflow-hidden" style={{ width: '800px', height: '560px', direction: certLang === 'ar' ? 'rtl' : 'ltr' }}>
                                          <div className="absolute inset-0 border-[16px] border-double border-yellow-500 m-4 rounded-xl opacity-90 z-0"></div>
                                          <div className="absolute inset-0 bg-green-50 m-8 rounded-lg z-0"></div>
                                          
                                          <div className="absolute inset-0 flex flex-col items-center text-center px-16 pt-10 pb-8 z-10">
                                              
                                              {/* 🔴 أيقونة المسجد في الشهادة 🔴 */}
                                              <i className="fas fa-mosque text-6xl text-green-800 mb-4 z-10 opacity-90"></i>
                                              
                                              <h1 className="text-4xl font-black text-green-900 mb-3" style={{fontFamily: certLang === 'ar' ? 'serif' : 'sans-serif'}}>{cT('certTitle')}</h1>
                                              <p className="text-xl text-slate-700 mb-4">{cT('certAwardedTo')}</p>
                                              
                                              <div className="relative mt-2 mb-6 inline-block">
                                                  <h2 className="text-5xl font-bold text-yellow-600 px-12 py-3 relative z-10">{currentStudent?.name}</h2>
                                                  <div className="absolute bottom-0 left-0 right-0 h-1.5 bg-green-800 opacity-80 rounded-full"></div>
                                              </div>

                                              <p className="text-2xl text-slate-700 leading-relaxed max-w-2xl mb-auto">
                                                  {cT('certForReaching')} <span className="font-black text-green-800 mx-2 text-3xl" dir="ltr">{selectedCert.percentage}%</span> {cT('certFromQuran')}
                                              </p>
                                              
                                              <div className="flex justify-between items-end w-full px-8 mt-auto pt-6 border-t-2 border-green-100">
                                                  <div className="text-start">
                                                      <p className="text-sm text-slate-500 mb-1 border-b-2 border-slate-200 pb-1 px-4">{cT('certDate')}</p>
                                                      <p className="font-bold text-lg text-green-900 mt-2 pl-4">{new Date(selectedCert.timestamp).toLocaleDateString(certLang === 'ar' ? 'ar-EG' : 'en-US')}</p>
                                                  </div>
                                                  <div className="text-center flex flex-col items-center">
                                                      <div className="text-4xl mb-2 text-yellow-500">{certBadge.icon}</div>
                                                      <p className="font-bold text-green-800 text-lg bg-green-100 px-4 py-1.5 rounded-full shadow-sm">{certBadge.text}</p>
                                                  </div>
                                              </div>
                                          </div>
                                      </div>
                                  );
                              })()}
                          </div>
                      </div>
                  </div>
              )}

              {/* نافذة الدخول السحابي */}
              {showSyncModal && (
                <div className="fixed inset-0 z-[100] flex items-center justify-center bg-green-900/90 p-4" dir={isAr ? 'rtl' : 'ltr'}>
                  <form onSubmit={handleSetSyncKey} className="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8 text-center border-4 border-yellow-400 relative">
                    <button type="button" onClick={toggleLang} className={`absolute top-4 ${isAr ? 'left-4' : 'right-4'} bg-green-100 hover:bg-green-200 text-green-800 px-3 py-1 rounded-lg text-sm font-bold flex items-center gap-1 transition-colors`}>
                        <i className="fas fa-globe"></i> {isAr ? 'EN' : 'عربي'}
                    </button>
                    
                    {/* 🔴 أيقونة الكتاب في شاشة الدخول 🔴 */}
                    <i className="fas fa-book-open text-6xl text-green-700 mb-4 mt-6"></i>
                    
                    <h2 className="text-2xl font-bold text-green-900 mb-2">{t('welcomeCloud')}</h2>
                    <p className="text-gray-600 mb-6 text-sm">{t('enterCode')}</p>
                    
                    <input 
                      type="text" 
                      autoFocus
                      required
                      placeholder={t('yourCode')} 
                      value={tempSyncKey}
                      onChange={(e) => setTempSyncKey(e.target.value)}
                      className="w-full px-4 py-3 mb-6 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-green-700 text-center text-lg font-bold text-green-900 bg-green-50"
                      dir="ltr"
                      disabled={isSaving}
                    />
                    
                    <button type="submit" disabled={isSaving} className="w-full px-4 py-3 text-white bg-green-900 hover:bg-green-800 rounded-xl font-bold text-lg transition-colors shadow-lg disabled:opacity-50">
                      {isSaving ? t('verifying') : t('loginSync')}
                    </button>
                  </form>
                </div>
              )}

              {!isAdminMode && !showSyncModal && (
                <div className="sticky top-0 z-50 shadow-md">
                  
                  <header className="bg-green-900 text-white border-b-4 border-yellow-500 relative z-50">
                    <div className="max-w-5xl mx-auto px-3 py-3 sm:px-6 lg:px-8 flex flex-col sm:flex-row items-center justify-between gap-3 sm:gap-4">
                      <div className="flex items-center gap-3 w-full sm:w-auto justify-between sm:justify-start">
                        <div className="flex items-center gap-2 sm:gap-3">
                          {/* 🔴 أيقونة الكتاب في الشريط العلوي 🔴 */}
                          <i className="fas fa-book-open text-2xl sm:text-3xl text-yellow-400"></i>
                          <div>
                              <h1 className="text-lg sm:text-2xl font-bold text-white leading-tight">
                                  {isReadOnly ? t('parentPortal') : t('title')}
                              </h1>
                              <div className="flex items-center gap-2 mt-1 flex-wrap">
                                  <button onClick={toggleLang} className="bg-white/20 hover:bg-white/30 text-white px-2 py-0.5 rounded text-[10px] sm:text-xs flex items-center gap-1 transition-colors">
                                      <i className="fas fa-globe"></i> {isAr ? 'English' : 'عربي'}
                                  </button>
                                  {!isReadOnly && (
                                    <>
                                        <span className={`w-2 h-2 rounded-full ${isSaving ? 'bg-orange-400 animate-pulse' : 'bg-green-400 shadow-[0_0_8px_#4ade80]'}`}></span>
                                        <span className="text-[10px] sm:text-xs text-green-200">
                                            {isSaving ? t('saving') : `${t('connected')} ${syncKey || t('notSet')})`}
                                        </span>
                                        {syncKey && (
                                            <button onClick={handleLogout} className={`text-[10px] bg-red-500/20 hover:bg-red-500/40 text-red-100 px-2 py-0.5 rounded transition-colors border border-red-500/30 flex items-center gap-1 cursor-pointer ${isAr ? 'mr-1' : 'ml-1'}`} title={t('logout')}>
                                                <i className="fas fa-sign-out-alt"></i> {t('logout')}
                                            </button>
                                        )}
                                    </>
                                  )}
                              </div>
                          </div>
                        </div>
                      </div>
                      
                      <div className="flex-1 w-full sm:max-w-md flex items-center gap-1.5 sm:gap-2">
                        {isReadOnly ? (
                            <div className="w-full flex items-center justify-between sm:justify-end gap-4">
                                <span className="text-xl sm:text-2xl font-bold text-yellow-400 px-4">{currentStudent?.name}</span>
                                <button onClick={handleLogout} className="p-2 sm:p-2.5 bg-red-600/80 hover:bg-red-50 rounded-xl transition-colors shadow-sm text-white text-xs sm:text-sm font-bold flex items-center gap-2">
                                    <i className="fas fa-sign-out-alt"></i> {t('logout')}
                                </button>
                            </div>
                        ) : (
                          <>
                            <div className="relative flex-1">
                            <select value={currentStudent?.id || ''} onChange={(e) => saveToCloud(students, e.target.value)} className={`w-full py-2 sm:py-2.5 rounded-xl bg-green-800/50 border border-green-700 text-white focus:outline-none focus:ring-2 focus:ring-yellow-500 text-sm sm:text-lg font-medium appearance-none cursor-pointer ${isAr ? 'pl-4 pr-8 sm:pr-10' : 'pr-4 pl-8 sm:pl-10'}`}>
                                {students.map(s => <option key={s.id} value={s.id} className="bg-green-800">{s.name}</option>)}
                            </select>
                            <i className={`fas fa-users absolute top-1/2 -translate-y-1/2 text-sm sm:text-lg text-yellow-400 pointer-events-none ${isAr ? 'right-2 sm:right-3' : 'left-2 sm:left-3'}`}></i>
                            <i className={`fas fa-chevron-down absolute top-1/2 -translate-y-1/2 text-sm sm:text-lg text-yellow-400 pointer-events-none ${isAr ? 'left-2 sm:left-3' : 'right-2 sm:right-3'}`}></i>
                            </div>

                            <button onClick={handleShare} className="p-2 sm:p-2.5 bg-blue-600 hover:bg-blue-500 border border-blue-500 rounded-xl transition-colors shadow-sm" title={t('shareLink')}><i className="fas fa-share-alt text-base sm:text-lg text-white"></i></button>
                            <button onClick={renameStudent} className="p-2 sm:p-2.5 bg-green-800 hover:bg-green-700 border border-green-700 rounded-xl transition-colors" title={t('editStudent')}><i className="fas fa-edit text-base sm:text-lg text-yellow-400"></i></button>
                            <button onClick={addStudent} className="p-2 sm:p-2.5 bg-yellow-500 hover:bg-yellow-400 rounded-xl transition-colors shadow-sm" title={t('addStudent')}><i className="fas fa-user-plus text-base sm:text-lg text-green-900"></i></button>
                            <button onClick={deleteStudent} className="p-2 sm:p-2.5 bg-red-500/20 hover:bg-red-500/40 border border-red-500/30 rounded-xl transition-colors" title={t('deleteStudent')}><i className="fas fa-trash-alt text-base sm:text-lg text-red-200"></i></button>
                          </>
                        )}
                      </div>
                    </div>
                  </header>

                      <div className="flex items-center gap-3 sm:gap-6">
                        <div className="relative w-14 h-14 sm:w-20 sm:h-20 flex items-center justify-center shrink-0">
                            <svg className="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                                <path className="text-slate-100" strokeWidth="4" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                <path className="text-green-500 transition-all duration-1000 ease-out" strokeWidth="4" strokeDasharray={`${stats.percentage}, 100`} strokeLinecap="round" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                            </svg>
                            <span className="absolute text-sm sm:text-base font-bold text-green-900">{stats.percentage}%</span>
                        </div>
                        <div className="space-y-0 sm:space-y-1">
                            <h2 className="text-[10px] sm:text-sm text-gray-500 font-medium leading-tight">{t('totalMemorized')}</h2>
                            <div className="text-base sm:text-2xl font-bold text-gray-800 leading-tight">{stats.total} <span className="text-[10px] sm:text-sm text-gray-400 font-normal">/ {TOTAL_QURAN_AYAHS}</span></div>
                            <p className="text-[9px] sm:text-xs text-green-800 font-medium leading-tight">{t('completedSurahs')} {stats.done}</p>
                        </div>
                      </div>
                      <div className="flex flex-col items-center">
                          <div className={`p-1.5 sm:p-3 rounded-xl sm:rounded-2xl border sm:border-2 w-24 sm:w-48 text-center shrink-0 transition-colors ${currentBadge.color}`}>
                              <div className="mb-0.5 sm:mb-2">{currentBadge.icon}</div>
                              <h3 className="font-bold text-[9px] sm:text-sm">{currentBadge.text}</h3>
                          </div>
                          {!isReadOnly && stats.percentage > 0 && (
                              <button onClick={issueCertificate} className="mt-1 w-full bg-yellow-500 text-green-900 py-1 sm:py-1.5 rounded-lg sm:rounded-xl text-[9px] sm:text-xs font-bold transition-colors shadow-sm">
                                 <i className="fas fa-certificate text-green-800"></i> {t('issueCert')}
                              </button>
                          )}
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {!isAdminMode && !showSyncModal && (
                <main className="max-w-5xl mx-auto px-4 py-6 sm:px-6 lg:px-8 space-y-6">
                  <section className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6">
                      <h3 className="font-bold text-lg mb-6 flex items-center gap-2 text-slate-800"><i className="fas fa-chart-pie text-green-600 text-xl"></i> {t('studentReport')}</h3>
                      
                      {/* قسم الخطة الزمنية */}
                      <div className="bg-gradient-to-r from-purple-50 to-indigo-50 border border-purple-100 p-4 sm:p-5 rounded-2xl flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6 shadow-sm">
                          <div className="flex-1 w-full">
                              <h4 className="font-bold text-purple-900 text-sm mb-3 flex items-center gap-2"><i className="fas fa-calendar-alt text-purple-600"></i> {t('planSetup')}</h4>
                              {!isReadOnly ? (
                                  <div className="relative">
                                      <select 
                                          value={currentStudent?.planId || ''} 
                                          onChange={(e) => saveToCloud(students.map(s => s.id === currentId ? {...s, planId: e.target.value} : s), currentId)}
                                          className={`bg-white border-2 border-purple-200 text-purple-900 text-sm rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-purple-500 block w-full p-2.5 shadow-sm font-bold appearance-none cursor-pointer hover:border-purple-300 transition-colors ${isAr ? 'pl-4 pr-10' : 'pr-4 pl-10'}`}
                                      >
                                          <option value="">{t('selectPlan')}</option>
                                          {MEMORIZATION_PLANS.map(p => <option key={p.id} value={p.id}>{isAr ? p.labelAr : p.labelEn}</option>)}
                                      </select>
                                      <i className={`fas fa-chevron-down absolute top-1/2 -translate-y-1/2 text-purple-400 pointer-events-none ${isAr ? 'right-3' : 'left-3'}`}></i>
                                  </div>
                              ) : (
                                  <p className="text-purple-900 font-bold bg-white px-4 py-2.5 rounded-xl border border-purple-200 inline-block shadow-sm">
                                      {currentPlan ? (isAr ? currentPlan.labelAr : currentPlan.labelEn) : <span className="text-slate-400 font-normal">{t('noPlan')}</span>}
                                  </p>
                              )}
                          </div>
                          
                          {currentPlan && remainingTime && (
                              <div className="flex flex-row gap-4 sm:gap-6 items-center bg-white py-3 px-5 rounded-xl border-2 border-purple-100 shadow-sm w-full sm:w-auto shrink-0 justify-around sm:justify-start">
                                  <div className="text-center flex flex-col items-center">
                                      <p className="text-[10px] sm:text-xs text-slate-500 mb-1 font-medium">{t('dailyTarget')}</p>
                                      <p className="font-bold text-indigo-700 text-xs sm:text-sm bg-indigo-50 px-3 py-1 rounded-lg">{isAr ? currentPlan.dailyTargetDescAr : currentPlan.dailyTargetDescEn}</p>
                                  </div>
                                  <div className="w-px h-10 bg-purple-100"></div>
                                  <div className="text-center flex flex-col items-center">
                                      <p className="text-[10px] sm:text-xs text-slate-500 mb-1 font-medium">{t('estimatedRemaining')}</p>
                                      <p className="font-bold text-green-700 text-xs sm:text-sm bg-green-50 px-3 py-1 rounded-lg" dir={isAr ? 'rtl' : 'ltr'}>
                                          {stats.percentage === 100 ? (isAr ? 'مكتمل!' : 'Completed!') : (isAr ? formatTimeAr(remainingTime.years, remainingTime.months) : formatTimeEn(remainingTime.years, remainingTime.months))}
                                      </p>
                                  </div>
                              </div>
                          )}
                      </div>

                      <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                          <div className="bg-blue-50/50 border border-blue-100 p-5 rounded-2xl h-full flex flex-col">
                              <h4 className="font-bold text-blue-800 text-sm mb-4 flex items-center gap-2"><i className="fas fa-spinner fa-spin-pulse"></i> {t('memorizingNow')}</h4>
                              <div className="space-y-2.5 max-h-[180px] overflow-y-auto pr-1 custom-scrollbar">
                                  {inProgressSurahs.length > 0 ? inProgressSurahs.map(s => (
                                      <button key={s.id} onClick={() => scrollToSurah(s.id)} className="w-full text-start bg-white p-3 rounded-xl shadow-sm border border-blue-50 hover:border-blue-300 transition-all cursor-pointer group">
                                          <div className="flex justify-between mb-2 text-xs">
                                              <span className="font-bold text-slate-700 group-hover:text-blue-700 transition-colors">{t('surah')} {isAr ? s.name : s.enName}</span>
                                              <span className="text-blue-600 font-bold" dir="ltr">{progress[s.id]} / {s.totalAyahs}</span>
                                          </div>
                                          <div className="w-full bg-blue-100 rounded-full h-1.5">
                                              <div className="bg-blue-500 h-1.5 rounded-full transition-all duration-500" style={{width: `${(progress[s.id]/s.totalAyahs)*100}%`}}></div>
                                          </div>
                                      </button>
                                  )) : <p className="text-xs text-slate-500 my-auto">{t('noData')}</p>}
                              </div>
                          </div>
                          <div className="bg-green-50/50 border border-green-100 p-5 rounded-2xl h-full flex flex-col">
                              <h4 className="font-bold text-green-800 text-sm mb-4 flex items-center gap-2"><i className="fas fa-check-double"></i> {t('completedSurahsList')}</h4>
                              <div className="flex flex-wrap gap-2 max-h-[180px] overflow-y-auto pr-1 custom-scrollbar">
                                  {completedSurahsList.length > 0 ? completedSurahsList.map(s => (
                                      <button key={s.id} onClick={() => scrollToSurah(s.id)} className="bg-white text-green-700 px-3 py-1.5 rounded-lg text-xs font-bold border border-green-200 shadow-sm hover:bg-green-600 hover:text-white transition-colors">{isAr ? s.name : s.enName}</button>
                                  )) : <p className="text-xs text-slate-500 my-auto w-full">{t('noData')}</p>}
                              </div>
                          </div>
                          <div className="flex flex-col gap-4 h-full">
                              <div className="bg-red-50/70 border border-red-100 p-4 rounded-2xl flex-1 flex flex-col">
                                  <h4 className="font-bold text-red-700 mb-3 flex items-center gap-2 text-sm"><i className="fas fa-exclamation-triangle"></i> {t('needsRevision')}</h4>
                                  <div className="flex flex-wrap gap-2 overflow-y-auto pr-1 custom-scrollbar max-h-[80px] content-start">
                                      {weakRevisions.length > 0 ? weakRevisions.map(s => (
                                          <button key={s.id} onClick={() => scrollToSurah(s.id)} className="bg-white text-red-600 px-3 py-1.5 rounded-lg text-[10px] font-bold border border-red-200 shadow-sm hover:bg-red-50 transition-colors">{isAr ? s.name : s.enName}</button>
                                      )) : <span className="text-xs text-slate-400 my-auto">لا يوجد</span>}
                                  </div>
                              </div>
                              <div className="bg-orange-50/70 border border-orange-100 p-4 rounded-2xl flex-1 flex flex-col">
                                  <h4 className="font-bold text-orange-700 mb-3 flex items-center gap-2 text-sm"><i className="fas fa-history"></i> {t('oldRevisions')}</h4>
                                  <div className="flex flex-wrap gap-2 overflow-y-auto pr-1 custom-scrollbar max-h-[80px] content-start">
                                      {oldRevisions.length > 0 ? oldRevisions.map(s => (
                                          <button key={s.id} onClick={() => scrollToSurah(s.id)} className="bg-white text-orange-600 px-3 py-1.5 rounded-lg text-[10px] font-bold border border-orange-200 shadow-sm hover:bg-orange-50 transition-colors">{isAr ? s.name : s.enName}</button>
                                      )) : <span className="text-xs text-slate-400 my-auto">لا يوجد</span>}
                                  </div>
                              </div>
                              <div className="bg-green-50/70 border border-green-100 p-4 rounded-2xl flex-1 flex flex-col">
                                  <h4 className="font-bold text-green-700 mb-3 flex items-center gap-2 text-sm"><i className="fas fa-check-circle"></i> {t('recentRevisions')}</h4>
                                  <div className="flex flex-wrap gap-2 overflow-y-auto pr-1 custom-scrollbar max-h-[80px] content-start">
                                      {recentRevisions.length > 0 ? recentRevisions.map(s => (
                                          <button key={s.id} onClick={() => scrollToSurah(s.id)} className="bg-white text-green-600 px-3 py-1.5 rounded-lg text-[10px] font-bold border border-green-200 shadow-sm hover:bg-green-50 transition-colors">{isAr ? s.name : s.enName}</button>
                                      )) : <span className="text-xs text-slate-400 my-auto">لا يوجد</span>}
                                  </div>
                              </div>
                          </div>
                      </div>
                  </section>

                  {(currentStudent.certificates && currentStudent.certificates.length > 0) && (
                      <section className="bg-white rounded-3xl shadow-sm border border-yellow-200 p-6 md:p-8">
                          <h3 className="font-bold mb-6 flex items-center gap-2 text-xl text-slate-800"><i className="fas fa-award text-yellow-500 text-3xl"></i> {t('certHonorBoard')}</h3>
                          <div className="flex flex-wrap gap-4">
                              {currentStudent.certificates.map((cert) => (
                                  <button key={cert.id} onClick={() => setSelectedCert(cert)} className="flex items-center gap-4 bg-gradient-to-l from-yellow-50/50 to-white min-w-[220px] border border-yellow-100 p-4 rounded-2xl hover:shadow-md hover:border-yellow-300 transition-all text-start relative group">
                                      <div className="bg-yellow-500 text-white w-12 h-12 rounded-full flex items-center justify-center shadow-md group-hover:scale-110 transition-transform"><i className="fas fa-certificate text-xl"></i></div>
                                      <div>
                                          <p className="font-bold text-sm text-green-900">{t('certAchievement')} {cert.percentage}%</p>
                                          <p className="text-xs text-slate-500 mt-1">{new Date(cert.timestamp).toLocaleDateString(isAr?'ar-EG':'en-US')}</p>
                                      </div>
                                      {cert.certLang === 'en' && <span className="absolute top-3 right-3 text-[9px] bg-blue-100 text-blue-800 font-bold px-2 py-0.5 rounded shadow-sm">EN</span>}
                                      {cert.certLang === 'ar' && <span className="absolute top-3 right-3 text-[9px] bg-green-100 text-green-800 font-bold px-2 py-0.5 rounded shadow-sm">AR</span>}
                                  </button>
                              ))}
                          </div>
                      </section>
                  )}

                  <div className="flex flex-col sm:flex-row justify-between items-center gap-4">
                      <div className="relative w-full sm:max-w-md">
                          <i className={`fas fa-search absolute top-1/2 -translate-y-1/2 ${isAr ? 'right-4' : 'left-4'} text-slate-400`}></i>
                          <input type="text" placeholder={t('searchSurah')} value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className={`w-full py-3 ${isAr ? 'pr-12 pl-4' : 'pl-12 pr-4'} rounded-xl border border-slate-200 focus:ring-2 focus:ring-green-800 focus:border-transparent outline-none shadow-sm transition-all`} />
                      </div>
                      <button onClick={resetProgress} className="flex items-center gap-2 text-red-600 bg-red-50 hover:bg-red-100 px-4 py-2 rounded-lg text-sm font-medium transition-colors"><i className="fas fa-sync-alt"></i> {t('resetData')}</button>
                  </div>
                  
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                    {displayedSurahs.map((surah) => {
                      const memorizedCount = progress[surah.id] || 0;
                      const isComplete = memorizedCount === surah.totalAyahs;
                      const progressPercent = (memorizedCount / surah.totalAyahs) * 100;

                      return (
                        <div id={`surah-card-${surah.id}`} key={surah.id} className={`relative overflow-visible rounded-2xl border p-5 transition-all duration-200 hover:shadow-md ${isComplete ? 'bg-green-50 border-yellow-200 ring-1 ring-yellow-300' : 'bg-white border-slate-200'}`}>
                          <div className="absolute bottom-0 left-0 right-0 h-1 rounded-b-2xl overflow-hidden pointer-events-none">
                            <div className={`absolute bottom-0 h-full bg-yellow-500 transition-all duration-500 ${isAr ? 'right-0' : 'left-0'}`} style={{ width: `${progressPercent}%` }} />
                          </div>
                          <div className="flex justify-between items-start mb-4">
                            <div>
                              <div className="flex items-center gap-2">
                                <span className="flex items-center justify-center w-7 h-7 rounded-full bg-slate-100 text-slate-500 text-xs font-bold shadow-inner">{surah.id}</span>
                                <h3 className="text-lg font-bold text-slate-800">{t('surah')} {isAr ? surah.name : surah.enName} <br/><span className="text-sm font-normal text-slate-400 mt-0.5">{isAr ? surah.enName : surah.name}</span></h3>
                              </div>
                              <p className="text-sm text-slate-500 mt-2">{t('ayahs')} {surah.totalAyahs}</p>
                            </div>
                            <button onClick={() => toggleCompleteSurah(surah)} className={`p-2.5 rounded-full transition-colors ${isComplete ? 'text-yellow-500 bg-yellow-100 shadow-sm' : 'text-slate-300 hover:text-yellow-500 hover:bg-slate-50'}`}>
                              <i className="fas fa-check-circle text-2xl"></i>
                            </button>
                          </div>
                          <div className="flex items-center gap-3">
                            <div className="flex-1">
                              <input type="range" min="0" max={surah.totalAyahs} value={memorizedCount} onChange={(e) => updateSurah(surah.id, parseInt(e.target.value) || 0)} className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-green-800" dir="ltr" />
                            </div>
                            <div className="w-16 shrink-0">
                              <input type="number" min="0" max={surah.totalAyahs} value={memorizedCount === 0 ? '' : memorizedCount} onChange={(e) => updateSurah(surah.id, parseInt(e.target.value) || 0)} placeholder="0" className="w-full px-2 py-1.5 text-center text-sm font-semibold rounded border border-slate-200 focus:outline-none focus:border-green-800 focus:ring-1 focus:ring-green-800 bg-slate-50" />
                            </div>
                          </div>
                          <div className="mt-4 pt-3 border-t border-slate-100 flex flex-col gap-3">
                            <div className="flex justify-between items-center w-full">
                              <span className="text-xs text-slate-500 font-medium">{t('revision')}</span>
                              {Object.keys(revisions[surah.id] || {}).length > 0 && (
                                <button onClick={() => clearRevisions(surah.id)} className="text-slate-400 hover:text-red-600 flex items-center gap-1.5 text-[11px] bg-slate-50 hover:bg-red-50 px-3 py-1 rounded-full transition-colors" title={t('resetRevisions')}>
                                    <i className="fas fa-sync-alt"></i> <span className="font-bold">{isAr ? 'إعادة' : 'Reset'}</span>
                                </button>
                              )}
                            </div>
                            <div className="flex gap-1.5 w-full justify-start" dir="ltr">
                              {[1, 2, 3, 4, 5].map(num => {
                                const revData = (revisions[surah.id] || {})[num];
                                const rating = typeof revData === 'object' && revData !== null ? revData.rating : revData;
                                const isSelectorOpen = revisionSelector?.surahId === surah.id && revisionSelector?.revNum === num;
                                let IconClass = "w-7 h-7 rounded-full border text-[10px] flex items-center justify-center transition-all duration-200 ";
                                if (rating === 'excellent') IconClass += "bg-green-100 border-green-500 text-green-700 shadow-sm scale-110 z-10"; 
                                else if (rating === 'good') IconClass += "bg-blue-100 border-blue-500 text-blue-600 shadow-sm scale-110 z-10"; 
                                else if (rating === 'weak') IconClass += "bg-orange-100 border-orange-500 text-orange-600 shadow-sm scale-110 z-10"; 
                                else IconClass += "bg-slate-50 border-slate-200 text-slate-400 hover:border-green-400"; 
                                return (
                                  <div key={num} className="relative">
                                    <button onClick={() => setRevisionSelector(isSelectorOpen ? null : { surahId: surah.id, revNum: num })} className={IconClass}>
                                      {rating ? <i className="fas fa-star text-sm"></i> : <span className="font-bold">{num}</span>}
                                    </button>
                                    {isSelectorOpen && (
                                      <React.Fragment>
                                        <div className="fixed inset-0 z-40" onClick={() => setRevisionSelector(null)} />
                                        <div className="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 bg-white rounded-2xl shadow-xl border border-slate-200 p-1.5 flex gap-1 z-50">
                                          <button onClick={() => setRevisionRating(surah.id, num, 'excellent')} className="p-2 hover:bg-green-50 rounded-lg text-green-600 transition-colors" title={t('excellent')}><i className="fas fa-star text-lg"></i></button>
                                          <button onClick={() => setRevisionRating(surah.id, num, 'good')} className="p-2 hover:bg-blue-50 rounded-lg text-blue-600 transition-colors" title={t('good')}><i className="fas fa-thumbs-up text-lg"></i></button>
                                          <button onClick={() => setRevisionRating(surah.id, num, 'weak')} className="p-2 hover:bg-orange-50 rounded-lg text-orange-600 transition-colors" title={t('weak')}><i className="fas fa-exclamation-circle text-lg"></i></button>
                                          {rating && <button onClick={() => setRevisionRating(surah.id, num, null)} className="p-2 hover:bg-slate-100 rounded-lg text-slate-400 hover:text-red-500 transition-colors"><i className="fas fa-times text-lg"></i></button>}
                                        </div>
                                      </React.Fragment>
                                    )}
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>

                  {!searchQuery && (
                  <div className="flex flex-col md:flex-row justify-center items-center gap-4 md:gap-8 mt-12 pt-8 border-t border-slate-200">
                      <div className="flex items-center gap-3">
                      <button onClick={() => { if (currentJuz !== 'all') { setCurrentJuz(prev => Math.max(prev - 1, 1)); window.scrollTo({ top: 300, behavior: 'smooth' }); } }} disabled={currentJuz === 'all' || currentJuz === 1} className="p-3 rounded-xl border border-slate-200 text-slate-500 disabled:opacity-50 hover:bg-green-50 hover:text-green-800 bg-white w-12 h-12 shadow-sm transition-colors"><i className={`fas ${isAr ? 'fa-chevron-right' : 'fa-chevron-left'} text-lg`}></i></button>
                      <div className="relative">
                          <select value={currentJuz} onChange={(e) => { const val = e.target.value; setCurrentJuz(val === 'all' ? 'all' : Number(val)); window.scrollTo({ top: 300, behavior: 'smooth' }); }} className={`appearance-none py-3 rounded-xl border-2 border-green-500 bg-white text-green-900 font-bold focus:outline-none focus:ring-4 focus:ring-green-500/20 cursor-pointer text-center min-w-[160px] text-lg shadow-sm transition-all ${isAr ? 'pl-10 pr-4' : 'pr-10 pl-4'}`}>
                          <option value="all" className="font-bold">{t('showAll')}</option>
                          {[...Array(30)].map((_, i) => <option key={i + 1} value={i + 1} className="font-bold">{t('juz')} {i + 1}</option>)}
                          </select>
                          <i className={`fas fa-chevron-down absolute top-1/2 -translate-y-1/2 text-green-600 text-sm pointer-events-none ${isAr ? 'left-4' : 'right-4'}`}></i>
                      </div>
                      <button onClick={() => { if (currentJuz !== 'all') { setCurrentJuz(prev => Math.min(prev + 1, 30)); window.scrollTo({ top: 300, behavior: 'smooth' }); } }} disabled={currentJuz === 'all' || currentJuz === 30} className="p-3 rounded-xl border border-slate-200 text-slate-500 disabled:opacity-50 hover:bg-green-50 hover:text-green-800 bg-white w-12 h-12 shadow-sm transition-colors"><i className={`fas ${isAr ? 'fa-chevron-left' : 'fa-chevron-right'} text-lg`}></i></button>
                      </div>
                      <div className="hidden md:block w-px h-10 bg-slate-300"></div>
                      <button onClick={() => setCurrentJuz(currentJuz === 'all' ? 1 : 'all')} className={`flex items-center gap-2 px-6 py-3 rounded-xl font-bold border-2 transition-all shadow-sm ${currentJuz === 'all' ? 'bg-green-900 text-white border-green-900 hover:bg-green-800' : 'text-green-900 bg-white border-green-500 hover:bg-green-50'}`}>
                      <i className={`fas ${currentJuz === 'all' ? 'fa-layer-group' : 'fa-list-ul'}`}></i> {currentJuz === 'all' ? t('backToJuz') : t('showAllSurahs')}
                      </button>
                  </div>
                  )}
                  {displayedSurahs.length === 0 && <div className="text-center py-12 text-slate-500 text-lg">{t('noSurahFound')}</div>}
                </main>
              )}

              {/* Shared Dialogs */}
              {dialog.isOpen && (
                <div className="fixed inset-0 z-[150] flex items-center justify-center bg-slate-900/60 p-4 backdrop-blur-sm">
                  <div className="bg-white rounded-3xl p-6 md:p-8 w-full max-w-sm shadow-2xl transform transition-all">
                    <p className="font-bold mb-6 text-slate-800 text-lg">{dialog.message}</p>
                    {dialog.type === 'prompt' && (
                      <input type="text" autoFocus defaultValue={dialog.defaultValue} id="dialogInput" className="w-full px-4 py-3 mb-6 border border-slate-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition-all text-slate-700" onKeyDown={(e) => { if (e.key === 'Enter') dialog.onConfirm(document.getElementById('dialogInput').value); }} />
                    )}
                    {dialog.type === 'certLanguage' ? (
                        <div className="flex flex-col gap-3">
                            <button onClick={() => dialog.onConfirm('ar')} className="bg-green-700 text-white py-3 rounded-xl font-bold hover:bg-green-600 transition-colors shadow-sm text-lg">بالعربية</button>
                            <button onClick={() => dialog.onConfirm('en')} className="bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-500 transition-colors shadow-sm text-lg tracking-wide">English</button>
                            <button onClick={() => setDialog({isOpen: false})} className="text-slate-500 py-2 hover:text-slate-800 font-medium transition-colors mt-1">{t('cancel')}</button>
                        </div>
                    ) : (
                        <div className={`flex gap-3 mt-4 ${isAr ? 'justify-end' : 'justify-start'}`}>
                            {dialog.type !== 'alert' && <button onClick={() => setDialog({isOpen: false})} className="px-5 py-2.5 bg-slate-100 rounded-xl text-slate-600 font-bold hover:bg-slate-200 transition-colors">{t('cancel')}</button>}
                            <button onClick={() => { if (dialog.type === 'prompt') dialog.onConfirm(document.getElementById('dialogInput').value); else dialog.onConfirm(); }} className="px-5 py-2.5 bg-green-900 text-white rounded-xl font-bold hover:bg-green-800 transition-colors shadow-sm">{t('confirm')}</button>
                        </div>
                    )}
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
